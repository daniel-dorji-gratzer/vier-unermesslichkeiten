<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="4 Unermesslichkeiten">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Vier Unermesslichkeiten</title>
<style>
:root {
  --bg: #f4f1ee;
  --bg-card: #ffffff;
  --bg-soft: #ede8e3;
  --ink: #18120f;
  --ink-soft: #4a3f3a;
  --ink-muted: #9a8d87;
  --accent: #a23e48;
  --accent-soft: #c97a82;
  --accent-bg: #faf0f1;
  --line: #e6dfd8;
  --tab-h: 52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.07);
  --r: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { height: 100%; overflow: hidden; background: #fff; color: var(--ink);
  font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 16px;
  line-height: 1.6; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column;
  position: fixed; inset: 0;
  padding-top: env(safe-area-inset-top, 0px);
  background: #fff; }
#content { background: var(--bg); }

/* ── Tab content ── */
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none; padding-bottom: 16px; }
.panel { display: none; padding: 20px 16px 0; animation: fadeIn .2s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── Panel header ── */
.panel-header { margin-bottom: 20px; }
.panel-header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; color: var(--ink); line-height: 1.2; }
.panel-header .sub { font-size: .88rem; color: var(--ink-muted); margin-top: 3px; }

/* ── Bottom tab bar ── */
#tabbar { flex-shrink: 0; background: rgba(255,255,255,.94);
  backdrop-filter: saturate(200%) blur(24px); -webkit-backdrop-filter: saturate(200%) blur(24px);
  border-top: 1px solid var(--line);
  display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); }
#tabbar button { flex: 1; border: none; background: transparent; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px; color: var(--ink-muted); font-size: 10px; font-weight: 500;
  font-family: inherit; transition: color .15s; height: var(--tab-h); touch-action: manipulation; }
#safe-fill { display: none; }
#tabbar button.active { color: var(--accent); }
#tabbar button svg { width: 23px; height: 23px; fill: none; stroke: currentColor;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
#tabbar button.active svg { stroke-width: 2.2; }

/* ── Cards ── */
.card { background: var(--bg-card); border-radius: var(--r); padding: 18px;
  margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: var(--ink); letter-spacing: -.01em; }
.card-sub { font-size: .84rem; color: var(--ink-muted); margin-bottom: 10px; }
hr.divider { border: none; border-top: 1px solid var(--line); margin: 14px 0; }

/* ── Accent card header strip ── */
.card-accent { border-top: 3px solid var(--accent); }
.card-accent .card-title { color: var(--accent); }

/* ── Typography ── */
.muted { color: var(--ink-muted); }
.small { font-size: .84rem; }
.label { font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--ink-muted); }

/* ── Pills ── */
.pill { display: inline-block; padding: 3px 10px; border-radius: 100px;
  font-size: .75rem; font-weight: 600; letter-spacing: .01em; }
.pill.gleichmut  { background: #d6ebf6; color: #1a5878; }
.pill.liebe      { background: #fef3bc; color: #6a4800; }
.pill.mitgefuehl { background: #ead5f7; color: #5a1080; }
.pill.freude     { background: #c5ecda; color: #1a5c3a; }
.pill.neutral    { background: var(--bg-soft); color: var(--ink-soft); }

/* ── Buttons ── */
button.btn-primary { background: var(--accent); color: #fff; border: none;
  border-radius: 12px; padding: 13px 22px; font-size: .95rem; font-family: inherit;
  font-weight: 600; cursor: pointer; touch-action: manipulation;
  transition: transform .1s, opacity .15s; letter-spacing: -.01em; }
button.btn-primary:active { opacity: .85; transform: scale(.98); }
button.btn-secondary { background: var(--bg-soft); color: var(--ink); border: none;
  border-radius: 12px; padding: 13px 22px; font-size: .95rem; font-family: inherit;
  font-weight: 500; cursor: pointer; touch-action: manipulation; }
button.btn-ghost { background: transparent; color: var(--accent); border: none;
  padding: 8px 12px; font-size: .9rem; font-family: inherit; font-weight: 600;
  cursor: pointer; touch-action: manipulation; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

/* ── List items ── */
.list-item { padding: 13px 0; border-bottom: 1px solid var(--line);
  cursor: pointer; touch-action: manipulation; }
.list-item:last-child { border-bottom: none; }
.list-item:active { background: var(--bg-soft); margin: 0 -6px; padding: 13px 6px;
  border-radius: 10px; }
.list-item .li-title { font-size: .97rem; font-weight: 600; color: var(--ink); }
.list-item .li-sub   { font-size: .83rem; color: var(--ink-muted); margin-top: 3px; }

/* ── Verse block ── */
.verse { font-style: italic; color: var(--ink-soft); line-height: 1.9;
  white-space: pre-line; border-left: 3px solid var(--accent);
  padding: 8px 0 8px 16px; margin: 10px 0; font-size: .93rem;
  background: var(--accent-bg); border-radius: 0 8px 8px 0; }

/* ── Streak ── */
.streak-num { font-size: 3.2rem; font-weight: 800; color: var(--accent); line-height: 1;
  letter-spacing: -.03em; }
.streak-row { display: flex; align-items: center; gap: 20px; padding: 4px 0; }

/* ── Reminder quote ── */
.reminder { background: var(--accent-bg); border-left: 4px solid var(--accent); }
.reminder .quote { font-style: italic; color: var(--ink-soft); line-height: 1.75; font-size: .95rem; }

/* ── Mode buttons ── */
.mode-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.mode-btn { background: var(--bg-card); border: 1.5px solid var(--line); border-radius: 16px;
  padding: 16px 18px; cursor: pointer; text-align: left; touch-action: manipulation;
  font-family: inherit; color: var(--ink); transition: border-color .15s, background .15s;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; width: 100%; }
.mode-btn:active { border-color: var(--accent); background: var(--accent-bg); transform: scale(.99); }
.mode-btn.selected { border-color: var(--accent); background: var(--accent-bg);
  box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
.mode-btn.selected .m-title { color: var(--accent); }
.mode-btn.selected .m-icon { color: var(--accent); }
.mode-icon-wrap { width: 44px; height: 44px; border-radius: 12px; background: var(--bg-soft);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mode-btn.selected .mode-icon-wrap { background: var(--accent-bg); }
.mode-icon-wrap svg { width: 22px; height: 22px; stroke: var(--ink-soft); fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.mode-btn.selected .mode-icon-wrap svg { stroke: var(--accent); }
.mode-btn .m-title { font-size: 1rem; font-weight: 700; margin-bottom: 3px; letter-spacing: -.01em; }
.mode-btn .m-desc  { font-size: .8rem; color: var(--ink-muted); line-height: 1.4; }
.mode-btn .m-badge { font-size: .7rem; color: var(--ink-muted); margin-top: 4px; }
.praxis-recent { margin-top: 4px; }
.praxis-recent-row { display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid var(--line); }
.praxis-recent-row:last-child { border-bottom: none; }

/* ── Practice runner ── */
#runner { background: var(--bg-card); border-radius: var(--r); padding: 28px 22px;
  box-shadow: var(--shadow); display: none; margin-bottom: 12px; }
.runner-stage { font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--accent); margin-bottom: 12px; text-align: center; }
.runner-text { font-size: 1.05rem; line-height: 1.85; color: var(--ink);
  text-align: center; white-space: pre-line; max-width: 520px; margin: 0 auto 22px; }
.runner-text.italic { font-style: italic; color: var(--ink-soft); }
.runner-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.runner-progress { text-align: center; font-size: .78rem; color: var(--ink-muted); margin-top: 14px; }
.timer-ring-wrap { position: relative; width: 180px; height: 180px; margin: 16px auto 8px; }
.timer-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.timer-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; font-weight: 700; color: var(--accent);
  font-variant-numeric: tabular-nums; letter-spacing: -.04em; }

/* ── Journal ── */
.j-entry { padding: 13px 0; border-bottom: 1px solid var(--line); }
.j-entry:last-child { border-bottom: none; }
.j-date { font-size: .78rem; font-weight: 600; color: var(--ink-muted); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .05em; }
.j-text { font-size: .92rem; color: var(--ink); white-space: pre-wrap; line-height: 1.65; }

/* ── Calendar ── */
.cal-wrap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-head { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  font-size: .68rem; font-weight: 700; color: var(--ink-muted); text-align: center;
  margin-bottom: 5px; letter-spacing: .03em; }
.cal-day { aspect-ratio: 1; background: var(--bg-soft); border-radius: 6px;
  font-size: .7rem; display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted); font-weight: 500; }
.cal-day.done { background: var(--accent); color: #fff; font-weight: 700; }
.cal-day.today { outline: 2.5px solid var(--accent); outline-offset: 1px; }

/* ── Arc dots ── */
.arc-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; }
.arc-dot { width: 18px; height: 18px; border-radius: 50%; border: 2.5px solid var(--line);
  background: var(--bg-soft); flex-shrink: 0; transition: box-shadow .2s; }
.arc-line { width: 2px; height: 24px; background: var(--line); margin-left: 8px; }

/* ── Calendar nav ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav-btn { background: none; border: none; font-size: 1.4rem; color: var(--accent);
  cursor: pointer; padding: 2px 8px; touch-action: manipulation; line-height: 1; }
.cal-nav-btn:disabled { opacity: .25; pointer-events: none; }
.cal-day.future { opacity: .22; }

/* ── Goal bar ── */
.goal-bar-bg { background: var(--bg-soft); height: 7px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
.goal-bar    { height: 100%; border-radius: 4px; background: var(--accent); transition: width .4s; }

/* ── Segment control ── */
.seg { display: flex; background: var(--bg-soft); border-radius: 10px; padding: 3px;
  margin-bottom: 14px; }
.seg button { flex: 1; border: none; background: transparent; border-radius: 8px;
  padding: 8px; font-family: inherit; font-size: .86rem; font-weight: 500;
  color: var(--ink-muted); cursor: pointer; transition: all .15s; touch-action: manipulation; }
.seg button.active { background: var(--bg-card); color: var(--ink); font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); }

/* ── Modal / Sheet ── */
#sheet-bg { display: none; position: fixed; inset: 0; background: rgba(24,18,15,.5);
  z-index: 100; align-items: flex-end; justify-content: center; padding: 0; }
#sheet-bg.show { display: flex; }
#sheet { background: var(--bg-card); border-radius: 24px 24px 0 0; width: 100%;
  max-height: 90vh; overflow-y: auto; padding: 12px 20px 0;
  padding-bottom: calc(20px + var(--safe-bot)); box-shadow: 0 -8px 40px rgba(0,0,0,.18);
  position: relative; }
#sheet-close { position: absolute; top: 14px; right: 16px; background: var(--bg-soft);
  border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1.1rem;
  color: var(--ink-muted); cursor: pointer; display: flex; align-items: center;
  justify-content: center; z-index: 10; touch-action: manipulation; }
.sheet-handle { width: 40px; height: 4px; background: var(--line); border-radius: 2px;
  margin: 0 auto 18px; }
#sheet h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 14px; letter-spacing: -.01em; }

/* ── Forms ── */
.field { display: block; margin-bottom: 14px; }
.field span { display: block; font-size: .82rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; }
input[type=text], input[type=number], textarea, select {
  width: 100%; border: 1.5px solid var(--line); border-radius: 12px;
  padding: 11px 14px; font-family: inherit; font-size: .95rem;
  background: var(--bg); color: var(--ink); -webkit-appearance: none; }
textarea { resize: vertical; min-height: 90px; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }

/* ── Toast ── */
#backup-banner { position: fixed; bottom: calc(var(--tab-h) + var(--safe-bot));
  left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--line);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  transform: translateY(100%); transition: transform .3s ease; z-index: 190; }
#backup-banner.show { transform: translateY(0); }
#backup-banner .bb-msg { flex: 1; font-size: .84rem; color: var(--ink-muted); }
#backup-banner .bb-msg strong { color: var(--ink); }

#toast { position: fixed; bottom: calc(var(--tab-h) + var(--safe-bot) + 20px);
  left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff;
  padding: 10px 20px; border-radius: 100px; font-size: .86rem; font-weight: 500;
  opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 200; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ── Details ── */
details { margin: 7px 0; }
details summary { cursor: pointer; color: var(--accent); font-size: .9rem; font-weight: 600;
  padding: 5px 0; list-style: none; display: flex; justify-content: space-between;
  align-items: center; touch-action: manipulation; }
details summary::after { content: '›'; font-size: 1.2rem; transition: transform .2s; }
details[open] summary::after { transform: rotate(90deg); }
details[open] summary { margin-bottom: 8px; }

/* ── Stat bars ── */
.stat-bar-bg { background: var(--bg-soft); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 5px; }
.stat-bar    { height: 100%; background: var(--accent); border-radius: 3px; }

/* ── Blockquote ── */
blockquote { margin: 10px 0; padding: 10px 16px; border-left: 4px solid var(--accent);
  background: var(--accent-bg); border-radius: 0 10px 10px 0;
  color: var(--ink-soft); font-style: italic; font-size: .92rem; line-height: 1.7; }

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-muted); font-size: 1rem; pointer-events: none; }

/* ── Scroll restoration ── */
#content { scroll-behavior: auto; }

/* ── Hero (Heute) ── */
.hero-today {
  margin: -20px -16px 20px;
  padding: 36px 24px 22px;
  border-radius: 0 0 28px 28px;
  position: relative;
  overflow: hidden;
  color: #fff;
  min-height: 210px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.hero-glow {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(50px);
}
.hero-dot {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,.55);
  pointer-events: none;
}
.hero-time-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 18px;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  opacity: .75;
}
.hero-time-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.hero-quality-name {
  font-size: 2.6rem;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.025em;
  margin-bottom: 5px;
}
.hero-quality-sanskrit {
  font-size: .88rem;
  font-style: italic;
  opacity: .65;
  margin-bottom: 10px;
}
.hero-bild {
  font-size: .78rem;
  opacity: .68;
  line-height: 1.55;
  margin-bottom: 18px;
  max-width: 260px;
}
.hero-stats-row {
  display: flex;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,.2);
  padding-top: 14px;
  margin-top: 0;
}
.hero-stat {
  flex: 1;
  text-align: center;
}
.hero-stat-num {
  display: block;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 3px;
}
.hero-stat-label {
  font-size: .58rem;
  opacity: .6;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.hero-stat-sep {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,.18);
  flex-shrink: 0;
}

/* ── Lernpfad grid ── */
.path-header { display: grid; grid-template-columns: 1fr 60px 60px 60px; gap: 6px; margin-bottom: 4px; }
.path-hcell { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink-muted); text-align: center; }
.path-row { display: grid; grid-template-columns: 1fr 60px 60px 60px; gap: 6px; margin-bottom: 6px; align-items: center; }
.path-q { min-width: 0; }
.path-q-name { font-size: .82rem; font-weight: 700; line-height: 1.25; word-break: break-word; }
.path-q-sub { font-size: .65rem; color: var(--ink-muted); margin-top: 1px; }
.path-cell { border-radius: 10px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; cursor: pointer; touch-action: manipulation; font-size: .6rem;
  font-weight: 700; gap: 3px; padding: 6px 2px; text-align: center; min-height: 54px;
  border: 1.5px solid var(--line); background: var(--bg-soft); color: var(--ink-muted);
  transition: transform .1s; }
.path-cell:active { transform: scale(.94); }
.path-cell.done { color: #fff; border-color: transparent; }
.path-cell.soft-locked { opacity: .38; }
.path-cell-icon { font-size: 1rem; line-height: 1; }

/* ── Quiz ── */
.quiz-opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
  border-radius: 10px; border: 1.5px solid var(--line); margin-bottom: 8px; cursor: pointer;
  touch-action: manipulation; transition: border-color .1s, background .1s; }
.quiz-opt.selected { border-color: var(--accent); background: var(--accent-bg); }
.quiz-opt.correct { border-color: #5BBB8A; background: #c5ecda; }
.quiz-opt.wrong { border-color: #a23e48; background: #faf0f1; }
.quiz-opt-dot { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--line);
  flex-shrink: 0; margin-top: 1px; background: transparent; transition: all .1s; }
.quiz-opt.selected .quiz-opt-dot { border-color: var(--accent); background: var(--accent); }
.quiz-opt.correct .quiz-opt-dot { border-color: #5BBB8A; background: #5BBB8A; }
.quiz-opt.wrong .quiz-opt-dot { border-color: #a23e48; background: #a23e48; }

/* ── Assessment ── */
.assess-q { margin-bottom: 18px; }
.assess-q-text { font-size: .88rem; color: var(--ink-soft); margin-bottom: 8px; line-height: 1.45; }
.assess-scale { display: flex; gap: 5px; }
.assess-scale button { flex: 1; border: 1.5px solid var(--line); background: var(--bg);
  border-radius: 8px; padding: 9px 2px; font-size: .8rem; color: var(--ink-muted);
  cursor: pointer; transition: all .15s; font-family: inherit; line-height: 1.2;
  display: flex; flex-direction: column; align-items: center; gap: 2px; touch-action: manipulation; }
.assess-scale button .ans-num { font-weight: 700; font-size: .95rem; }
.assess-scale button.sel { border-color: var(--accent); background: var(--accent-bg);
  color: var(--accent); font-weight: 600; }
.assess-scale button.sel .ans-num { color: var(--accent); }
.radar-wrap { display: flex; justify-content: center; padding: 4px 0 8px; }
.radar-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.radar-score-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: var(--bg); border-radius: 10px; height: 50px; }
.radar-score-item .pill { white-space: nowrap; font-size: .72rem; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.radar-bar-bg { flex: 1; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; min-width: 0; }
.radar-bar { height: 100%; border-radius: 3px; transition: width .4s; }
.radar-pct { font-size: .78rem; font-weight: 700; min-width: 30px; text-align: right; flex-shrink: 0; }

/* ── Onboarding ── */
#ob { position: fixed; inset: 0; z-index: 2000;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  padding: max(env(safe-area-inset-top,44px),52px) 24px max(env(safe-area-inset-bottom,20px),20px);
  transition: opacity .35s; }
#ob.ob-hide { opacity: 0; pointer-events: none; }
.ob-bg { position: absolute; inset: 0; transition: background .6s; }
.ob-body { position: relative; z-index: 1; width: 100%; max-width: 390px;
  display: flex; flex-direction: column; align-items: center; }
.ob-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
.ob-dot { width: 8px; height: 8px; border-radius: 4px; background: rgba(255,255,255,.35);
  transition: all .3s; flex-shrink: 0; }
.ob-dot.ob-active { width: 24px; background: rgba(255,255,255,.9); }
.ob-slide { color: #fff; width: 100%; }
.ob-eyebrow { font-size: .72rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; opacity: .65; margin-bottom: 10px; }
.ob-title { font-size: 2.1rem; font-weight: 800; line-height: 1.1;
  letter-spacing: -.035em; margin-bottom: 12px; }
.ob-desc { font-size: .92rem; line-height: 1.65; opacity: .8; margin-bottom: 28px; }
.ob-qs { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; width: 100%; }
.ob-q { background: rgba(255,255,255,.12); border-radius: 12px;
  padding: 11px 14px; display: flex; align-items: center; gap: 11px; }
.ob-q-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ob-q-name { font-size: .88rem; font-weight: 700; }
.ob-q-sk { font-size: .75rem; opacity: .6; font-style: italic; }
.ob-steps { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; width: 100%; }
.ob-step { background: rgba(255,255,255,.12); border-radius: 12px;
  padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px; }
.ob-step-n { font-size: .8rem; font-weight: 800; opacity: .5;
  min-width: 20px; padding-top: 1px; }
.ob-step-text { font-size: .87rem; line-height: 1.5; opacity: .9; }
.ob-btn-main { width: 100%; padding: 15px; border-radius: 14px; border: none;
  background: #fff; font-size: 1rem; font-weight: 700; font-family: inherit;
  cursor: pointer; touch-action: manipulation; transition: opacity .1s; }
.ob-btn-main:active { opacity: .85; }
.ob-btn-skip { background: none; border: none; color: rgba(255,255,255,.55);
  font-size: .82rem; font-family: inherit; cursor: pointer;
  padding: 12px 16px; touch-action: manipulation; }

/* ── Weg tab ── */
.weg-arc { background: var(--bg-card); border-radius: var(--r);
  padding: 16px 20px 14px; margin-bottom: 0;
  box-shadow: var(--shadow); }
.weg-arc-row { display: flex; align-items: center; gap: 0; }
.weg-arc-stop { display: flex; flex-direction: column; align-items: center;
  flex: 1; position: relative; }
.weg-arc-dot { width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--line); background: var(--bg); z-index: 1;
  transition: all .2s; flex-shrink: 0; }
.weg-arc-dot.done { border-width: 0; }
.weg-arc-dot.current { width: 22px; height: 22px;
  box-shadow: 0 0 0 5px rgba(0,0,0,.08); border-width: 0; }
.weg-arc-label { font-size: .6rem; font-weight: 600; margin-top: 5px;
  opacity: .65; letter-spacing: .03em; text-align: center; line-height: 1.2; }
.weg-arc-label.current { opacity: 1; font-weight: 700; }
.weg-arc-line { flex: 1; height: 2px; background: var(--line); margin: 0 -1px;
  align-self: flex-start; margin-top: 23px; z-index: 0; }
.weg-arc-line.done { background: var(--accent); opacity: .35; }
.weg-arc-sub { font-size: .72rem; color: var(--ink-muted); margin-top: 10px;
  display: flex; align-items: center; justify-content: space-between; }

/* Segment selector */
.seg-bar { display: flex; background: var(--bg-soft); border-radius: 10px;
  padding: 3px; margin: 10px 0 12px; gap: 0; }
.seg-btn { flex: 1; padding: 7px 4px; border: none; background: transparent;
  font-size: .78rem; font-weight: 600; color: var(--ink-muted);
  font-family: inherit; border-radius: 8px; cursor: pointer;
  transition: all .18s; touch-action: manipulation; }
.seg-btn.seg-active { background: #fff; color: var(--ink);
  box-shadow: 0 1px 4px rgba(0,0,0,.10); }
</style>
</head>

<script>
"use strict";

// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════

const VERSE_DE = [
  { n:1,  text:"Diejenigen, die so Zuflucht genommen haben\nVerteilen auf dem Boden der Liebe\nDie Blumen des Mitgefühls,\nDie im kühlen Schatten der Freude\nMit dem reinen Wasser der Unvoreingenommenheit benetzt werden.\nSie schulen ihren Geist, damit sie durch ihn\nden wandernden Wesen von Nutzen sein können." },
  { n:2,  text:"Wenn Liebe, Mitgefühl, Freude und Unvoreingenommenheit\nnicht mit dem Pfad zur Befreiung verbunden sind,\nsind sie die vier göttlichen Verweilzustände, Ursachen von Samsara.\nSind sie jedoch mit dem Pfad verbunden, der zum Frieden führt,\nführen sie über den Ozean der Existenz hinaus.\nSo sind sie die vier grenzenlosen Haltungen." },
  { n:3,  text:"Sie richten sich auf die ganze Unendlichkeit der Wesen\nsowie auf den letztendlichen Zustand der Phänomene.\nSo haben sie eine zweifache, allumfassende Form:\nSie sind sowohl referenziell als auch nicht-referenziell." },
  { n:4,  text:"Die vier göttlichen Verweilzustände sind in ihrem Umfang begrenzt.\nDie Wesen, die sie ins Auge fassen, sind nur wenige.\nIn ihrem Fokus und ihrer Form sind sie unrein\nund da sie parteiisch sind, sind sie die Ursache\nfür die himmlische Welt von Brahma.\nAber die vier grenzenlosen Haltungen sind frei von Parteilichkeit.\nSie sind auf den Zustand der Befreiung gerichtet.\nMögen diejenigen, die Mitgefühl haben, sich in ihnen üben." },
  { n:5,  text:"Diejenigen, die unglücklich sind, die von Kummer zermürbt sind,\ndiejenigen, die sowohl Glück als auch Reichtum besitzen,\nund diejenigen, die das Nahe lieben und das Ferne hassen –\ndas sind die jeweiligen Bereiche\nder Liebe und des Mitgefühls,\nder mitfühlenden Freude und der Unvoreingenommenheit.\nDie Formen dieser vier Haltungen sind somit der Wunsch,\ndass Glück erlangt werde, dass Kummer beseitigt werde,\ndass Freude nicht verloren gehe,\ndass man einen heilsamen und unvoreingenommenen Geist habe." },
  { n:6,  text:"Bei der Meditation über sie gibt es keine festgelegte Reihenfolge.\nAnfänger hingegen\nsollten mit dem Training in Unvoreingenommenheit beginnen.\nSobald sie die Gleichheit der nahen und fernen Wesen erkennen,\nsollten sie fortfahren, über die anderen drei zu meditieren." },
  { n:7,  text:"Mit allen Wesen als Fokus besteht die Form der Meditation\naus dieser Überlegung:\n„Oh Geist, du bist an Vater, Mutter und Freunde gebunden.\nDeine Feinde hasst du, und auf diese Weise bist du unvollkommen.\nWandelnd im endlosen und anfanglosen Samsara,\nhaben dir diese Feinde von dir, als Vater, Mutter, Freund,\neinst Nutzen gebracht.\nWillst du nun ihre Güte mit Böswilligkeit vergelten?\nUnd diese, deine gegenwärtigen Freunde, waren einst deine schädlichen Feinde.\nDas Leid, das sie dir zugefügt haben, ist auch jetzt noch bei dir.\nWie macht es dann Sinn, ihnen als Vergeltung Gutes zu tun?\nUnd alle anderen dazwischen\nwaren sowohl Freund als auch Feind.\nSie mögen geholfen haben, sie mögen geschadet haben:\nEs hat keinen Sinn, sie zu hassen oder an ihnen zu hängen." },
  { n:8,  text:"Deshalb, gleich zu Beginn,\nstelle deine Lieben in die mittlere Position der Neutralität\nund lege das Festhalten beiseite.\nUnd deine Feinde, als wären auch sie neutral.\nBefreie dich vom Hass.\nHabe kein „nah und fern”.\nDann beseitige deine Unwissenheit\ndarin, Wesen neutral zu betrachten, als weder gut noch schlecht.\nÜbe dich in dem, was dich von Samsara befreien wird:\ndie Absicht, unparteiisch\ndie Leiden zu beseitigen, die alle wandernden Wesen quälen." },
  { n:9,  text:"In ihrem Wunsch, glücklich zu sein und ihren Schmerzen zu entfliehen,\nsind alle Wesen gleich.\nUnd doch ersinnen sie in ihrer Verwirrung\ndie Ursachen ihres Leidens.\nAch! Mögen alle Leiden unglücklicher Wesen\nund all ihre bösen Neigungen nachlassen.\nMögen sie einen ausgeglichenen Geist haben.\nMögen alle verkörperten Wesen,\ngequält von starkem Verlangen und Abneigung,\nvon Hass und Begierde befreit werden\nund einen Geist haben, für den\nNah und Fern gleich sind.\n\nDenke so und meditiere zunächst über ein einzelnes Wesen,\ndann über zwei, dann über drei.\nBeginne mit den Wesen einer Region,\ngehe dann zu einem Kontinent über und schließlich zu allen vier.\nMeditiere dann über das gesamte Universum." },
  { n:10, text:"Das Zeichen deines Erfolgs wird sein, dass Selbst und Andere,\nFreund und Feind gleichgestellt sind.\nSchließlich denke daran, dass alle Objekte\ndieser unvoreingenommenen Haltung –\nalle nichts als der Geist sind.\nUnd dass die Natur des Geistes dem Raum gleicht.\nDann, mit einem Geist, der völlig frei von Konzepten ist,\nruhe im ultimativen Zustand, leer und ungeboren." },
  { n:11, text:"Wenn dein Geist somit allen gegenüber ausgeglichen ist,\ndann denke, so wie du dir wünschen würdest,\ndass deine eigene Mutter Glück erlangt,\ndas Gleiche für alle verkörperten Wesen.\nAlle Lebewesen werden so zum Gegenstand deiner Liebe,\nderen Form darin besteht, zu wünschen,\ndass die Wesen das Glück der Götter und Menschen erlangen\nund letztendlich die Glückseligkeit der Buddhaschaft erreichen." },
  { n:12, text:"Als Zeichen deiner Vollkommenheit\nwirst du höchste und allumfassende Liebe besitzen,\nmehr als jede Mutter für ihr einziges Kind.\nSchließlich ist große Liebe, die jenseits aller Anhaftung liegt,\nin dem Zustand zu ruhen,\nin dem alle als gleich angesehen werden.\nEs ist das Zeichen der Vereinigung von Liebe und Leerheit.\nUnd schon dein Anblick wird den Wesen Freude bereiten." },
  { n:13, text:"Wenn du alle Wesen mit Liebe umarmt hast,\ndann so, wie du es in deinem Geist nicht ertragen kannst,\nüber das Leid deines Vaters oder deiner Mutter nachzudenken,\nso sei es auch mit den Leiden der wandernden Wesen,\nund entfalte Mitgefühl.\nSie gehen unter in den großen, tosenden Fluten\nvon Geburt, Alter, Krankheit, Tod –\nerschöpft von all ihren verschiedenen Leiden." },
  { n:14, text:"Sie sind ohne gezähmte und friedvolle Geister.\nSie haben keine tugendhaften Freunde, die ihnen den wahren Weg zeigen.\nUnd so wandern sie endlos im Samsara umher.\nKannst du sie im Stich lassen?\nDenke aus der Tiefe deines Herzens:\n„Mein Körper, alles, was ich besitze,\nall die Tugend, die in der dreifachen Zeit gesammelt wurde –\nmöge sie alle Schmerzen vertreiben, die die Wesen haben!”" },
  { n:15, text:"Das Zeichen deines Erfolgs soll sein\ndie Unfähigkeit zu ertragen, dass Wesen leiden.\nAnschließend solltest du gleichmäßig verweilen\nin einem Mitgefühl, das frei von jeglichem begrifflichen Bezug ist.\nDas Zeichen dafür ist Leerheit –\nLeerheit vereint mit Mitgefühl.\nDie Frucht: ein Geist, der frei von Bosheit ist." },
  { n:16, text:"Erweicht durch Mitgefühl, übe dich darin, Freude zu empfinden,\nwenn andere ihre jeweilige Freude finden.\n„Welche Freude! Diese Wesen brauchen mich nicht,\num sie in den Zustand des Glücks zu bringen!\nDenn das Beste von allem ist, dass sie es selbst gefunden haben!\nVon diesem Tag an bis sie Erleuchtung erlangen,\nmögen sie niemals ihre Freude und ihren Trost verlieren!”" },
  { n:17, text:"Das Zeichen deiner Meisterschaft wird sein,\ndass du, voller Freude, keine neidische Eifersucht empfinden wirst.\nGanz natürlich wirst du in Frieden sein\nmit Glückseligkeit in Körper, Sprache und Geist.\nAls Frucht wirst du Freude und beständigen Reichtum haben." },
  { n:18, text:"Wenn du über Liebe meditierst und an jedem festhältst –\nwird dies durch Mitgefühl gestoppt.\nWenn Mitgefühl zu Depression führt –\nwird sie durch nicht-referentielle Freude gestoppt.\nWenn der Geist durch Freude beunruhigt wird –\nmeditiere über große Unvoreingenommenheit.\nUnd wenn Unvoreingenommenheit zu Gleichgültigkeit wird –\nmeditiere über Liebe, wie du es zuvor getan hast." },
  { n:19, text:"Diejenigen, die in einer solchen Übung gefestigt sind,\nmeditieren über die Haltungen\nin direkter, indirekter, abwechselnder oder beliebiger Reihenfolge.\nSo wird ihre Verwirklichung der vier grenzenlosen Haltungen\nwachsen und frisch sein." },
  { n:20, text:"Diese Praxis wird vier Ergebnisse hervorbringen.\nDie voll ausgereifte Frucht ist hohe Geburt und endgültige Vollkommenheit.\nDie Früchte, die der Ursache ähneln, sind die fortgesetzte Praxis\nund Glück und Freiheit von Widrigkeiten.\nDank des bedingten Ergebnisses wird man an angenehmen, heilsamen Orten geboren.\nDank der sich ausbreitenden Folge werden diese vier Haltungen an Stärke gewinnen." },
  { n:21, text:"Durch Liebe wird der Zorn vertrieben;\nder Sambhogakaya und die spiegelgleiche Weisheit werden erlangt.\nDurch Mitgefühl wird anhaftende Liebe verbannt;\nder Dharmakaya und die allumfassende Weisheit werden erlangt.\nMitfühlende Freude beseitigt jeglichen Neid;\nder Nirmanakaya und die erhabene Weisheit werden erlangt.\nUnvoreingenommenheit beseitigt Stolz und Unwissenheit.\nDer Svabhavikakaya offenbart sich." },
  { n:22, text:"Deshalb sind Liebe, Mitgefühl, Freude und Unvoreingenommenheit\nvon grenzenloser Vortrefflichkeit.\nJeder Weg, dem sie fehlen, ist falsch.\nUmgeben von den vier grenzenlosen Haltungen\nführt der Weg zur makellosen Befreiung." },
  { n:23, text:"In Wahrheit, bei beiden Fahrzeugen, dem kausalen und dem resultierenden,\nist die Praxis in Harmonie. Sie ist dieselbe.\nEs ist Leerheit, belebt durch Mitgefühl." },
  { n:24, text:"In den Fußstapfen der heiligen Kinder der Buddhas,\nbemühe dich mit Eifer in den vier grenzenlosen Haltungen." },
  { n:25, text:"Mögen diese guten Worte, die zum Frieden führen,\nalle Unruhe in den Köpfen der wandernden Wesen stillen.\nErschöpft vom Verfolgen falscher, irriger und minderwertiger Pfade,\nmöge ihr Geist heute Ruhe finden." },
];

function t(key) {

}

function applyLang() {
  var l = (S && S.prefs && S.prefs.lang) ? S.prefs.lang : 'de';
  VERSE = (l === 'en') ? VERSE_EN : VERSE_DE;
  QUALITAETEN = (l === 'en') ? QUALITAETEN_EN : QUALITAETEN_DE;

  var tabs = [{tab:'heute',key:'tab_heute'},{tab:'lehre',key:'tab_lehre'},{tab:'praxis',key:'tab_praxis'},{tab:'tagebuch',key:'tab_tagebuch'},{tab:'bogen',key:'tab_weg'}];
  tabs.forEach(function(x){
    var btn = document.querySelector('#tabbar button[data-tab="'+x.tab+'"]');
    if (btn) { var tn = btn.lastChild; if (tn && tn.nodeType === 3) tn.textContent = '\n      '+t(x.key)+'\n    '; }
  });
}

  S.prefs.lang = l;

}

  onboarded: false,
  verseIdx: 0,
  lastBackupAt: null,
  sessionsSinceBackup: 0,
  version: 1
});
let S = loadState();

function loadState() {
  try { const r = localStorage.getItem(SK); return r ? Object.assign(defaultState(), JSON.parse(r)) : defaultState(); }
  catch(e) { return defaultState(); }
}
function save() { localStorage.setItem(SK, JSON.stringify(S)); }

function todayISO() {
  const d = new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function dateISO(d) { return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n) { return String(n).padStart(2,"0"); }
function fmtDateLong(iso) {
  const dt = new Date(iso+"T12:00:00");
  return dt.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
}
function esc(s) {
  return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function getQ(id) { return QUALITAETEN.find(q=>q.id===id); }

// ── Lernpfad helpers ──
function pathKey(qid, aspect) { return qid + '_' + aspect; }
function isPathDone(qid, aspect) { return !!(S.path && S.path[pathKey(qid, aspect)]); }
function allRowDone(qid) { return ['studium','kontemplation','meditation'].every(a => isPathDone(qid, a)); }
function isQualitySoftLocked(qid) {
  const idx = QUALITAETEN.findIndex(q => q.id === qid);
  if (idx <= 0) return false;
  return !allRowDone(QUALITAETEN[idx - 1].id);
}
function needsAssessmentPrompt() {
  if (!S.lastAssessmentPrompt) return true;
  const last = new Date(S.lastAssessmentPrompt + 'T12:00:00');
  return (Date.now() - last.getTime()) / 86400000 >= 14;
}

function toast(msg, ms=2200) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), ms);
}

function streak() {
  if (!S.sessions.length) return 0;
  const dates = new Set(S.sessions.map(s=>s.date));
  let n=0, d=new Date();
  while (dates.has(dateISO(d))) { n++; d.setDate(d.getDate()-1); }
  if (n===0) {
    d = new Date(Date.now()-86400000);
    while (dates.has(dateISO(d))) { n++; d.setDate(d.getDate()-1); }
  }
  return n;
}

function longestStreak() {
  if (!S.sessions.length) return 0;
  const dates = [...new Set(S.sessions.map(s=>s.date))].sort();
  let best=1, cur=1;
  for (let i=1;i<dates.length;i++) {
    const diff=(new Date(dates[i]+'T12:00:00')-new Date(dates[i-1]+'T12:00:00'))/86400000;
    if (diff===1){cur++;if(cur>best)best=cur;}else cur=1;
  }
  return best;
}

function thisWeekStats() {
  const today=new Date(), dow=today.getDay();
  const daysSinceMon=(dow===0)?6:dow-1;
  const monISO=dateISO(new Date(today.getTime()-daysSinceMon*86400000));
  const wk=S.sessions.filter(s=>s.date>=monISO);
  return { days: new Set(wk.map(s=>s.date)).size, min: wk.reduce((s,x)=>s+(x.duration||0),0) };
}

let calViewDate = new Date();

function calPrev() {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()-1, 1);
  const el=document.getElementById('cal-view');
  if(el){const d=new Set(S.sessions.map(s=>s.date));el.innerHTML=renderCalMonth(d);}
}
function calNext() {
  const now=new Date();
  if(calViewDate.getFullYear()===now.getFullYear()&&calViewDate.getMonth()===now.getMonth())return;
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+1, 1);
  const el=document.getElementById('cal-view');
  if(el){const d=new Set(S.sessions.map(s=>s.date));el.innerHTML=renderCalMonth(d);}
}

function renderCalMonth(datesSet) {
  const y=calViewDate.getFullYear(), m=calViewDate.getMonth();
  const now=new Date(), isNow=(y===now.getFullYear()&&m===now.getMonth());
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const startDow=((first.getDay()===0)?6:first.getDay()-1);
  const monthLabel=first.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const monthSess=S.sessions.filter(s=>s.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
  const monthDays=new Set(monthSess.map(s=>s.date)).size;
  const monthMin=monthSess.reduce((s,x)=>s+(x.duration||0),0);
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d), iso=dateISO(dt);
    const done=datesSet.has(iso), today=iso===todayISO(), future=dt>now;
    cells+=`<div class="cal-day${done?' done':''}${today?' today':''}${future?' future':''}">${d}</div>`;
  }
  return `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span style="font-weight:600;font-size:.92rem;">${monthLabel}</span>
      <button class="cal-nav-btn" onclick="calNext()" ${isNow?'disabled':''}>›</button>
    </div>
    <div class="cal-head"><div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div></div>
    <div class="cal-wrap">${cells}</div>
    <div style="display:flex;gap:16px;margin-top:10px;">
      <span class="small muted">${monthDays} Tage geübt</span>
      <span class="small muted">${monthMin} Minuten</span>
    </div>`;
}

function todayReminder() {
  const phase = S.arc.currentPhase;
  const pool = ERINNERUNGEN.filter(r=>r.q===phase||r.q==="alle");
  const seed = todayISO().split("-").reduce((a,b)=>a+parseInt(b),0);
  return pool[seed % pool.length];
}

function bell() {
  if (!S.prefs.bell) return;
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 432;
    g.gain.value = 0; o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.linearRampToValueAtTime(0.28, ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+2.8);
    o.stop(ctx.currentTime+3); setTimeout(()=>ctx.close(),3500);
  } catch(e){}
}

let activeTab = "heute";

function switchTab(name) {
  if (name === activeTab) { document.getElementById("content").scrollTop=0; return; }
  scrollPos[activeTab] = document.getElementById("content").scrollTop;
  activeTab = name;
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="panel-"+name));
  renderPanel(name);
  requestAnimationFrame(()=>{
    document.getElementById("content").scrollTop = scrollPos[name]||0;
  });
}

function renderPanel(name) {
  const map = {heute:renderHeute,lehre:renderLehre,praxis:renderPraxis,tagebuch:renderTagebuch,bogen:renderBogen};
  if (map[name]) map[name]();
}

      + '</div></div>'
      + (needsAssessmentPrompt()
          ? '<div class="card" style="border-left:4px solid var(--accent);">'

// ─── Runner ───────────────────────────────────

let RN = { mode:null, step:0, steps:[], t0:null, timer:null, dur:0, qId:null };

function startMode(mode) {
  const el = document.getElementById("runner");
  if (!el) { switchTab('praxis'); setTimeout(()=>startMode(mode),80); return; }
  if (mode==="stille") { showTimerSetup(); return; }
  if (mode==="kontemplation") { showKontemplationListe(S.arc.currentPhase); return; }

  el.style.display="block";
  el.scrollIntoView({behavior:"smooth",block:"start"});

  if (mode==="rezitation") {
    RN = { mode, step:0, t0:Date.now(), timer:null, dur:5, qId:null, steps:[
      {stage:t('runner_vor'), text:t('runner_rez_text'), it:false},
      {stage:t('rez_titel'), text:REZITATION, it:true},
      {stage:t('runner_verweilen'), text:t('runner_rez_verweilen'), it:false},
      {stage:t('runner_abschluss'), text:t('runner_rez_abschluss'), it:false},
    ]};
  } else if (mode==="verse") {
    if (S.verseIdx === undefined) S.verseIdx = 0;
    const idx = S.verseIdx % VERSE.length;
    const v = VERSE[idx];
    S.verseIdx = idx + 1; save();
    RN = { mode, step:0, t0:Date.now(), timer:null, dur:8, qId:null, steps:[
      {stage:t('lehre_vers_lbl')+' '+v.n+' / '+VERSE.length+' · Longchenpa', text:v.text, it:true},
      {stage:t('runner_verweilen'), text:t('runner_vers_verweilen'), it:false},
      {stage:t('runner_abschluss'), text:t('runner_vers_abschluss'), it:false},
    ]};
  }
  renderRunner();
}

function showKontemplationListe(qId) {
  const el = document.getElementById("runner");
  if (!el) return;
  el.style.display="block";
  el.scrollIntoView({behavior:"smooth",block:"start"});
  const q = getQ(qId);
  const list = KONTEMPLATIONEN[qId]||[];
  el.innerHTML = `
    <div style="margin-bottom:12px;">
      <div class="label" style="margin-bottom:6px;">${t('kontempl_titel')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
        ${QUALITAETEN.map(x=>`<button class="btn-${x.id===qId?'secondary':'ghost'}" onclick="showKontemplationListe('${x.id}')" style="padding:6px 12px;font-size:.82rem;">${x.name}</button>`).join('')}
      </div>
      ${list.map((k,i)=>`
        <div class="list-item" onclick="startKontemplation('${qId}',${i})">
          <div class="li-title">${esc(k.titel)}</div>
          <div class="li-sub">${k.schritte.length}${t('schritte')}</div>
        </div>
      `).join('')}
    </div>
    <button class="btn-ghost" onclick="endRunner()" style="padding:8px 0;">${t('schliessen')}</button>
  `;
}

function startKontemplation(qId, idx) {
  const k = KONTEMPLATIONEN[qId][idx];
  const q = getQ(qId);
  RN = { mode:"kontemplation", step:0, t0:Date.now(), timer:null, dur:0, qId, steps:[
    {stage:t('runner_vor')+' · '+q.name, text:t('kontempl_vor_text'), it:false},
    ...k.schritte.map(s=>({stage:esc(k.titel), text:s, it:false})),
    {stage:t('runner_verweilen'), text:t('kontempl_verweilen'), it:false},
    {stage:t('runner_abschluss'), text:t('kontempl_abschluss'), it:false},
  ]};
  const el = document.getElementById("runner");
  if (el) { el.style.display="block"; el.scrollIntoView({behavior:"smooth",block:"start"}); }
  renderRunner();
}

function renderRunner() {
  const el = document.getElementById("runner");
  if (!el) return;
  const step = RN.steps[RN.step];
  if (!step) { endRunner(); return; }
  el.innerHTML = `
    <div class="runner-stage">${esc(step.stage||'')} · ${RN.step+1}/${RN.steps.length}</div>
    <div class="runner-text${step.it?' italic':''}">${esc(step.text)}</div>
    <div class="runner-controls">
      ${RN.step>0?`<button class="btn-secondary" onclick="rnPrev()">${t('runner_zurueck')}</button>`:''}
      ${RN.step<RN.steps.length-1
        ?`<button class="btn-primary" onclick="rnNext()">${t('runner_weiter')}</button>`
        :`<button class="btn-primary" onclick="finishRunner()">${t('runner_abschliessen')}</button>`}
      <button class="btn-ghost" onclick="endRunner()">${t('runner_beenden')}</button>
    </div>
  `;
}

function rnNext() { RN.step=Math.min(RN.steps.length-1,RN.step+1); renderRunner(); }
function rnPrev() { RN.step=Math.max(0,RN.step-1); renderRunner(); }

function finishRunner() {
  const mins = Math.max(1,Math.round((Date.now()-RN.t0)/60000));
  showLogSheet({ duration:mins, focus:RN.qId||S.arc.currentPhase, mode:RN.mode, afterSave:()=>endRunner() });
}

function endRunner() {
  if (RN.timer) clearInterval(RN.timer);
  const el = document.getElementById("runner");
  if (el && el.closest('#sheet-content')) { _closeSheet(); }
  else if (el) { el.style.display="none"; el.innerHTML=""; }
  RN = { mode:null, step:0, steps:[], t0:null, timer:null, dur:0, qId:null };
}

// ─── Timer ────────────────────────────────────

function showTimerSetup() {
  const el = document.getElementById("runner");
  el.style.display="block";
  el.innerHTML = `
    <div style="margin-bottom:16px;"><strong>${t('timer_titel')}</strong></div>
    <label class="field"><span>${t('timer_dauer')}</span>
      <input type="number" id="timer-dur" value="${S.prefs.timerDefault}" min="1" max="180" style="max-width:120px;">
    </label>
    <label class="field" style="display:flex;align-items:center;gap:8px;font-size:.9rem;">
      <input type="checkbox" id="timer-bell" ${S.prefs.bell?'checked':''}>
      ${t('timer_glocke')}
    </label>
    <div class="btn-row">
      <button class="btn-primary" onclick="startTimer()">${t('timer_start')}</button>
      <button class="btn-ghost" onclick="endRunner()">${t('runner_abbrechen')}</button>
    </div>
  `;
}

function startTimer() {
  const dur = parseInt(document.getElementById("timer-dur").value,10)||20;
  const useBell = document.getElementById("timer-bell").checked;
  S.prefs.timerDefault = dur; S.prefs.bell = useBell; save();
  if (useBell) bell();
  let rem = dur * 60;
  RN.mode="stille"; RN.t0=Date.now(); RN.dur=dur;

  const el = document.getElementById("runner");
  const total = dur * 60;
  const circ = 534;
  const draw = () => {
    const m=Math.floor(rem/60), s=rem%60;
    const offset = Math.round(circ * rem / total);
    el.innerHTML = `
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="85" fill="none" stroke="var(--line)" stroke-width="8"/>
          <circle cx="90" cy="90" r="85" fill="none" stroke="var(--accent)" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
        </svg>
        <div class="timer-display">${m}:${pad(s)}</div>
      </div>
      <div class="small muted" style="text-align:center;margin-bottom:20px;">${t('runner_stille')}</div>
      <div class="runner-controls">
        <button class="btn-secondary" onclick="finishRunner()">${t('runner_beenden_eintragen')}</button>
        <button class="btn-ghost" onclick="endRunner()">Abbrechen</button>
      </div>
    `;
  };
  draw();
  RN.timer = setInterval(()=>{
    rem--;
    if (rem<=0) { clearInterval(RN.timer); if(useBell)bell(); finishRunner(); return; }
    draw();
  },1000);
}

let _logAfter = null;

var _editId = null;

function editLog(id) {
  const s = S.sessions.find(function(x){ return x.id === id; });
  if (!s) return;
  showLogSheet({ id: s.id, date: s.date, duration: s.duration, focus: s.focus, mode: s.mode, notes: s.notes });
}

function showLogSheet(pre={}) {
  _logAfter = pre.afterSave||null;
  _editId = pre.id||null;
  const focus = pre.focus||S.arc.currentPhase;
  const dur = pre.duration||"";
  const mode = pre.mode||"";
  const date = pre.date||todayISO();
  const notes = pre.notes||"";
  const isEdit = !!_editId;
  openSheet(`
    <h2>${isEdit ? t('log_bearbeiten') : t('log_eintragen_neu')}</h2>
    <label class="field"><span>${t('log_datum')}</span>
      <input type="date" id="log-date" value="${date}">
    </label>
    <label class="field"><span>${t('log_dauer')}</span>
      <input type="number" id="log-dur" value="${dur}" placeholder="z.B. 20" min="0">
    </label>
    <label class="field"><span>${t('log_fokus')}</span>
      <select id="log-focus">
        ${QUALITAETEN.map(q=>`<option value="${q.id}"${q.id===focus?' selected':''}>${q.name} (${q.sanskrit})</option>`).join('')}
        <option value="alle"${focus==='alle'?' selected':''}}>${t('log_alle_vier')}</option>
      </select>
    </label>
    <label class="field"><span>${t('log_modus')}</span>
      <input type="text" id="log-mode" value="${esc(mode)}" placeholder="${t('log_modus_ph')}">
    </label>
    <label class="field"><span>${t('log_erfahrung')}</span>
      <textarea id="log-notes" placeholder="${t('log_notes_ph')}">${esc(notes)}</textarea>
    </label>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveLog()">${isEdit ? t('log_speichern') : t('log_eintragen')}</button>
      <button class="btn-secondary" onclick="_closeSheet()">Abbrechen</button>
    </div>
  `);
}

function saveLog() {
  const date  = document.getElementById("log-date").value.trim()||todayISO();
  const dur   = parseInt(document.getElementById("log-dur").value,10)||0;
  const focus = document.getElementById("log-focus").value;
  const mode  = document.getElementById("log-mode").value.trim();
  const notes = document.getElementById("log-notes").value.trim();
  if (_editId) {
    const idx = S.sessions.findIndex(function(s){ return s.id === _editId; });
    if (idx !== -1) S.sessions[idx] = Object.assign(S.sessions[idx], {date,duration:dur,focus,mode,notes});
    _editId = null;
  } else {
    S.sessions.unshift({id:uid(),date,duration:dur,focus,mode,notes});
    S.sessionsSinceBackup = (S.sessionsSinceBackup || 0) + 1;
  }
  save();
  // auto-complete Lernpfad milestones
  if (QUALITAETEN.find(q => q.id === focus)) {
    const ml = mode.toLowerCase();
    if (!S.path) S.path = {};
    let changed = false;
    if (ml === 'kontemplation' || ml.includes('kontempl')) {
      if (!S.path[pathKey(focus,'kontemplation')]) { S.path[pathKey(focus,'kontemplation')] = true; changed = true; }
    }
    if (ml === 'stille' || ml.includes('medit')) {
      if (!S.path[pathKey(focus,'meditation')]) { S.path[pathKey(focus,'meditation')] = true; changed = true; }
    }
    if (changed) save();
  }
  _closeSheet(); toast(t('log_eingetragen'));
  if (_logAfter) { _logAfter(); _logAfter=null; }
  renderPanel(activeTab);
  checkBackupDue();
}

function renderLernpfad() {
  const aspects = [
    { key:'studium',      label:t('lp_studium'),   icon:'S' },

// ── Quiz ──
let quizState = { qid: null, answers: {}, submitted: false };

function showQuizSheet(qid) {
  const q = getQ(qid);
  const done = isPathDone(qid, 'studium');
  quizState = { qid, answers: {}, submitted: false };
  if (done) {
    openSheet(`
      <h2>Studium · <span class="pill ${q.farbe}">${q.name}</span></h2>
      <div style="color:#1a5c3a;font-weight:600;margin-bottom:10px;">✓ Quiz abgeschlossen</div>
      <div class="small muted" style="margin-bottom:14px;">Das Studium f\xFCr diese Qualit\xE4t wurde bereits abgeschlossen.</div>
      <button class="btn-ghost" onclick="showQuizContent('${qid}')">Quiz wiederholen</button>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-secondary" onclick="_closeSheet()">Schlie\xDFen</button>
      </div>
    `);
    return;
  }
  showQuizContent(qid);
}

function showQuizContent(qid) {
  quizState = { qid, answers: {}, submitted: false };
  _renderQuiz();
}

function _renderQuiz() {
  const qid = quizState.qid;
  const q = getQ(qid);
  const questions = QUIZ[qid] || [];
  const body = questions.map((qu, qi) => {
    const sel = quizState.answers[qi] || [];
    const opts = qu.optionen.map((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      let cls = '';
      if (quizState.submitted) {
        const isCorrect = qu.richtig.includes(oi);
        const isSelected = sel.includes(oi);
        if (isCorrect) cls = ' correct';
        else if (isSelected) cls = ' wrong';
      } else if (sel.includes(oi)) cls = ' selected';
      return '<div class="quiz-opt' + cls + '" onclick="selectQuizOpt(' + qi + ',' + oi + ')">'
        + '<div class="quiz-opt-dot"></div>'
        + '<div class="small"><strong>' + letter + ')</strong> ' + esc(opt) + '</div>'
        + '</div>';
    }).join('');
    const explHtml = quizState.submitted && qu.erklaerung
      ? '<div class="small muted" style="margin-top:6px;padding:8px 10px;background:var(--bg-soft);border-radius:8px;line-height:1.5;">' + esc(qu.erklaerung) + '</div>'
      : '';
    const hintHtml = '<div class="small muted" style="margin-bottom:6px;font-style:italic;">' + esc(qu.hinweis||'') + '</div>';
    return '<div style="margin-bottom:22px;">'
      + '<div style="font-weight:600;margin-bottom:4px;font-size:.92rem;">' + (qi+1) + '. ' + esc(qu.frage) + '</div>'
      + hintHtml
      + opts
      + explHtml
      + '</div>';
  }).join('');

  let resultHtml = '';
  let btns = '<button class="btn-primary" onclick="submitQuiz()">Pr\xFCfen</button>'
    + '<button class="btn-secondary" onclick="_closeSheet()">Abbrechen</button>';

  if (quizState.submitted) {
    const correct = questions.filter((qu, qi) => {
      const sel = (quizState.answers[qi] || []).slice().sort().join(',');
      const exp = qu.richtig.slice().sort().join(',');
      return sel === exp;
    }).length;
    const pass = correct >= Math.ceil(questions.length * 0.6);
    resultHtml = pass
      ? '<div style="background:#c5ecda;color:#1a5c3a;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-weight:600;">✓ ' + correct + '/' + questions.length + ' richtig – Studium abgeschlossen!</div>'
      : '<div style="background:#faf0f1;color:#a23e48;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-weight:600;">✗ ' + correct + '/' + questions.length + ' richtig – nochmals versuchen</div>';
    btns = pass
      ? '<button class="btn-primary" onclick="_closeSheet();renderBogen();">Weiter</button>'
      : '<button class="btn-primary" onclick="showQuizContent(\'' + qid + '\')">Nochmals</button>'
        + '<button class="btn-secondary" onclick="_closeSheet()">Schlie\xDFen</button>';
  }

  openSheet('<h2>Studium \xB7 <span class="pill ' + q.farbe + '">' + q.name + '</span></h2>'
    + '<div id="quiz-result">' + resultHtml + '</div>'
    + '<div id="quiz-body">' + body + '</div>'
    + '<div class="btn-row" id="quiz-btns">' + btns + '</div>');
}

function selectQuizOpt(qi, oi) {
  if (quizState.submitted) return;
  if (!quizState.answers[qi]) quizState.answers[qi] = [];
  const idx = quizState.answers[qi].indexOf(oi);
  if (idx === -1) quizState.answers[qi].push(oi);
  else quizState.answers[qi].splice(idx, 1);
  _renderQuiz();
}

function submitQuiz() {
  const questions = QUIZ[quizState.qid] || [];
  const answered = questions.filter((_, qi) => (quizState.answers[qi]||[]).length > 0).length;
  if (answered < questions.length) { toast('Bitte alle Fragen beantworten.'); return; }
  quizState.submitted = true;
  const correct = questions.filter((qu, qi) => {
    const sel = (quizState.answers[qi] || []).slice().sort().join(',');
    const exp = qu.richtig.slice().sort().join(',');
    return sel === exp;
  }).length;
  const pass = correct >= Math.ceil(questions.length * 0.6);
  if (pass) {
    if (!S.path) S.path = {};
    S.path[pathKey(quizState.qid, 'studium')] = true;
    save();
  }
  _renderQuiz();
}

// ── Selbsteinschätzung ──
let _curAssess = {};

function showAssessmentSheet(qid) {
  const q = getQ(qid);
  const cur = S.assessments && S.assessments[qid];
  const fragen = ASSESSMENT_FRAGEN[qid] || [];
  _curAssess = { qid: qid, answers: new Array(fragen.length).fill(0) };
  if (cur && cur.answers) { _curAssess.answers = cur.answers.slice(); }
  openSheet(_buildAssessHtml(qid));
}

function _buildAssessHtml(qid) {
  const q = getQ(qid);
  const fragen = ASSESSMENT_FRAGEN[qid] || [];
  const answered = _curAssess.answers.filter(function(a){ return a > 0; }).length;
  const total = fragen.length;
  const allDone = answered === total;

  var dotsHtml = '<div style="display:flex;gap:6px;align-items:center;margin-bottom:16px;">'
    + fragen.map(function(_, i){
        var done = _curAssess.answers[i] > 0;
        return '<div style="flex:1;height:4px;border-radius:2px;background:'+(done?'var(--accent)':'var(--line)')+'"></div>';
      }).join('')
    + '<span class="small muted" style="white-space:nowrap;margin-left:8px;">'+answered+'\xA0/\xA0'+total+'</span>'
    + '</div>';

  var rows = fragen.map(function(f, fi) {
    var scaleHtml = ANS_LABELS.map(function(lab, si) {
      var v = si + 1;
      var sel = _curAssess.answers[fi] === v ? ' sel' : '';
      return '<button class="' + sel.trim() + '" onclick="_pickAns(' + fi + ',' + v + ')">'
        + '<span class="ans-num">' + v + '</span>'
        + '<span style="font-size:.62rem;line-height:1.1;">' + lab + '</span>'
        + '</button>';
    }).join('');
    return '<div class="assess-q">'
      + '<div class="assess-q-text">' + esc(f) + '</div>'
      + '<div class="assess-scale">' + scaleHtml + '</div>'
      + '</div>';
  }).join('');

  var cur = S.assessments && S.assessments[qid];
  var lastHtml = cur ? '<div class="small muted" style="margin-top:8px;text-align:center;">Letzte Einsch\xE4tzung: '
    + cur.date + ' – ' + cur.score + ' %</div>' : '';
  var disabledAttr = allDone ? '' : ' disabled';
  var btnLabel = allDone ? 'Speichern' : 'Speichern (' + answered + '\xA0/\xA0' + total + ' beantwortet)';
  var saveBtn = '<div style="position:sticky;bottom:0;background:var(--bg-card);padding:10px 0 2px;">'
    + '<button class="btn-primary"' + disabledAttr + ' onclick="saveAssessment()" style="width:100%;'+(allDone?'':'opacity:.45;cursor:default;')+'">'
    + btnLabel + '</button>'
    + '</div>';

  return '<h2>Selbsteinsch\xE4tzung \xB7 <span class="pill ' + q.farbe + '">' + q.name + '</span></h2>'
    + '<div class="small" style="margin-bottom:4px;color:var(--ink-soft);font-style:italic;">' + esc(q.zeichen) + '</div>'
    + '<div class="small muted" style="margin-bottom:12px;">Bewerte jede Aussage von 1 (kaum) bis 5 (fast immer).</div>'
    + dotsHtml
    + rows
    + saveBtn
    + lastHtml
    + '<div style="height:8px;"></div>';
}
function _pickAns(fi, v) {
  _curAssess.answers[fi] = v;
  var sheet = document.getElementById('sheet-content');
  if (sheet) sheet.innerHTML = _buildAssessHtml(_curAssess.qid);
}

function computeAssessScore(answers) {
  var filled = answers.filter(function(a) { return a > 0; });
  if (!filled.length) return 0;
  var sum = filled.reduce(function(s, a) { return s + a; }, 0);
  return Math.round((sum - filled.length) / (filled.length * 4) * 100);
}

function saveAssessment() {
  var qid = _curAssess.qid;
  if (!qid) return;
  var answers = _curAssess.answers;
  var score = computeAssessScore(answers);
  if (!S.assessments) S.assessments = {};
  if (!S.assessments[qid]) {
    S.assessments[qid] = { score: score, answers: answers, date: todayISO(), history: [] };
  } else {
    S.assessments[qid].history = S.assessments[qid].history || [];
    S.assessments[qid].history.push({ score: S.assessments[qid].score, answers: S.assessments[qid].answers, date: S.assessments[qid].date });
    S.assessments[qid].score = score;
    S.assessments[qid].answers = answers;
    S.assessments[qid].date = todayISO();
  }
  S.lastAssessmentPrompt = todayISO();
  save();
  _closeSheet();
  toast('Einsch\xE4tzung gespeichert ✓');
  renderPanel(activeTab);
}

function renderRadarChart(scores) {
  // Diamond layout: top=Gleichmut, right=Liebe, bottom=Mitgefühl, left=Freude
  // viewBox gives 55px padding left/right for labels
  var W = 300, H = 230, cx = W/2, cy = H/2 - 2, R = 78;
  function pt(ax, pct) {
    var r = pct / 100 * R;
    if (ax === 0) return [cx, cy - r];
    if (ax === 1) return [cx + r, cy];
    if (ax === 2) return [cx, cy + r];
    return [cx - r, cy];
  }
  function diamond(r) {
    return 'M ' + cx + ' ' + (cy-r) + ' L ' + (cx+r) + ' ' + cy
      + ' L ' + cx + ' ' + (cy+r) + ' L ' + (cx-r) + ' ' + cy + ' Z';
  }
  var grid = [25,50,75,100].map(function(p) {
    var r = p / 100 * R;
    return '<path d="' + diamond(r) + '" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="1"/>';
  }).join('');
  var axes = '<line x1="' + cx + '" y1="' + (cy-R) + '" x2="' + cx + '" y2="' + (cy+R) + '" stroke="rgba(0,0,0,.08)" stroke-width="1"/>'
    + '<line x1="' + (cx-R) + '" y1="' + cy + '" x2="' + (cx+R) + '" y2="' + cy + '" stroke="rgba(0,0,0,.08)" stroke-width="1"/>';
  var QC = { gleichmut:'#1a5878', liebe:'#6a4800', mitgefuehl:'#5a1080', freude:'#1a5c3a' };
  var ids = ['gleichmut','liebe','mitgefuehl','freude'];
  var pcts = ids.map(function(id) { return scores[id] || 0; });
  var pts = ids.map(function(id, i) { return pt(i, pcts[i]); });
  var poly = 'M ' + pts.map(function(p) { return p[0] + ' ' + p[1]; }).join(' L ') + ' Z';
  var dots = ids.map(function(id, i) {
    if (!pcts[i]) return '';
    return '<circle cx="' + pts[i][0] + '" cy="' + pts[i][1] + '" r="5" fill="' + QC[id] + '" stroke="#fff" stroke-width="1.5"/>';
  }).join('');
  // Labels: names only (% already shown in bars below). Left/right anchored to edges.
  var label = function(x, y, anchor, id, name) {
    return '<text x="' + x + '" y="' + y + '" text-anchor="' + anchor
      + '" font-size="10" fill="' + QC[id] + '" font-weight="600"'
      + ' font-family="-apple-system,sans-serif">' + name + '</text>';
  };
  var labels = label(cx, cy-R-12, 'middle', 'gleichmut', 'Gleichmut')
    + label(W-4, cy+4, 'end', 'liebe', 'Liebende G\xFCte')
    + label(cx, cy+R+16, 'middle', 'mitgefuehl', 'Mitgef\xFChl')
    + label(4, cy+4, 'start', 'freude', 'Mitfreude');
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;">'
    + grid + axes
    + '<path d="' + poly + '" fill="rgba(162,62,72,.13)" stroke="rgba(162,62,72,.55)" stroke-width="2" stroke-linejoin="round"/>'
    + dots + labels
    + '</svg>';
}

var _wegSeg = 'ueberblick';

function switchWegSeg(name) {
  _wegSeg = name;
  renderBogen();
  // keep scroll position at top of segment content
  var el = document.getElementById('weg-seg-content');
  if (el) el.scrollIntoView({block:'nearest'});

function renderBogen() {
  var phase = S.arc.currentPhase;
  var pd = getQ(phase);
  var ps = S.arc.phaseStarted;
  var phSess = S.sessions.filter(function(s){ return s.focus===phase && (!ps||s.date>=ps.slice(0,10)); });
  var total = S.sessions.length;
  var totalMin = S.sessions.reduce(function(s,x){ return s+(x.duration||0); }, 0);
  var byQ = {}; QUALITAETEN.forEach(function(q){ byQ[q.id]={c:0,m:0}; });
  S.sessions.forEach(function(s){ if(byQ[s.focus]){ byQ[s.focus].c++; byQ[s.focus].m+=s.duration||0; } });
  var allDates = new Set(S.sessions.map(function(s){ return s.date; }));
  var str = streak(), best = longestStreak(), wk = thisWeekStats();
  var g = S.goals || {dailyMin:20, weeklyDays:5};
  var wkPct = Math.min(100, Math.round(wk.days/g.weeklyDays*100));

  // ── Compact stepper ──────────────────────────────

    + '<div class="weg-arc-row">';

  phases.forEach(function(id, i) {
    var isCur = id === phase;

    var dotBorder = isCur ? c : isDone ? c+'88' : 'var(--line)';
    var dotShadow = isCur ? '0 0 0 4px '+c+'28' : 'none';
    var dotStyle = 'background:'+dotBg+';border-color:'+dotBorder+';box-shadow:'+dotShadow+';';
    stepperHTML += '<div class="weg-arc-stop">'
      + '<div class="weg-arc-dot'+(isCur?' current':isDone?' done':'')+'" style="'+dotStyle+'"></div>'
      + '<div class="weg-arc-label'+(isCur?' current':'')+'" style="color:'+(isCur?c:'var(--ink-muted)')+';">'
      + phaseLabels[i]+'</div>'
      + '</div>';
    if (i < phases.length - 1) {
      var nextDone = S.arc.phaseHistory.some(function(h){ return h.phase===phases[i+1]; });
      stepperHTML += '<div class="weg-arc-line'+(isDone?' done':'')+'" style="margin-top:11px;flex:1;"></div>';
    }
  });
  stepperHTML += '</div>'
    + '<div class="weg-arc-sub"><span>' + pd.name + ' – aktuelle Phase</span>'
    + '<button class="btn-ghost" onclick="showPhaseSwitcher()" style="font-size:.75rem;padding:0;">wechseln →</button></div>'
    + '</div>';

  // ── Segment bar ──────────────────────────────────
  var segs = [['ueberblick',t('weg_ueberblick')],['lernpfad',t('weg_lernpfad')],['reflexion',t('weg_reflexion')]];
  var segBarHTML = '<div class="seg-bar">';
  segs.forEach(function(s){
    segBarHTML += '<button class="seg-btn'+(s[0]===_wegSeg?' seg-active':'')+'" onclick="switchWegSeg(\''+s[0]+'\')">'
      + s[1] + '</button>';
  });
  segBarHTML += '</div>';

  // ── Segment content ──────────────────────────────
  var segContent = '';

  if (_wegSeg === 'ueberblick') {

    segContent += '<div class="card">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">'
      + '<div class="card-title" style="margin:0;">Streak &amp; Ziele</div>'
      + '<button class="btn-ghost" onclick="showGoalSheet()" style="padding:4px 0;font-size:.82rem;">bearbeiten →</button>'
      + '</div>'
      + '<div style="display:flex;gap:24px;margin-bottom:16px;">'
      + '<div><div class="streak-num">'+str+'</div><div class="small muted">Tage in Folge</div></div>'
      + '<div style="width:1px;background:var(--line);"></div>'
      + '<div><div class="streak-num" style="font-size:2rem;">'+best+'</div><div class="small muted">L\xE4ngste Serie</div></div>'
      + '<div style="width:1px;background:var(--line);"></div>'
      + '<div><div class="streak-num" style="font-size:2rem;">'+total+'</div><div class="small muted">Sitzungen gesamt</div></div>'
      + '</div>'
      + '<div style="margin-bottom:8px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;">'
      + '<span class="label">Diese Woche</span>'
      + '<span class="small muted">'+wk.days+' / '+g.weeklyDays+' Tage · '+wk.min+' Min.</span>'
      + '</div>'
      + '<div class="goal-bar-bg"><div class="goal-bar" style="width:'+wkPct+'%"></div></div>'
      + '</div></div>';

    // Kalender
    segContent += '<div class="card">'
      + '<div class="card-title" style="margin-bottom:10px;">Kalender</div>'
      + '<div id="cal-view">'+renderCalMonth(allDates)+'</div>'
      + '</div>';

    // Verteilung
    segContent += '<div class="card">'
      + '<div class="card-title" style="margin-bottom:10px;">Verteilung</div>'
      + '<div class="small muted" style="margin-bottom:12px;">Gesamt: '+total+' Sitzungen · '+totalMin+' Minuten</div>'
      + QUALITAETEN.map(function(q){
          var d=byQ[q.id], pct=total?Math.round(d.c/total*100):0, c=Q_COLOR[q.id];
          return '<div style="margin-bottom:12px;">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
            +'<span class="pill '+q.farbe+'">'+q.name+'</span>'
            +'<span class="small muted">'+d.c+' '+t('weg_sitzungen_ges')+' · '+d.m+' min</span></div>'
            +'<div class="stat-bar-bg"><div class="stat-bar" style="width:'+pct+'%;background:'+c+';"></div></div>'
            +'</div>';
        }).join('')
      + '</div>';

    // Phasen-Verlauf
    if (S.arc.phaseHistory.length) {
      segContent += '<div class="card">'
        + '<div class="card-title" style="margin-bottom:10px;">Phasen-Verlauf</div>'
        + S.arc.phaseHistory.map(function(h){
            var q=getQ(h.phase);
            return '<div class="j-entry">'
              +'<div class="j-date">'+(h.startedAt?h.startedAt.slice(0,10):'?')+' – '+(h.completedAt?h.completedAt.slice(0,10):'?')+'</div>'

              +'<span class="small muted" style="margin-left:8px;">'+(h.count||0)+' Sitzungen</span></div>'
              +'</div>';
          }).join('')
        + '</div>';
    }

    // Einstellungen
    segContent += '<div class="card">'
      + '<div class="card-title" style="margin-bottom:12px;">Einstellungen</div>'
      + '<label class="field"><span>Standard-Timer (Minuten)</span>'
      + '<input type="number" id="pref-timer" value="'+S.prefs.timerDefault+'" min="1" max="180" style="max-width:120px;" onchange="S.prefs.timerDefault=parseInt(this.value,10)||20;save();">'
      + '</label>'
      + '<label class="field" style="display:flex;align-items:center;gap:10px;font-size:.9rem;">'
      + '<input type="checkbox" id="pref-bell" '+(S.prefs.bell?'checked':'')+' onchange="S.prefs.bell=this.checked;save();">'
      + ' Glocke aktivieren</label>'
      + '<hr class="divider">'
      + '<div class="btn-row">'
      + '<button class="btn-secondary" onclick="exportData()">Exportieren (JSON)</button>'
      + '<button class="btn-secondary" onclick="document.getElementById(\'imp\').click()">Importieren</button>'
      + '<input type="file" id="imp" accept=".json,application/json" style="display:none;" onchange="importData(this)">'
      + '</div>'
      + '<button class="btn-ghost" onclick="if(confirm(\'Wirklich alle Daten l\xF6schen?\'))resetAll()" style="margin-top:8px;color:var(--ink-muted);">Alles zur\xFCcksetzen</button>'
      + '</div>';

    segContent += '<div class="small muted" style="text-align:center;padding:10px 0 4px;line-height:1.7;">'
      + t('weg_footer')+'<br>'
      + t('weg_footer2')+'<br>'
      + '<span style="font-size:.7rem;opacity:.5;">v18</span></div>';

  } else if (_wegSeg === 'lernpfad') {
    segContent += renderLernpfad();

  } else if (_wegSeg === 'reflexion') {
    var sc = {};
    QUALITAETEN.forEach(function(q){
      var a = S.assessments && S.assessments[q.id];
      sc[q.id] = a ? a.score : 0;
    });
    var hasAny = QUALITAETEN.some(function(q){ return sc[q.id] > 0; });
    segContent += '<div class="card">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">'
      + '<div class="card-title" style="margin:0;">Selbsteinsch\xE4tzung</div>'
      + '</div>'
      + (function(){
          var last = S.lastAssessmentPrompt;
          if (!last) return '<div class="small muted" style="margin-bottom:14px;">Noch keine Einsch\xE4tzung – starte jetzt.</div>';
          var nextDate = new Date(new Date(last+'T12:00:00').getTime() + 14*86400000);
          var nextISO = nextDate.toISOString().slice(0,10);
          var overdue = needsAssessmentPrompt();
          var nextFmt = nextDate.toLocaleDateString('de-AT',{day:'numeric',month:'long'});
          var lastFmt = new Date(last+'T12:00:00').toLocaleDateString('de-AT',{day:'numeric',month:'long'});
          return '<div class="small muted" style="margin-bottom:14px;">'
            + 'Letzte Einsch\xE4tzung: <strong>'+lastFmt+'</strong> · '
            + (overdue
                ? '<span style="color:var(--accent);font-weight:600;">jetzt f\xE4llig</span>'
                : 'n\xE4chste: '+nextFmt)
            + '</div>';
        })()
      + (hasAny ? '<div class="radar-wrap">'+renderRadarChart(sc)+'</div>' : '<div class="small muted" style="text-align:center;padding:20px 0 16px;font-style:italic;">Noch keine Einsch\xE4tzung vorhanden</div>')
      + '<div class="radar-scores">'
      + QUALITAETEN.map(function(q){
          var a = S.assessments && S.assessments[q.id];
          var pct = a ? a.score : 0;
          var c = Q_COLOR[q.id];
          return '<div class="radar-score-item">'
            +'<span class="pill '+q.farbe+'" style="min-width:72px;text-align:center;">'+q.name+'</span>'
            +'<div class="radar-bar-bg"><div class="radar-bar" style="width:'+pct+'%;background:'+c+';"></div></div>'
            +'<span class="radar-pct" style="color:'+c+';">'+(pct?pct+'%':'–')+'</span>'
            +'</div>';
        }).join('')
      + '</div>'
      + '<div class="btn-row" style="flex-wrap:wrap;gap:6px;margin-top:14px;">'
      + QUALITAETEN.map(function(q){
          return '<button class="btn-secondary" onclick="showAssessmentSheet(\''+q.id+'\')" style="flex:1;min-width:120px;font-size:.78rem;padding:8px 10px;">'+q.name+' einsch\xE4tzen</button>';
        }).join('')
      + '</div></div>';
  }

  document.getElementById('panel-bogen').innerHTML =
    "<div class=\"panel-header\"><h1>"+t('tab_weg')+"</h1><div class=\"sub\">"+t('weg_footer')+"</div></div>"
    + stepperHTML
    + segBarHTML
    + '<div id="weg-seg-content">'
    + segContent
    + '</div>';
}

function showPhaseSwitcher() {
  var phase = S.arc.currentPhase;
  var html = '<div class="sheet-title">Phase setzen</div>'
    + '<div class="small muted" style="margin-bottom:16px;">W\xE4hle die Qualit\xE4t, auf die du dich aktuell konzentrierst.</div>';
  html += QUALITAETEN.map(function(q){
    var isCur = q.id === phase;

function _backupBlob() {
  return new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
}
function _backupFilename() {
  return "vier-unermesslichkeiten-"+todayISO()+".json";
}

function exportData() {
  shareBackup();
}

async function shareBackup() {
  const filename = _backupFilename();
  const blob = _backupBlob();
  if (navigator.share && navigator.canShare) {
    const file = new File([blob], filename, {type:"application/json"});
    if (navigator.canShare({files:[file]})) {
      try {
        await navigator.share({files:[file], title:"Vier Unermesslichkeiten Backup"});
        S.lastBackupAt = todayISO();
        S.sessionsSinceBackup = 0;
        save();
        dismissBackupBanner();
        toast(t('backup_gespeichert'));
        return;
      } catch(e) { if (e.name !== 'AbortError') console.warn(e); else return; }
    }
  }
  // fallback: download
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  S.lastBackupAt = todayISO();
  S.sessionsSinceBackup = 0;
  save();
  dismissBackupBanner();
}

function checkBackupDue() {
  const SESSIONS_THRESHOLD = 3;
  const DAYS_THRESHOLD = 7;
  let due = false;
  if (S.sessionsSinceBackup >= SESSIONS_THRESHOLD) due = true;
  if (S.lastBackupAt) {
    const daysSince = (Date.now() - new Date(S.lastBackupAt+'T12:00:00').getTime()) / 86400000;
    if (daysSince >= DAYS_THRESHOLD) due = true;
  }
  if (due) document.getElementById('backup-banner').classList.add('show');
}

function dismissBackupBanner() {
  document.getElementById('backup-banner').classList.remove('show');
}

function importData(input) {
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.sessions && d.arc) { S = Object.assign(defaultState(), d); save(); renderPanel(activeTab); toast("Importiert ✓"); }
      else toast("Ungültige Datei");
    } catch(e) { toast("Fehler beim Importieren"); }
  };
  r.readAsText(file);
}

function resetAll() {
  S = defaultState(); save(); renderPanel(activeTab); toast("Zurückgesetzt");
}
