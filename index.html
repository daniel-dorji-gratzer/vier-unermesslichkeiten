 explain that.", "Answer: I think you were complicating it too much.", "Question: Through the discrimination, attachment arises?", "Answer: Ja. It's just that. It's just what we do all the time. You don't have to complicate it too much.", "It's just a compound expression in one language that doesn't translate well in another language, but it just means our discrimination and our preferences.", "Question: I feel now that this is the difference. And also the same thing happened to me when you explained the second part, the meditation without reference, then I understood how the first part works.", "Question: So it just came to my mind and it's not so much a question like about looking backward from the course. It's more like a question looking forward. And I don't know what the center's administrators will do, but at least I hope that there will be a continuation because this course has been very deeply inspiring for me and it landed in my heart, one can say. And that's why I'm also inspired to not treat this as just one lecture and then I go home and then it's over, but I want to adopt this practice. I want to take those instructions and apply them. That's what they are meant for, I suppose. And I would like some kind of support in developing this commitment and maybe you could give me or whoever wants to take it some kind of homework even, I suppose, to say, okay, I can actually do this practice, I can improve that way and I'm determined to do it and I would appreciate some structure that helps me keep this commitment until we continue next time.", "Answer: So, I mean, in our tradition, of course, this is related to the practice of bodhicitta. So, every day we aspire to be a bodhisattva, so try to associate this practice. Before every meditation session, we recite the four lines associated with the Four Immeasurables. As you do that, try to focus on the practice, but also in everyday life the points you've understood, try to put them in application and then maybe clarify understanding of ...", "You can continue reading the rest of the text in Longchenpa, and then also maybe do some research in relation to the other teachings given on the Four Immeasurables. Like I was mentioning, Theravada tradition, they also explain it and there are other Mayan scriptures that talk about it. You can read about those and then see which are similar, which are different. But they're all coming to the same point, but each clarifies maybe some aspects that you didn't see before, and then see how you can integrate it in your own practice. So both I would think in everyday life on a discursive level, changing how we think, and then also on the more contemplative practice. Or formal practices.", "Question: So doing the research on reading the effects and other texts, then reflect on it during the formal practice and reflect on it during everyday practice.", "All right, thank you. Please join me now in the dedication of merit."]},
];

const VERSE_EN = [
  { n:1,  text:"Those who thus have taken refuge\nSpread upon the ground of love\nThe flowers of compassion,\nWhich in the cooling shade of joy\nAre moistened with pure waters of impartiality\nThey train their minds that through them they may be\nOf benefit to wandering beings." },
  { n:2,  text:"If love, compassion, joy, impartiality\nAre not connected with the path to liberation,\nThey are the four divine abidings, causes of samsara.\nBut if they are connected with the path that leads to peace,\nThey lead beyond the ocean of existence.\nThus they are the four unbounded attitudes." },
  { n:3,  text:"They focus on the whole infinity of beings\nAs well as on the ultimate condition of phenomena.\nThus they have a twofold all-embracing form:\nThey are both referential and nonreferential." },
  { n:4,  text:"The four divine abidings are limited in scope.\nThe beings they envisage are but few.\nIn their focus and their form they are impure\nAnd, being partial, are the cause\nOf the celestial world of Brahma.\nBut the four unbounded attitudes are free of partiality.\nThey are directed at the state of liberation.\nLet those who have compassion train in them." },
  { n:5,  text:"Those who are not happy, those worn down by sorrow,\nThose who have both happiness and wealth\nAnd those who love the close and hate the far—\nSuch are the respective fields\nOf love and of compassion,\nOf sympathetic joy, and of impartiality.\nThe forms of these four attitudes are thus the wish\nThat happiness be gained, that sorrow be removed,\nThat joy should not be lost,\nThat one should be of wholesome and impartial mind." },
  { n:6,  text:"In the meditation on them there is no fixed order.\nBeginners on the other hand\nShould start with training in impartiality.\nOnce they realize the equality of beings who are close and far,\nThey should proceed to meditate upon the other three." },
  { n:7,  text:"With all beings as its focus, the meditation's form\nConsists of this consideration:\n“O mind, you are attached to father, mother, friends.\nYour enemies you hate, and in this way you are defective.\nWandering in endless and beginningless samsāra,\nAs father, mother, friend, these enemies of yours\nOnce brought you benefit.\nWill you now return their kindness with malevolence?\nAnd these, your present friends, were once your harmful foes.\nThe suffering they brought to you is with you even now.\nHow does it then make sense to do them good in recompense?\nAnd all the others in between\nHave been both friend and enemy.\nThey may have helped, they may have harmed:\nNo point is there in hatred or attachment.”" },
  { n:8,  text:"Therefore, at the outset,\nPlace your loved ones in the midposition of neutrality\nAnd set aside attachment.\nAnd for your enemies, as though they too were neutral,\nRid yourself of hatred.\nHave no “near and far.”\nThen eliminate your ignorance\nOf regarding beings neutrally as neither good nor bad.\nTrain yourself in what will free you from samsāra:\nThe intention to remove impartially\nThe afflictions that torment all wandering beings." },
  { n:9,  text:"In wanting to be happy and to flee their pains,\nAll beings are the same.\nAnd yet in their confusion they contrive\nThe causes of their suffering.\nAlas! May all afflictions of unhappy beings\nAnd all their evil tendencies subside.\nMay they have an evenness of mind.\nMay all embodied beings,\nTormented by strong craving and aversion,\nBe freed from hatred and desire\nAnd have minds for which\nThe near and far are equalized.\n\nThinking thus, first meditate upon a single being,\nThen on two, then three.\nBeginning with the beings of one region,\nProceed then to one continent and then all four.\nThen meditate on the entire universe." },
  { n:10, text:"The sign of your success will be that self and other,\nFriend and foe are equalized.\nIn conclusion, think that all the objects\nOf this impartial attitude devoid of clinging—\nAll are but the mind,\nAnd that the nature of the mind is similar to space.\nThen with a mind completely free of concepts,\nRest within the ultimate condition, empty and unborn." },
  { n:11, text:"When thus your mind is even with regard to all,\nThen just as you would wish\nThat your own mother meet with happiness,\nThink the same for all embodied beings.\nAll living beings thus become the object of your love,\nThe form of which consists\nIn wanting, in the immediate term,\nThat beings have the happiness of gods and humankind\nAnd ultimately that they reach the bliss of buddhahood.\nBeginning with a single being\nTrain yourself to embrace all\nUntil the very confines of the ten directions." },
  { n:12, text:"As a sign of your proficiency,\nYou will have supreme and all-embracing love,\nMore than any mother for her only child.\nFinally, great love that is beyond all clinging\nIs to rest within the state\nWhere all are seen as equal.\nIt is the sign of love and emptiness united.\nAnd just the sight of you will bring delight to beings." },
  { n:13, text:"When you have embraced all beings with love,\nThen just as in your mind you cannot bear\nTo contemplate the sorrows of your father or your mother,\nBe likewise with the sufferings of wandering beings\nAnd generate compassion.\nThey founder in the great, tumultuous floods\nOf birth, age, sickness, death—\nWorn out by all their different sorrows." },
  { n:14, text:"They are destitute of tamed and peaceful minds\nThat yearn for freedom.\nThey have no virtuous friends to show them the true path.\nAnd so—alas for them—\nThey wander in samsāra endlessly.\nAre you able to forsake them, you who see them thus?\nInstead, think rather from the center of your heart\nAnd from the marrow of your bones:\n“My body, all that I possess,\nAll the virtue gathered in the triple time—\nMay it, in this very instant,\nBanish all the pains that beings have!”" },
  { n:15, text:"The sign of your success is said to be\nThe inability to bear that beings suffer.\nSubsequently you should evenly remain\nIn a compassion free of all conceptual reference.\nOf this the sign is emptiness—\nEmptiness united with compassion.\nThe fruit of such a training is a mind that’s free of malice." },
  { n:16, text:"Softened by compassion, train yourself to take delight\nWhen others find their own respective joys.\nThe object of your focus will be beings who are happy,\nThe form your attitude will take will be to think,\n“What joy! These beings have no need of me\nTo bring them to the state of happiness!\nFor best of all, they found it for themselves!\nFrom this day till they gain enlightenment,\nMay they never lose their joy and comfort!”" },
  { n:17, text:"The sign of your proficiency will be\nThat, being joyful, you will have no envious jealousy.\nLater, when you concentrate on joy,\nYou will be free of all conceptual reference.\nNaturally you will be at peace\nWith bliss in body, speech, and mind.\nAs fruit you will have joy and steady wealth." },
  { n:18, text:"Once you have grown used to them,\nBegin with love and meditate upon them turn by turn.\nIf, when you meditate on love,\nThis causes you to cleave to everyone\nAs though they were your cherished friends,\nThis is halted by compassion.\nIf compassion is deficient and fixated on an object,\nDepression will be halted by nonreferential joy.\nIf through joy the mind is troubled,\nMeditate on great impartiality.\nAnd when impartiality becomes indifference,\nMeditate on love as you have done before\nAnd on the rest successively." },
  { n:19, text:"Those who have grown firm in such a training\nMeditate upon the attitudes\nIn direct, indirect, alternate, or in any order.\nThus their realization of the four unbounded attitudes\nWill grow and will be fresh." },
  { n:20, text:"This practice will give rise to four results.\nThe fully ripened fruit is high birth and the final excellence.\nThe fruits resembling the cause\nAre continued practice of the same,\nAnd a happiness and freedom from adversity.\nThanks to the conditioning result,\nOne will be born in pleasant, wholesome, happy places.\nThanks to the proliferating consequence,\nThese four attitudes will grow in strength." },
  { n:21, text:"By love is anger driven out;\nThe sambhogakāya and mirror-like wisdom are completely gained.\nBy compassion clinging love is banished;\nThe dharmakāya and the all-discerning wisdom are achieved.\nSympathetic joy removes all jealousy;\nThe nirmāṇakāya and the all-accomplishing wisdom are gained.\nImpartiality removes both pride and ignorance.\nThe svabhāvikakāya is made manifest together with\nThe wisdom of equality and the wisdom of the dharmadhatu." },
  { n:22, text:"Therefore love, compassion, joy, impartiality\nAre of unbounded excellence.\nAny path that lacks them is mistaken.\nEmbraced by the four boundless attitudes,\nThe path leads on to spotless liberation.\nIt is the way that all the buddhas tread." },
  { n:23, text:"In truth, with both the vehicles, the causal and resultant,\nThe practice is in harmony. It is the same.\nIt’s emptiness enlivened with compassion." },
  { n:24, text:"Therefore, in the footsteps of the buddhas’ holy children,\nStrive with effort in the four unbounded attitudes." },
  { n:25, text:"May these good words that lead to peace\nStill all the turbulence of wandering beings’ minds.\nExhausted by pursuing wrong, mistaken, and inferior paths,\nMay their minds today find rest." },
];

function applyTheme(pref) {
  var p = pref || (S && S.prefs && S.prefs.theme) || 'auto';
  if (p === 'dark')  { document.documentElement.dataset.theme = 'dark'; }
  else if (p === 'light') { document.documentElement.dataset.theme = 'light'; }
  else               { delete document.documentElement.dataset.theme; }
  // keep meta theme-color in sync
  var isDark = p === 'dark' || (p !== 'light' && window.matchMedia('(prefers-color-scheme:dark)').matches);
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = isDark ? '#1c1714' : '#f4f1ee';
}
function setTheme(pref) {
  S.prefs.theme = pref;
  save();
  applyTheme(pref);
  renderPanel(activeTab); // re-render to update button states
}

function t(key) {
  var l = (S && S.prefs && S.prefs.lang) ? S.prefs.lang : 'de';
  return (STRINGS[l] && STRINGS[l][key] !== undefined) ? STRINGS[l][key] : (STRINGS.de[key] || key);
}

function applyLang() {
  var l = (S && S.prefs && S.prefs.lang) ? S.prefs.lang : 'de';
  VERSE = (l === 'en') ? VERSE_EN : VERSE_DE;
  QUALITAETEN = (l === 'en') ? QUALITAETEN_EN : QUALITAETEN_DE;
  REZITATION = (l === 'en') ? REZITATION_EN : REZITATION_DE;
  KONTEMPLATIONEN = (l === 'en') ? KONTEMPLATIONEN_EN : KONTEMPLATIONEN_DE;
  QUIZ = (l === 'en') ? QUIZ_EN : QUIZ_DE;
  ERINNERUNGEN = (l === 'en') ? ERINNERUNGEN_EN : ERINNERUNGEN_DE;
  ASSESSMENT_FRAGEN = (l === 'en') ? ASSESSMENT_FRAGEN_EN : ASSESSMENT_FRAGEN_DE;
  // update tab labels
  var tabs = [{tab:'heute',key:'tab_heute'},{tab:'lehre',key:'tab_lehre'},{tab:'praxis',key:'tab_praxis'},{tab:'tagebuch',key:'tab_tagebuch'},{tab:'bogen',key:'tab_weg'}];
  tabs.forEach(function(x){
    var btn = document.querySelector('#tabbar button[data-tab="'+x.tab+'"]');
    if (btn) { var tn = btn.lastChild; if (tn && tn.nodeType === 3) tn.textContent = '\n      '+t(x.key)+'\n    '; }
  });
}

function setLang(l) {
  S.prefs.lang = l;
  save();
  applyLang();
  renderPanel(activeTab);
}

function todayISO() {
  const d = new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function dateISO(d) { return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n) { return String(n).padStart(2,"0"); }
function fmtDateLong(iso) {
  const dt = new Date(iso+"T12:00:00");
  return dt.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
}
function esc(s) {
  return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function getQ(id) { return QUALITAETEN.find(q=>q.id===id); }

// ── Lernpfad helpers ──
function pathKey(qid, aspect) { return qid + '_' + aspect; }
function isPathDone(qid, aspect) { return !!(S.path && S.path[pathKey(qid, aspect)]); }
function allRowDone(qid) { return ['studium','kontemplation','meditation'].every(a => isPathDone(qid, a)); }
function isQualitySoftLocked(qid) {
  const idx = QUALITAETEN.findIndex(q => q.id === qid);
  if (idx <= 0) return false;
  return !allRowDone(QUALITAETEN[idx - 1].id);
}
function needsAssessmentPrompt() {
  if (!S.lastAssessmentPrompt) return true;
  const last = new Date(S.lastAssessmentPrompt + 'T12:00:00');
  return (Date.now() - last.getTime()) / 86400000 >= 14;
}

function toast(msg, ms=2200) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), ms);
}

function streak() {
  if (!S.sessions.length) return 0;
  const dates = new Set(S.sessions.map(s=>s.date));
  let n=0, d=new Date();
  while (dates.has(dateISO(d))) { n++; d.setDate(d.getDate()-1); }
  if (n===0) {
    d = new Date(Date.now()-86400000);
    while (dates.has(dateISO(d))) { n++; d.setDate(d.getDate()-1); }
  }
  return n;
}

function longestStreak() {
  if (!S.sessions.length) return 0;
  const dates = [...new Set(S.sessions.map(s=>s.date))].sort();
  let best=1, cur=1;
  for (let i=1;i<dates.length;i++) {
    const diff=(new Date(dates[i]+'T12:00:00')-new Date(dates[i-1]+'T12:00:00'))/86400000;
    if (diff===1){cur++;if(cur>best)best=cur;}else cur=1;
  }
  return best;
}

function thisWeekStats() {
  const today=new Date(), dow=today.getDay();
  const daysSinceMon=(dow===0)?6:dow-1;
  const monISO=dateISO(new Date(today.getTime()-daysSinceMon*86400000));
  const wk=S.sessions.filter(s=>s.date>=monISO);
  return { days: new Set(wk.map(s=>s.date)).size, min: wk.reduce((s,x)=>s+(x.duration||0),0) };
}

function calNext() {
  const now=new Date();
  if(calViewDate.getFullYear()===now.getFullYear()&&calViewDate.getMonth()===now.getMonth())return;
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+1, 1);
  const el=document.getElementById('cal-view');

function renderCalMonth(datesSet) {
  const y=calViewDate.getFullYear(), m=calViewDate.getMonth();
  const now=new Date(), isNow=(y===now.getFullYear()&&m===now.getMonth());
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const startDow=((first.getDay()===0)?6:first.getDay()-1);
  const monthLabel=first.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const monthSess=S.sessions.filter(s=>s.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
  const monthDays=new Set(monthSess.map(s=>s.date)).size;
  const monthMin=monthSess.reduce((s,x)=>s+(x.duration||0),0);
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d), iso=dateISO(dt);
    const done=datesSet.has(iso), today=iso===todayISO(), future=dt>now;
    cells+=`<div class="cal-day${done?' done':''}${today?' today':''}${future?' future':''}">${d}</div>`;
  }
  return `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span style="font-weight:600;font-size:.92rem;">${monthLabel}</span>
      <button class="cal-nav-btn" onclick="calNext()" ${isNow?'disabled':''}>›</button>
    </div>
    <div class="cal-head"><div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div></div>
    <div class="cal-wrap">${cells}</div>
    <div style="display:flex;gap:16px;margin-top:10px;">
      <span class="small muted">${monthDays} Tage geübt</span>
      <span class="small muted">${monthMin} Minuten</span>
    </div>`;
}

function todayReminder() {

  const pool = ERINNERUNGEN.filter(r=>r.q===phase||r.q==="alle");

  return pool[seed % pool.length];

function bell() {
  if (!S.prefs.bell) return;
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 432;
    g.gain.value = 0; o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.linearRampToValueAtTime(0.28, ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+2.8);
    o.stop(ctx.currentTime+3); setTimeout(()=>ctx.close(),3500);
  } catch(e){}
}

var _readerNr = null;
var _readerSelection = '';
var _readerParaIdx = null;
var _readerAnnotMap = {};

// A1: font size control
const READER_FONT_SIZES = [0.88, 1.05, 1.2, 1.38]; // rem steps
function _readerFontIdx() {
  var i = S.prefs && S.prefs.readerFontIdx;
  return (i !== undefined && i !== null) ? i : 1;
}
function _applyReaderFont(idx) {
  var sz = READER_FONT_SIZES[Math.max(0, Math.min(idx, READER_FONT_SIZES.length - 1))];
  var content = document.getElementById('reader-content');
  if (content) content.style.setProperty('--reader-fs', sz + 'rem');
  var dBtn = document.getElementById('reader-font-down');
  var uBtn = document.getElementById('reader-font-up');
  if (dBtn) dBtn.disabled = idx <= 0;
  if (uBtn) uBtn.disabled = idx >= READER_FONT_SIZES.length - 1;
}
function _readerFontDown() {
  var idx = Math.max(0, _readerFontIdx() - 1);
  S.prefs.readerFontIdx = idx; save(); _applyReaderFont(idx);
}
function _readerFontUp() {
  var idx = Math.min(READER_FONT_SIZES.length - 1, _readerFontIdx() + 1);
  S.prefs.readerFontIdx = idx; save(); _applyReaderFont(idx);
}

// D1: navigation helpers
function _readerNavList() {
  var withText = EINHEITEN_TEXTE.map(function(x){ return x.nr; });
  return EINHEITEN
    .filter(function(e){ return withText.indexOf(e.nr) !== -1; })
    .map(function(e){ return e.nr; });
}
function _updateReaderNav(nr) {
  var list = _readerNavList();
  var i = list.indexOf(nr);
  var prev = document.getElementById('reader-nav-prev');
  var next = document.getElementById('reader-nav-next');
  var ctr  = document.getElementById('reader-nav-ctr');
  if (prev) prev.disabled = i <= 0;
  if (next) next.disabled = i >= list.length - 1;
  if (ctr)  ctr.textContent = (i + 1) + ' / ' + list.length;
}
function _readerPrev() {
  var list = _readerNavList();
  var i = list.indexOf(_readerNr);
  if (i > 0) _readerGoTo(list[i - 1]);
}
function _readerNext() {
  var list = _readerNavList();
  var i = list.indexOf(_readerNr);
  if (i < list.length - 1) _readerGoTo(list[i + 1]);
}
function _readerGoTo(nr) {
  // Flush current scroll position immediately before navigating
  var content = document.getElementById('reader-content');
  if (content && _readerNr !== null) {
    if (!S.prefs.readerPos) S.prefs.readerPos = {};
    S.prefs.readerPos[_readerNr] = content.scrollTop;
    save();
  }
  openReader(nr);
}
document.addEventListener('selectionchange', function() {
  if (_readerNr === null) return;
  var s = window.getSelection();
  var selTxt = s ? s.toString().trim() : '';
  _readerSelection = selTxt;

  var selBtn  = document.getElementById('reader-sel-btn');
  var noteBtn = document.getElementById('reader-note-btn');

  if (selTxt && s && s.anchorNode) {
    // Track which paragraph was selected
    var node = s.anchorNode;
    while (node && node.nodeName !== 'P') node = node.parentNode;
    if (node) {
      var paras = document.getElementById('reader-content').querySelectorAll('p');
      var idx = Array.prototype.indexOf.call(paras, node);
      _readerParaIdx = idx >= 0 ? idx + 1 : null;
    }

    // A3: position floating bubble near selection
    if (selBtn && s.rangeCount) {
      var rect = s.getRangeAt(0).getBoundingClientRect();
      if (rect.width > 0) {
        var btnW = 160;
        var topAbove = rect.top - 46;
        var topBelow = rect.bottom + 8;
        var top = topAbove > 70 ? topAbove : topBelow;
        var left = Math.max(10, Math.min(window.innerWidth - btnW - 10,
          rect.left + rect.width / 2 - btnW / 2));
        selBtn.style.top  = top  + 'px';
        selBtn.style.left = left + 'px';
        selBtn.textContent = t('reader_notiz_sel') || 'Notiz zu Auswahl';
        selBtn.classList.add('visible');
      }
    }
    if (noteBtn) noteBtn.classList.add('has-sel');
  } else {
    _readerParaIdx = null;
    if (selBtn) selBtn.classList.remove('visible');
    if (noteBtn) noteBtn.classList.remove('has-sel');
  }
});
function openReader(nr) {
  var e = EINHEITEN.find(function(x){ return x.nr===nr; });
  var data = EINHEITEN_TEXTE.find(function(x){ return x.nr===nr; });
  if (!data || !e) return;
  _readerNr = nr;
  document.getElementById('reader-title').textContent = e.titel;
  // A3: reset header note-button to inactive state
  var _nb = document.getElementById('reader-note-btn');
  if (_nb) { _nb.textContent = t('reader_notiz_leer') || 'Notiz'; _nb.classList.remove('has-sel'); }
  // D2: Breadcrumb subtitle
  var navList = _readerNavList();
  var navIdx  = navList.indexOf(nr);
  var sub = document.getElementById('reader-subtitle');
  if (sub) sub.textContent = (t('lehre_einheit')||'Sitzung') + ' ' + nr
    + (navIdx !== -1 ? ' · ' + (navIdx + 1) + ' / ' + navList.length : '');
  _updateReaderNav(nr);
  // D3 + C2: remember last opened unit; mark as seen
  if (!S.prefs) S.prefs = {};
  S.prefs.lastReaderNr = nr;
  if (!S.prefs.readerSeen) S.prefs.readerSeen = {};
  S.prefs.readerSeen[nr] = true;
  save();
  var bg = document.getElementById('reader-bg');
  var content = document.getElementById('reader-content');
  content.innerHTML = data.absaetze.map(function(p){ return '<p>'+esc(p)+'</p>'; }).join('');
  _applyReaderFont(_readerFontIdx()); // A1: restore saved font size
  bg.style.display = 'flex';

  // Build annotation map: paraIdx (1-based) → [session, ...]  (B1: uses source field)
  _readerAnnotMap = {};
  S.sessions.forEach(function(sess) {
    if (sess.source && sess.source.sitzungNr === nr && sess.source.paraIdx) {
      var idx = sess.source.paraIdx;
      if (!_readerAnnotMap[idx]) _readerAnnotMap[idx] = [];
      _readerAnnotMap[idx].push(sess);
    }
  });
  // Mark annotated paragraphs (B2: show count badge when >1 entry)
  var paras = content.querySelectorAll('p');
  paras.forEach(function(p, i) {
    var annots = _readerAnnotMap[i + 1];
    if (annots) {
      p.classList.add('p-annotated');
      if (annots.length > 1) p.dataset.annotCount = annots.length;
    }
  });

  var pos = S.prefs.readerPos && S.prefs.readerPos[nr] || 0;
  content.scrollTop = pos;
  // A2: initial progress fill
  var _progFill = document.getElementById('reader-progress-fill');
  function _updateProgress() {
    var total = content.scrollHeight - content.clientHeight;
    if (_progFill) _progFill.style.width = (total > 0 ? Math.min(100, content.scrollTop / total * 100) : 0) + '%';
  }
  _updateProgress();
  var _saveTimer = null;
  content.onscroll = function() {
    _updateProgress();
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(function(){
      if (!S.prefs.readerPos) S.prefs.readerPos = {};
      S.prefs.readerPos[nr] = content.scrollTop;
      save();
    }, 500);
  };
}

  var p = e.target.closest('p.p-annotated');
  if (!p) return;
  var paras = document.getElementById('reader-content').querySelectorAll('p');
  var idx = Array.prototype.indexOf.call(paras, p) + 1;
  var entries = _readerAnnotMap[idx];
  if (entries && entries.length) _showReaderAnnotSheet(entries);
});
function readerNote() {
  var sel = _readerSelection ? _readerSelection.trim() : '';
  var src = null;
  if (_readerNr) {
    src = { sitzungNr: _readerNr, paraIdx: _readerParaIdx || null, snippet: sel };
  }
  _readerSelection = '';
  _readerParaIdx = null;
  _closeReader();
  showLogSheet({ source: src, mode: 'Transkript' });
}

function renderHeute() {
  try {
    const str = streak(), wk = weekSessions();
    const wkMin = wk.reduce((s,x) => s + (x.duration||0), 0);
    const phase = getQ(S.arc.currentPhase) || QUALITAETEN[0];
    const rem = todayReminder() || ERINNERUNGEN[0];
    const todaySess = S.sessions.filter(s => s.date === todayISO());

    let sessHtml = '';
    if (todaySess.length) {
      let rows = '';
      todaySess.forEach(function(s) {
        const q = getQ(s.focus);
        const pillClass = q ? q.farbe : 'neutral';
        const pillName = q ? q.name : (s.focus || '–');
        const notesHtml = s.notes ? '<div class="j-text">' + displayNotes(s.notes) + '</div>' : '';
        rows += '<div class="j-entry">'
          + '<div class="j-date">' + (s.duration ? s.duration + ' min · ' : '')
          + '<span class="pill ' + pillClass + '">' + pillName + '</span>'
          + (s.mode ? ' · ' + esc(s.mode) : '') + '</div>'
          + notesHtml + '</div>';
      });
      sessHtml = '<div class="card"><div class="label" style="margin-bottom:8px;">'+t('heute_geuebt')+'</div>' + rows + '</div>';
    } else {
      sessHtml = '<div class="card">'
        + '<div class="label" style="margin-bottom:8px;">'+t('heute_nicht_geuebt')+'</div>'
        + '<div class="small muted" style="margin-bottom:12px;">'+t('heute_fuenf_min')+'</div>'
        + '<div class="btn-row">'
        + '<button class="btn-primary" onclick="quickStart(\'verse\')">'+t('heute_vers')+'</button>'

        + '<button class="btn-secondary" onclick="quickStart(\'kontemplation\')">'+t('heute_kontempl')+'</button>'
        + '</div>'
        + '<button class="btn-ghost" onclick="showLogSheet()" style="margin-top:8px;padding-left:0;">'+t('heute_nur_eintragen')+'</button>'
        + '</div>';
    }

    const remPillClass = rem.q === 'alle' ? 'neutral' : rem.q;
    const remPillText = rem.q === 'alle' ? 'alle vier' : (getQ(rem.q) ? getQ(rem.q).name : '');

    const greet = timeGreeting();
    const heroSvgIcon = '<svg class="hero-time-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">' + greet.svg + '</svg>';
    const heroDots = [
      [14,12,3,.4],[78,8,4,.25],[88,55,3,.3],[6,70,2.5,.2],[55,18,2,.35],
      [34,82,3.5,.15],[92,30,2,.4],[20,40,2,.2],[68,78,4,.18],[45,5,2.5,.3]
    ].map(function(d){return '<div class="hero-dot" style="left:'+d[0]+'%;top:'+d[1]+'%;width:'+d[2]+'px;height:'+d[2]+'px;opacity:'+d[3]+';"></div>';}).join('');
    const heroGlows = '<div class="hero-glow" style="width:180px;height:180px;background:rgba(255,255,255,.07);top:-60px;right:-50px;"></div>'
      + '<div class="hero-glow" style="width:120px;height:120px;background:rgba(255,255,255,.05);bottom:10px;left:-30px;"></div>';

    const html = '<div class="hero-today" style="background:' + heroGradient(phase.id) + ';">'
      + heroGlows + heroDots
      + '<div class="hero-time-row">' + heroSvgIcon + greet.label + '</div>'
      + '<div class="hero-quality-name">' + esc(phase.name) + '</div>'
      + '<div class="hero-quality-sanskrit">' + esc(phase.sanskrit) + '</div>'
      + '<div class="hero-bild">' + esc(phase.bild) + '</div>'
      + '<div class="hero-stats-row">'
      + (S.sessions.length === 0
          ? '<div class="hero-stat" style="flex:1;text-align:center;"><span class="hero-stat-num" style="font-size:1.1rem;opacity:.85;">'+t('heute_erste_sitzung')+'</span><span class="hero-stat-label">'+t('heute_auch_5')+'</span></div>'
          : '<div class="hero-stat"><span class="hero-stat-num">' + str + '</span><span class="hero-stat-label">'+t('heute_tage')+'</span></div>'

      + '</div>'
      + '<div class="card">'
      + '<div class="label" style="margin-bottom:8px;">'+t('heute_fokus')+'</div>'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'
      + '<span class="pill ' + phase.farbe + '">' + phase.name + '</span>'
      + '<span class="small muted">' + phase.sanskrit + '</span></div>'
      + '<div class="small" style="color:var(--ink-soft);margin-bottom:12px;">' + esc(phase.kernpunkt) + '</div>'
      + '<div class="btn-row">'
      + '<button class="btn-primary" onclick="switchTab(\'praxis\')">'+t('heute_jetzt_ueben')+'</button>'
      + '<button class="btn-secondary" onclick="switchTab(\'bogen\')">'+t('heute_weg')+'</button>'
      + '</div></div>'
      + (needsAssessmentPrompt()
          ? '<div class="card" style="border-left:4px solid var(--accent);">'
            + '<div class="label" style="margin-bottom:6px;">'+t('heute_selbst')+'</div>'
            + '<div class="small" style="color:var(--ink-soft);margin-bottom:10px;">'+t('heute_selbst_text')+'</div>'
            + '<button class="btn-secondary" onclick="showAssessmentSheet(\'' + phase.id + '\')" style="padding:10px 18px;">'+t('heute_jetzt_einsch')+'</button>'
            + '</div>'
          : '')
      + (function(){
          var lastNr = S.prefs && S.prefs.lastReaderNr;
          if (!lastNr) return '';
          var lastE = EINHEITEN.find(function(x){ return x.nr===lastNr; });
          if (!lastE) return '';
          var hasText = typeof EINHEITEN_TEXTE !== 'undefined' && EINHEITEN_TEXTE.find(function(x){ return x.nr===lastNr; });
          if (!hasText) return '';
          var pos = S.prefs.readerPos && S.prefs.readerPos[lastNr] || 0;
          var pct = pos > 0 ? Math.min(100, Math.round(pos / 1000)) : 0; // rough indicator
          return '<div class="card" onclick="openReader('+lastNr+')" style="cursor:pointer;display:flex;align-items:center;gap:12px;">'
            + '<div style="font-size:1.4rem;line-height:1;">📖</div>'
            + '<div style="flex:1;min-width:0;">'
            + '<div class="label" style="margin-bottom:2px;">'+t('heute_weiterlesen')+'</div>'
            + '<div class="small" style="color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(lastE.titel)+'</div>'
            + '<div class="small muted">'+(t('lehre_einheit')||'Sitzung')+' '+lastNr+'</div>'
            + '</div>'
            + '<div style="color:var(--accent);font-size:1.1rem;">›</div>'
            + '</div>';
        })()
      + sessHtml;

    document.getElementById("panel-heute").innerHTML = html;
  } catch(err) {
    document.getElementById("panel-heute").innerHTML = '<div class="card"><div class="card-title">Fehler beim Laden</div><div class="small muted">' + String(err) + '</div></div>';
    console.error("renderHeute:", err);
  }
}

let RN = { mode:null, step:0, steps:[], t0:null, timer:null, dur:0, qId:null };

function startMode(mode) {
  const el = document.getElementById("runner");
  if (!el) { switchTab('praxis'); setTimeout(()=>startMode(mode),80); return; }
  if (mode==="stille") { showTimerSetup(); return; }
  if (mode==="kontemplation") { showKontemplationListe(S.arc.currentPhase); return; }

  el.style.display="block";
  el.scrollIntoView({behavior:"smooth",block:"start"});

  if (mode==="rezitation") {
    RN = { mode, step:0, t0:Date.now(), timer:null, dur:5, qId:null, steps:[
      {stage:t('runner_vor'), text:t('runner_rez_text'), it:false},
      {stage:t('rez_titel'), text:REZITATION, it:true},
      {stage:t('runner_verweilen'), text:t('runner_rez_verweilen'), it:false},
      {stage:t('runner_abschluss'), text:t('runner_rez_abschluss'), it:false},
    ]};
  } else if (mode==="verse") {
    if (S.verseIdx === undefined) S.verseIdx = 0;
    const idx = S.verseIdx % VERSE.length;
    const v = VERSE[idx];
    S.verseIdx = idx + 1; save();
    RN = { mode, step:0, t0:Date.now(), timer:null, dur:8, qId:null, steps:[
      {stage:t('lehre_vers_lbl')+' '+v.n+' / '+VERSE.length+' · Longchenpa', text:v.text, it:true},
      {stage:t('runner_verweilen'), text:t('runner_vers_verweilen'), it:false},
      {stage:t('runner_abschluss'), text:t('runner_vers_abschluss'), it:false},
    ]};
  }
  renderRunner();
}

function showKontemplationListe(qId) {
  const el = document.getElementById("runner");
  if (!el) return;
  el.style.display="block";
  el.scrollIntoView({behavior:"smooth",block:"start"});
  const q = getQ(qId);
  const list = KONTEMPLATIONEN[qId]||[];
  el.innerHTML = `
    <div style="margin-bottom:12px;">
      <div class="label" style="margin-bottom:6px;">${t('kontempl_titel')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
        ${QUALITAETEN.map(x=>`<button class="btn-${x.id===qId?'secondary':'ghost'}" onclick="showKontemplationListe('${x.id}')" style="padding:6px 12px;font-size:.82rem;">${x.name}</button>`).join('')}
      </div>
      ${list.map((k,i)=>`
        <div class="list-item" onclick="startKontemplation('${qId}',${i})">
          <div class="li-title">${esc(k.titel)}</div>
          <div class="li-sub">${k.schritte.length}${t('schritte')}</div>
        </div>
      `).join('')}
    </div>
    <button class="btn-ghost" onclick="endRunner()" style="padding:8px 0;">${t('schliessen')}</button>
  `;
}

function startKontemplation(qId, idx) {
  const k = KONTEMPLATIONEN[qId][idx];
  const q = getQ(qId);
  RN = { mode:"kontemplation", step:0, t0:Date.now(), timer:null, dur:0, qId, steps:[
    {stage:t('runner_vor')+' · '+q.name, text:t('kontempl_vor_text'), it:false},
    ...k.schritte.map(s=>({stage:esc(k.titel), text:s, it:false})),
    {stage:t('runner_verweilen'), text:t('kontempl_verweilen'), it:false},
    {stage:t('runner_abschluss'), text:t('kontempl_abschluss'), it:false},
  ]};
  const el = document.getElementById("runner");
  if (el) { el.style.display="block"; el.scrollIntoView({behavior:"smooth",block:"start"}); }
  renderRunner();
}

function renderRunner() {
  const el = document.getElementById("runner");
  if (!el) return;
  const step = RN.steps[RN.step];
  if (!step) { endRunner(); return; }
  el.innerHTML = `
    <div class="runner-stage">${esc(step.stage||'')} · ${RN.step+1}/${RN.steps.length}</div>
    <div class="runner-text${step.it?' italic':''}">${esc(step.text)}</div>
    <div class="runner-controls">
      ${RN.step>0?`<button class="btn-secondary" onclick="rnPrev()">${t('runner_zurueck')}</button>`:''}
      ${RN.step<RN.steps.length-1
        ?`<button class="btn-primary" onclick="rnNext()">${t('runner_weiter')}</button>`
        :`<button class="btn-primary" onclick="finishRunner()">${t('runner_abschliessen')}</button>`}
      <button class="btn-ghost" onclick="endRunner()">${t('runner_beenden')}</button>
    </div>
  `;
}

function rnNext() { RN.step=Math.min(RN.steps.length-1,RN.step+1); renderRunner(); }
function rnPrev() { RN.step=Math.max(0,RN.step-1); renderRunner(); }

function finishRunner() {
  const mins = Math.max(1,Math.round((Date.now()-RN.t0)/60000));
  showLogSheet({ duration:mins, focus:RN.qId||S.arc.currentPhase, mode:RN.mode, afterSave:()=>endRunner() });
}

function endRunner() {
  if (RN.timer) clearInterval(RN.timer);
  const el = document.getElementById("runner");
  if (el && el.closest('#sheet-content')) { _closeSheet(); }
  else if (el) { el.style.display="none"; el.innerHTML=""; }
  RN = { mode:null, step:0, steps:[], t0:null, timer:null, dur:0, qId:null };
}

function showTimerSetup() {
  const el = document.getElementById("runner");
  el.style.display="block";
  el.innerHTML = `
    <div style="margin-bottom:16px;"><strong>${t('timer_titel')}</strong></div>
    <label class="field"><span>${t('timer_dauer')}</span>
      <input type="number" id="timer-dur" value="${S.prefs.timerDefault}" min="1" max="180" style="max-width:120px;">
    </label>
    <label class="field" style="display:flex;align-items:center;gap:8px;font-size:.9rem;">
      <input type="checkbox" id="timer-bell" ${S.prefs.bell?'checked':''}>
      ${t('timer_glocke')}
    </label>
    <div class="btn-row">
      <button class="btn-primary" onclick="startTimer()">${t('timer_start')}</button>
      <button class="btn-ghost" onclick="endRunner()">${t('runner_abbrechen')}</button>
    </div>
  `;
}

function startTimer() {
  const dur = parseInt(document.getElementById("timer-dur").value,10)||20;
  const useBell = document.getElementById("timer-bell").checked;
  S.prefs.timerDefault = dur; S.prefs.bell = useBell; save();
  if (useBell) bell();
  let rem = dur * 60;
  RN.mode="stille"; RN.t0=Date.now(); RN.dur=dur;

  const el = document.getElementById("runner");
  const total = dur * 60;
  const circ = 534;
  const draw = () => {
    const m=Math.floor(rem/60), s=rem%60;
    const offset = Math.round(circ * rem / total);
    el.innerHTML = `
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="85" fill="none" stroke="var(--line)" stroke-width="8"/>
          <circle cx="90" cy="90" r="85" fill="none" stroke="var(--accent)" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
        </svg>
        <div class="timer-display">${m}:${pad(s)}</div>
      </div>
      <div class="small muted" style="text-align:center;margin-bottom:20px;">${t('runner_stille')}</div>
      <div class="runner-controls">
        <button class="btn-secondary" onclick="finishRunner()">${t('runner_beenden_eintragen')}</button>
        <button class="btn-ghost" onclick="endRunner()">Abbrechen</button>
      </div>
    `;
  };
  draw();
  RN.timer = setInterval(()=>{
    rem--;
    if (rem<=0) { clearInterval(RN.timer); if(useBell)bell(); finishRunner(); return; }
    draw();
  },1000);
}

let _logAfter = null;

var _editId = null;
var _logSource = null;  // B1: structured annotation source { sitzungNr, paraIdx, snippet }

function editLog(id) {
  const s = S.sessions.find(function(x){ return x.id === id; });
  if (!s) return;
  showLogSheet({ id: s.id, date: s.date, duration: s.duration, focus: s.focus, mode: s.mode, notes: s.notes, source: s.source || null });
}

function _fmt(type) {
  var el = document.getElementById('log-notes');
  if (!el) return;
  el.focus();
  if (type === 'bold')   document.execCommand('bold',   false, null);
  if (type === 'italic') document.execCommand('italic', false, null);
  if (type === 'ul')     document.execCommand('insertUnorderedList', false, null);
  if (type === 'quote')  document.execCommand('formatBlock', false, 'blockquote');
}
// Display notes: HTML (new entries) shown directly, plain/markdown text rendered via renderMd
function displayNotes(text) {
  if (!text) return '';
  if (/<[a-z][\s\S]*>/i.test(text)) return text;
  return renderMd(text);
}
function renderMd(text) {
  if (!text) return '';
  // Collect consecutive list lines into <ul> blocks
  var lines = text.split('\n');
  var out = []; var inList = false;
  lines.forEach(function(line) {
    var li = line.match(/^[-*] (.+)/);
    if (li) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + _mdInline(li[1]) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      var bq = line.match(/^> (.+)/);
      if (bq) { out.push('<blockquote>' + _mdInline(bq[1]) + '</blockquote>'); }
      else if (line.trim() === '') { out.push(''); }
      else { out.push('<p>' + _mdInline(line) + '</p>'); }
    }
  });
  if (inList) out.push('</ul>');
  // Collapse adjacent empty strings (blank lines between blocks)
  return out.filter(function(l,i){ return !(l==='' && (i===0||out[i-1]===''));}).join('');
}
function _mdInline(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/_(.+?)_/g,       '<em>$1</em>');
}
function _updateLogSummary() {
  var el = document.getElementById('log-meta-summary');
  if (!el) return;
  var date = (document.getElementById('log-date')||{}).value || '';
  var dur  = (document.getElementById('log-dur')||{}).value  || '';
  var focusEl = document.getElementById('log-focus');
  var focusLabel = focusEl ? focusEl.options[focusEl.selectedIndex].text.split(' (')[0] : '';
  var mode = (document.getElementById('log-mode')||{}).value || '';
  var parts = [];
  if (date) parts.push(date.split('-').reverse().join('.'));
  if (dur)  parts.push(dur + ' min');
  if (focusLabel) parts.push(focusLabel);
  if (mode) parts.push(mode);
  el.innerHTML = parts.map(function(p,i){
    return '<span>' + esc(p) + '</span>' + (i < parts.length-1 ? '<span style="opacity:.35">·</span>' : '');
  }).join('');
}
function showLogSheet(pre={}) {
  _logAfter = pre.afterSave||null;
  _editId = pre.id||null;
  _logSource = pre.source||null;   // B1
  const focus = pre.focus||S.arc.currentPhase;
  const dur = pre.duration||"";
  const mode = pre.mode||"";
  const date = pre.date||todayISO();
  const notes = pre.notes||"";
  const isEdit = !!_editId;
  // B1: source context block (shown when annotation-linked)
  const srcBlock = _logSource && _logSource.snippet ? `
    <div class="source-context">
      <div class="source-ref">${t('reader_quelle')} · ${t('lehre_einheit')} ${_logSource.sitzungNr}${_logSource.paraIdx ? ' · ' + t('reader_abschnitt') + ' ' + _logSource.paraIdx : ''}</div>
      <blockquote>„${esc(_logSource.snippet)}"</blockquote>
    </div>` : '';
  openSheet(`
    <h2>${isEdit ? t('log_bearbeiten') : t('log_eintragen_neu')}</h2>
    <div id="log-meta-summary"></div>
    <div id="log-meta-fields">
      <label class="field"><span>${t('log_datum')}</span>
        <input type="date" id="log-date" value="${date}" oninput="_updateLogSummary()">
      </label>
      <label class="field"><span>${t('log_dauer')}</span>
        <input type="number" id="log-dur" value="${dur}" placeholder="z.B. 20" min="0" oninput="_updateLogSummary()">
      </label>
      <label class="field"><span>${t('log_fokus')}</span>
        <select id="log-focus" onchange="_updateLogSummary()">
          ${QUALITAETEN.map(q=>`<option value="${q.id}"${q.id===focus?' selected':''}>${q.name} (${q.sanskrit})</option>`).join('')}
          <option value="alle"${focus==='alle'?' selected':''}>${t('log_alle_vier')}</option>
        </select>
      </label>
      <label class="field"><span>${t('log_modus')}</span>
        <input type="text" id="log-mode" value="${esc(mode)}" placeholder="${t('log_modus_ph')}" oninput="_updateLogSummary()">
      </label>
    </div>
    ${srcBlock}
    <div id="log-notes-wrap">
      <label class="field" style="flex:1;display:flex;flex-direction:column;min-height:0;">
        <span id="log-notes-label">${t('log_erfahrung')}</span>
        <div class="md-toolbar">
          <button class="md-btn" type="button" onpointerdown="event.preventDefault()" onclick="_fmt('bold')"><strong>B</strong></button>
          <button class="md-btn" type="button" onpointerdown="event.preventDefault()" onclick="_fmt('italic')"><em>I</em></button>
          <button class="md-btn" type="button" onpointerdown="event.preventDefault()" onclick="_fmt('ul')">• –</button>
          <button class="md-btn" type="button" onpointerdown="event.preventDefault()" onclick="_fmt('quote')">" "</button>
        </div>
        <div id="log-notes" class="notes-editor j-text" contenteditable="true"
          data-placeholder="${t('log_notes_ph')}" style="flex:1;"></div>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveLog()">${isEdit ? t('log_speichern') : t('log_eintragen')}</button>
      <button class="btn-secondary" onclick="_closeSheet()">Abbrechen</button>
    </div>
  `);
  // Fill contenteditable with pre-existing content
  var el = document.getElementById('log-notes');
  var sbg = document.getElementById('sheet-bg');
  if (notes) {
    // HTML content (new entries) shown directly; plain/markdown shown as text
    if (/<[a-z][\s\S]*>/i.test(notes)) el.innerHTML = notes;
    else el.textContent = notes;
  }
  _updateLogSummary();
  // Writing-mode expand on focus (debounced blur so toolbar taps don't collapse)
  var _blurTimer = null;
  el.addEventListener('focus', function() {
    clearTimeout(_blurTimer);
    sbg.classList.add('writing');
  });
  el.addEventListener('blur', function() {
    _blurTimer = setTimeout(function() { sbg.classList.remove('writing'); }, 250);
  });
}

function saveLog() {
  const date  = document.getElementById("log-date").value.trim()||todayISO();
  const dur   = parseInt(document.getElementById("log-dur").value,10)||0;
  const focus = document.getElementById("log-focus").value;
  const mode  = document.getElementById("log-mode").value.trim();
  const notesEl = document.getElementById("log-notes");
  const notes = notesEl ? notesEl.innerHTML.trim() : '';
  const sourceToSave = _logSource || undefined;
  _logSource = null;
  if (_editId) {
    const idx = S.sessions.findIndex(function(s){ return s.id === _editId; });
    if (idx !== -1) {
      const upd = {date,duration:dur,focus,mode,notes};
      if (sourceToSave !== undefined) upd.source = sourceToSave;
      S.sessions[idx] = Object.assign(S.sessions[idx], upd);
    }
    _editId = null;
  } else {
    const newSess = {id:uid(),date,duration:dur,focus,mode,notes};
    if (sourceToSave) newSess.source = sourceToSave;
    S.sessions.unshift(newSess);
    S.sessionsSinceBackup = (S.sessionsSinceBackup || 0) + 1;
  }
  save();
  // auto-complete Lernpfad milestones
  if (QUALITAETEN.find(q => q.id === focus)) {
    const ml = mode.toLowerCase();
    if (!S.path) S.path = {};
    let changed = false;
    if (ml === 'kontemplation' || ml.includes('kontempl')) {
      if (!S.path[pathKey(focus,'kontemplation')]) { S.path[pathKey(focus,'kontemplation')] = true; changed = true; }
    }
    if (ml === 'stille' || ml.includes('medit')) {
      if (!S.path[pathKey(focus,'meditation')]) { S.path[pathKey(focus,'meditation')] = true; changed = true; }
    }
    if (changed) save();
  }
  _closeSheet(); toast(t('log_eingetragen'));
  if (_logAfter) { _logAfter(); _logAfter=null; }
  renderPanel(activeTab);
  checkBackupDue();
}

function renderLernpfad() {
  const aspects = [
    { key:'studium',      label:t('lp_studium'),   icon:'S' },
    { key:'kontemplation',label:t('lp_kontempl'), icon:'K' },
    { key:'meditation',   label:t('lp_medit'),    icon:'M' }
  ];
  const rows = QUALITAETEN.map(q => {
    const locked = isQualitySoftLocked(q.id);
    const c = Q_COLOR[q.id];
    const cells = aspects.map(a => {
      const done = isPathDone(q.id, a.key);
      const style = done ? `background:${c};border-color:${c};` : '';
      const fn = a.key === 'studium'
        ? `showQuizSheet('${q.id}')`
        : `showPathInfo('${q.id}','${a.key}')`;
      return `<div class="path-cell${done?' done':''}${locked?' soft-locked':''}" style="${style}" onclick="${fn}">
        <div class="path-cell-icon">${done ? '✓' : '○'}</div>
        <div>${a.label}</div>
      </div>`;
    }).join('');
    return `<div class="path-row">
      <div class="path-q">

        <div class="path-q-sub">${q.sanskrit}</div>

  }).join('');
  return `<div class="card">

}

// ── Quiz ──
let quizState = { qid: null, answers: {}, submitted: false };

function showQuizSheet(qid) {
  const q = getQ(qid);
  const done = isPathDone(qid, 'studium');
  quizState = { qid, answers: {}, submitted: false };
  if (done) {
    openSheet(`
      <h2>Studium · <span class="pill ${q.farbe}">${q.name}</span></h2>
      <div style="color:#1a5c3a;font-weight:600;margin-bottom:10px;">✓ Quiz abgeschlossen</div>
      <div class="small muted" style="margin-bottom:14px;">Das Studium f\xFCr diese Qualit\xE4t wurde bereits abgeschlossen.</div>
      <button class="btn-ghost" onclick="showQuizContent('${qid}')">Quiz wiederholen</button>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-secondary" onclick="_closeSheet()">Schlie\xDFen</button>
      </div>
    `);
    return;
  }
  showQuizContent(qid);
}

function showQuizContent(qid) {
  quizState = { qid, answers: {}, submitted: false };
  _renderQuiz();
}

function _renderQuiz() {
  const qid = quizState.qid;
  const q = getQ(qid);
  const questions = QUIZ[qid] || [];
  const body = questions.map((qu, qi) => {
    const sel = quizState.answers[qi] || [];
    const opts = qu.optionen.map((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      let cls = '';
      if (quizState.submitted) {
        const isCorrect = qu.richtig.includes(oi);
        const isSelected = sel.includes(oi);
        if (isCorrect) cls = ' correct';
        else if (isSelected) cls = ' wrong';
      } else if (sel.includes(oi)) cls = ' selected';
      return '<div class="quiz-opt' + cls + '" onclick="selectQuizOpt(' + qi + ',' + oi + ')">'
        + '<div class="quiz-opt-dot"></div>'
        + '<div class="small"><strong>' + letter + ')</strong> ' + esc(opt) + '</div>'
        + '</div>';
    }).join('');
    const explHtml = quizState.submitted && qu.erklaerung
      ? '<div class="small muted" style="margin-top:6px;padding:8px 10px;background:var(--bg-soft);border-radius:8px;line-height:1.5;">' + esc(qu.erklaerung) + '</div>'
      : '';
    const hintHtml = '<div class="small muted" style="margin-bottom:6px;font-style:italic;">' + esc(qu.hinweis||'') + '</div>';
    return '<div style="margin-bottom:22px;">'
      + '<div style="font-weight:600;margin-bottom:4px;font-size:.92rem;">' + (qi+1) + '. ' + esc(qu.frage) + '</div>'
      + hintHtml
      + opts
      + explHtml
      + '</div>';
  }).join('');

  let resultHtml = '';
  let btns = '<button class="btn-primary" onclick="submitQuiz()">Pr\xFCfen</button>'
    + '<button class="btn-secondary" onclick="_closeSheet()">Abbrechen</button>';

  if (quizState.submitted) {
    const correct = questions.filter((qu, qi) => {
      const sel = (quizState.answers[qi] || []).slice().sort().join(',');
      const exp = qu.richtig.slice().sort().join(',');
      return sel === exp;
    }).length;
    const pass = correct >= Math.ceil(questions.length * 0.6);
    resultHtml = pass
      ? '<div style="background:#c5ecda;color:#1a5c3a;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-weight:600;">✓ ' + correct + '/' + questions.length + ' richtig – Studium abgeschlossen!</div>'
      : '<div style="background:#faf0f1;color:#a23e48;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-weight:600;">✗ ' + correct + '/' + questions.length + ' richtig – nochmals versuchen</div>';
    btns = pass
      ? '<button class="btn-primary" onclick="_closeSheet();renderBogen();">Weiter</button>'
      : '<button class="btn-primary" onclick="showQuizContent(\'' + qid + '\')">Nochmals</button>'
        + '<button class="btn-secondary" onclick="_closeSheet()">Schlie\xDFen</button>';
  }

  openSheet('<h2>Studium \xB7 <span class="pill ' + q.farbe + '">' + q.name + '</span></h2>'
    + '<div id="quiz-result">' + resultHtml + '</div>'
    + '<div id="quiz-body">' + body + '</div>'
    + '<div class="btn-row" id="quiz-btns">' + btns + '</div>');
}

function selectQuizOpt(qi, oi) {
  if (quizState.submitted) return;
  if (!quizState.answers[qi]) quizState.answers[qi] = [];
  const idx = quizState.answers[qi].indexOf(oi);
  if (idx === -1) quizState.answers[qi].push(oi);
  else quizState.answers[qi].splice(idx, 1);
  _renderQuiz();
}

function submitQuiz() {
  const questions = QUIZ[quizState.qid] || [];
  const answered = questions.filter((_, qi) => (quizState.answers[qi]||[]).length > 0).length;
  if (answered < questions.length) { toast('Bitte alle Fragen beantworten.'); return; }
  quizState.submitted = true;
  const correct = questions.filter((qu, qi) => {
    const sel = (quizState.answers[qi] || []).slice().sort().join(',');
    const exp = qu.richtig.slice().sort().join(',');
    return sel === exp;
  }).length;
  const pass = correct >= Math.ceil(questions.length * 0.6);
  if (pass) {
    if (!S.path) S.path = {};
    S.path[pathKey(quizState.qid, 'studium')] = true;
    save();
  }
  _renderQuiz();
}

// ── Selbsteinschätzung ──
let _curAssess = {};

function showAssessmentSheet(qid) {
  const q = getQ(qid);
  const cur = S.assessments && S.assessments[qid];
  const fragen = ASSESSMENT_FRAGEN[qid] || [];
  _curAssess = { qid: qid, answers: new Array(fragen.length).fill(0) };
  if (cur && cur.answers) { _curAssess.answers = cur.answers.slice(); }
  openSheet(_buildAssessHtml(qid));
}

function _buildAssessHtml(qid) {
  const q = getQ(qid);
  const fragen = ASSESSMENT_FRAGEN[qid] || [];
  const answered = _curAssess.answers.filter(function(a){ return a > 0; }).length;
  const total = fragen.length;
  const allDone = answered === total;

  var dotsHtml = '<div style="display:flex;gap:6px;align-items:center;margin-bottom:16px;">'
    + fragen.map(function(_, i){
        var done = _curAssess.answers[i] > 0;
        return '<div style="flex:1;height:4px;border-radius:2px;background:'+(done?'var(--accent)':'var(--line)')+'"></div>';
      }).join('')
    + '<span class="small muted" style="white-space:nowrap;margin-left:8px;">'+answered+'\xA0/\xA0'+total+'</span>'
    + '</div>';

  var rows = fragen.map(function(f, fi) {
    var scaleHtml = [t('ans_1'),t('ans_2'),t('ans_3'),t('ans_4'),t('ans_5')].map(function(lab, si) {
      var v = si + 1;
      var sel = _curAssess.answers[fi] === v ? ' sel' : '';
      return '<button class="' + sel.trim() + '" onclick="_pickAns(' + fi + ',' + v + ')">'
        + '<span class="ans-num">' + v + '</span>'
        + '<span style="font-size:.62rem;line-height:1.1;">' + lab + '</span>'
        + '</button>';
    }).join('');
    return '<div class="assess-q">'
      + '<div class="assess-q-text">' + esc(f) + '</div>'
      + '<div class="assess-scale">' + scaleHtml + '</div>'
      + '</div>';
  }).join('');

  var cur = S.assessments && S.assessments[qid];
  var lastHtml = cur ? '<div class="small muted" style="margin-top:8px;text-align:center;">'+t('selbst_letzte')+': '
    + cur.date + ' – ' + cur.score + ' %</div>' : '';
  var disabledAttr = allDone ? '' : ' disabled';
  var btnLabel = allDone ? t('selbst_speichern') : t('selbst_speichern') + ' (' + answered + '\xA0/\xA0' + total + ' ' + t('selbst_beantwortet') + ')';
  var saveBtn = '<div style="position:sticky;bottom:0;background:var(--bg-card);padding:10px 0 2px;">'
    + '<button class="btn-primary"' + disabledAttr + ' onclick="saveAssessment()" style="width:100%;'+(allDone?'':'opacity:.45;cursor:default;')+'">'
    + btnLabel + '</button>'
    + '</div>';

  return '<h2>'+t('selbst_titel')+' \xB7 <span class="pill ' + q.farbe + '">' + q.name + '</span></h2>'
    + '<div class="small" style="margin-bottom:4px;color:var(--ink-soft);font-style:italic;">' + esc(q.zeichen) + '</div>'
    + '<div class="small muted" style="margin-bottom:12px;">'+t('selbst_skala')+'</div>'
    + dotsHtml
    + rows
    + saveBtn
    + lastHtml
    + '<div style="height:8px;"></div>';
}
function _pickAns(fi, v) {
  _curAssess.answers[fi] = v;
  var sheet = document.getElementById('sheet-content');
  if (sheet) sheet.innerHTML = _buildAssessHtml(_curAssess.qid);
}

function computeAssessScore(answers) {
  var filled = answers.filter(function(a) { return a > 0; });
  if (!filled.length) return 0;
  var sum = filled.reduce(function(s, a) { return s + a; }, 0);
  return Math.round((sum - filled.length) / (filled.length * 4) * 100);
}

function saveAssessment() {
  var qid = _curAssess.qid;
  if (!qid) return;
  var answers = _curAssess.answers;
  var score = computeAssessScore(answers);
  if (!S.assessments) S.assessments = {};
  if (!S.assessments[qid]) {
    S.assessments[qid] = { score: score, answers: answers, date: todayISO(), history: [] };
  } else {
    S.assessments[qid].history = S.assessments[qid].history || [];
    S.assessments[qid].history.push({ score: S.assessments[qid].score, answers: S.assessments[qid].answers, date: S.assessments[qid].date });
    S.assessments[qid].score = score;
    S.assessments[qid].answers = answers;
    S.assessments[qid].date = todayISO();
  }
  S.lastAssessmentPrompt = todayISO();
  save();
  _closeSheet();
  toast('Einsch\xE4tzung gespeichert ✓');
  renderPanel(activeTab);
}

function renderRadarChart(scores) {
  // Diamond layout: top=Gleichmut, right=Liebe, bottom=Mitgefühl, left=Freude
  // viewBox gives 55px padding left/right for labels
  var W = 300, H = 230, cx = W/2, cy = H/2 - 2, R = 78;
  function pt(ax, pct) {
    var r = pct / 100 * R;
    if (ax === 0) return [cx, cy - r];
    if (ax === 1) return [cx + r, cy];
    if (ax === 2) return [cx, cy + r];
    return [cx - r, cy];
  }
  function diamond(r) {
    return 'M ' + cx + ' ' + (cy-r) + ' L ' + (cx+r) + ' ' + cy
      + ' L ' + cx + ' ' + (cy+r) + ' L ' + (cx-r) + ' ' + cy + ' Z';
  }
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark'
    || (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme:dark)').matches);
  var gridStroke = isDark ? 'rgba(255,255,255,.10)' : 'rgba(0,0,0,.07)';
  var axisStroke = isDark ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.08)';
  var grid = [25,50,75,100].map(function(p) {
    var r = p / 100 * R;
    return '<path d="' + diamond(r) + '" fill="none" stroke="' + gridStroke + '" stroke-width="1"/>';
  }).join('');
  var axes = '<line x1="' + cx + '" y1="' + (cy-R) + '" x2="' + cx + '" y2="' + (cy+R) + '" stroke="' + axisStroke + '" stroke-width="1"/>'
    + '<line x1="' + (cx-R) + '" y1="' + cy + '" x2="' + (cx+R) + '" y2="' + cy + '" stroke="' + axisStroke + '" stroke-width="1"/>';
  var QC = isDark
    ? { gleichmut:'#6ec5f0', liebe:'#f5d070', mitgefuehl:'#d49cf0', freude:'#60d090' }
    : { gleichmut:'#1a5878', liebe:'#6a4800', mitgefuehl:'#5a1080', freude:'#1a5c3a' };
  var ids = ['gleichmut','liebe','mitgefuehl','freude'];
  var pcts = ids.map(function(id) { return scores[id] || 0; });
  var pts = ids.map(function(id, i) { return pt(i, pcts[i]); });
  var poly = 'M ' + pts.map(function(p) { return p[0] + ' ' + p[1]; }).join(' L ') + ' Z';
  var dots = ids.map(function(id, i) {
    if (!pcts[i]) return '';
    var dotStroke = isDark ? '#252019' : '#fff';
    return '<circle cx="' + pts[i][0] + '" cy="' + pts[i][1] + '" r="5" fill="' + QC[id] + '" stroke="' + dotStroke + '" stroke-width="1.5"/>';
  }).join('');
  // Labels: names only (% already shown in bars below). Left/right anchored to edges.
  var label = function(x, y, anchor, id, name) {
    return '<text x="' + x + '" y="' + y + '" text-anchor="' + anchor
      + '" font-size="10" fill="' + QC[id] + '" font-weight="600"'
      + ' font-family="-apple-system,sans-serif">' + name + '</text>';
  };
  var labels = label(cx, cy-R-12, 'middle', 'gleichmut', 'Gleichmut')
    + label(W-4, cy+4, 'end', 'liebe', 'Liebende G\xFCte')
    + label(cx, cy+R+16, 'middle', 'mitgefuehl', 'Mitgef\xFChl')
    + label(4, cy+4, 'start', 'freude', 'Mitfreude');
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;">'
    + grid + axes
    + '<path d="' + poly + '" fill="rgba(162,62,72,.13)" stroke="rgba(162,62,72,.55)" stroke-width="2" stroke-linejoin="round"/>'
    + dots + labels
    + '</svg>';
}

var _wegSeg = 'ueberblick';

function switchWegSeg(name) {
  _wegSeg = name;

  var el = document.getElementById('weg-seg-content');
  if (el) el.scrollIntoView({block:'nearest'});
}

function renderBogen() {
  var phase = S.arc.currentPhase;
  var pd = getQ(phase);
  var ps = S.arc.phaseStarted;
  var phSess = S.sessions.filter(function(s){ return s.focus===phase && (!ps||s.date>=ps.slice(0,10)); });
  var total = S.sessions.length;
  var totalMin = S.sessions.reduce(function(s,x){ return s+(x.duration||0); }, 0);
  var byQ = {}; QUALITAETEN.forEach(function(q){ byQ[q.id]={c:0,m:0}; });
  S.sessions.forEach(function(s){ if(byQ[s.focus]){ byQ[s.focus].c++; byQ[s.focus].m+=s.duration||0; } });
  var allDates = new Set(S.sessions.map(function(s){ return s.date; }));
  var str = streak(), best = longestStreak(), wk = thisWeekStats();
  var g = S.goals || {dailyMin:20, weeklyDays:5};
  var wkPct = Math.min(100, Math.round(wk.days/g.weeklyDays*100));

  // ── Compact stepper ──────────────────────────────
  var stepperHTML = '<div class="weg-arc">'
    + '<div class="weg-arc-row">';
  var phases = ['gleichmut','liebe','mitgefuehl','freude'];
  var phaseLabels = QUALITAETEN.map(function(q){ return q.name; });
  phases.forEach(function(id, i) {
    var isCur = id === phase;
    var isDone = S.arc.phaseHistory.some(function(h){ return h.phase===id; });
    var c = Q_COLOR[id];
    var dotBg = isCur ? c : isDone ? c+'99' : 'var(--bg)';
    var dotBorder = isCur ? c : isDone ? c+'88' : 'var(--line)';
    var dotShadow = isCur ? '0 0 0 4px '+c+'28' : 'none';
    var dotStyle = 'background:'+dotBg+';border-color:'+dotBorder+';box-shadow:'+dotShadow+';';
    stepperHTML += '<div class="weg-arc-stop">'
      + '<div class="weg-arc-dot'+(isCur?' current':isDone?' done':'')+'" style="'+dotStyle+'"></div>'
      + '<div class="weg-arc-label'+(isCur?' current':'')+'" style="color:'+(isCur?c:'var(--ink-muted)')+';">'
      + phaseLabels[i]+'</div>'
      + '</div>';
    if (i < phases.length - 1) {
      var nextDone = S.arc.phaseHistory.some(function(h){ return h.phase===phases[i+1]; });
      stepperHTML += '<div class="weg-arc-line'+(isDone?' done':'')+'" style="margin-top:11px;flex:1;"></div>';
    }
  });
  stepperHTML += '</div>'
    + '<div class="weg-arc-sub"><span>' + pd.name + ' – '+t('weg_aktuelle_phase')+'</span>'
    + '<button class="btn-ghost" onclick="showPhaseSwitcher()" style="font-size:.75rem;padding:0;">'+t('weg_wechseln')+'</button></div>'
    + '</div>';

  // ── Segment bar ──────────────────────────────────
  var segs = [['ueberblick',t('weg_ueberblick')],['lernpfad',t('weg_lernpfad')],['reflexion',t('weg_reflexion')]];
  var segBarHTML = '<div class="seg-bar">';
  segs.forEach(function(s){
    segBarHTML += '<button class="seg-btn'+(s[0]===_wegSeg?' seg-active':'')+'" onclick="switchWegSeg(\''+s[0]+'\')">'
      + s[1] + '</button>';
  });
  segBarHTML += '</div>';

  // ── Segment content ──────────────────────────────
  var segContent = '';

  if (_wegSeg === 'ueberblick') {
    // Streak & Ziele
    segContent += '<div class="card">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">'
      + '<div class="card-title" style="margin:0;">'+t('weg_streak')+'</div>'
      + '<button class="btn-ghost" onclick="showGoalSheet()" style="padding:4px 0;font-size:.82rem;">'+t('weg_bearbeiten')+'</button>'
      + '</div>'
      + '<div style="display:flex;gap:24px;margin-bottom:16px;">'
      + '<div><div class="streak-num">'+str+'</div><div class="small muted">'+t('weg_tage')+'</div></div>'
      + '<div style="width:1px;background:var(--line);"></div>'
      + '<div><div class="streak-num" style="font-size:2rem;">'+best+'</div><div class="small muted">'+t('weg_beste')+'</div></div>'
      + '<div style="width:1px;background:var(--line);"></div>'
      + '<div><div class="streak-num" style="font-size:2rem;">'+total+'</div><div class="small muted">'+t('weg_gesamt')+'</div></div>'
      + '</div>'
      + '<div style="margin-bottom:8px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;">'
      + '<span class="label">'+t('weg_woche')+'</span>'
      + '<span class="small muted">'+wk.days+' / '+g.weeklyDays+' '+t('weg_tage_einh')+' · '+wk.min+' Min.</span>'
      + '</div>'
      + '<div class="goal-bar-bg"><div class="goal-bar" style="width:'+wkPct+'%"></div></div>'
      + '</div></div>';

              +'</div>';

function _backupBlob() {
  return new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
}
function _backupFilename() {
  return "vier-unermesslichkeiten-"+todayISO()+".json";
}

function exportData() {
  shareBackup();
}

async function shareBackup() {
  const filename = _backupFilename();
  const blob = _backupBlob();
  if (navigator.share && navigator.canShare) {
    const file = new File([blob], filename, {type:"application/json"});
    if (navigator.canShare({files:[file]})) {
      try {
        await navigator.share({files:[file], title:"Vier Unermesslichkeiten Backup"});
        S.lastBackupAt = todayISO();
        S.sessionsSinceBackup = 0;
        save();
        dismissBackupBanner();
        toast(t('backup_gespeichert'));
        return;
      } catch(e) { if (e.name !== 'AbortError') console.warn(e); else return; }
    }
  }
  // fallback: download
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  S.lastBackupAt = todayISO();
  S.sessionsSinceBackup = 0;
  save();
  dismissBackupBanner();
}

function checkBackupDue() {
  const SESSIONS_THRESHOLD = 3;
  const DAYS_THRESHOLD = 7;
  let due = false;
  if (S.sessionsSinceBackup >= SESSIONS_THRESHOLD) due = true;
  if (S.lastBackupAt) {
    const daysSince = (Date.now() - new Date(S.lastBackupAt+'T12:00:00').getTime()) / 86400000;
    if (daysSince >= DAYS_THRESHOLD) due = true;
  }
  if (due) {
    document.getElementById('bb-msg-text').textContent = t('backup_faellig') + ' – Daten sichern?';
    document.getElementById('bb-btn-save').textContent = t('backup_sichern');
    document.getElementById('backup-banner').classList.add('show');
  }
}

function dismissBackupBanner() {
  document.getElementById('backup-banner').classList.remove('show');
}

function importData(input) {
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.sessions && d.arc) { S = Object.assign(defaultState(), d); save(); renderPanel(activeTab); toast("Importiert ✓"); }
      else toast("Ungültige Datei");
    } catch(e) { toast("Fehler beim Importieren"); }
  };
  r.readAsText(file);
}

function resetAll() {
  S = defaultState(); save(); renderPanel(activeTab); toast("Zurückgesetzt");
}

// B1: Migrate old free-text annotation format → structured source field
(function _migrateAnnotations() {
  var changed = false;
  var headerRe = /^Sitzung\s+(\d+)[^\n]*(?:,\s*Abschnitt\s+(\d+))?[^\n]*/;
  var snippetRe = /^„([^"]+)"/;
  S.sessions.forEach(function(sess) {
    if (sess.source !== undefined) return; // already structured
    if (!sess.notes) return;
    var m = sess.notes.match(headerRe);
    if (!m) return;
    var sitzungNr = +m[1];
    var paraIdx   = m[2] ? +m[2] : null;
    // Remove header line + blank line
    var rest = sess.notes.replace(/^[^\n]+\n\n?/, '');
    // Extract inline snippet „…" if present at start
    var snippet = '';
    var sm = rest.match(snippetRe);
    if (sm) {
      snippet = sm[1];
      rest = rest.replace(snippetRe + '\n\n?', '').replace(/^„[^"]+"\n\n?/, '');
    }
    // Remove "Reflexion: " prefix if present
    rest = rest.replace(/^Reflexion:\s*/, '').trim();
    sess.source = { sitzungNr: sitzungNr, paraIdx: paraIdx, snippet: snippet };
    sess.notes   = rest;
    changed = true;
  });
  if (changed) save();
})();
