hip, more difficulty. It brings out anger in others. It makes others become harmful to us. It incites others to harm us.", "So, the afflictive states of mind are not to be abandoned because we Buddhists believe that it should be abandoned or some kind of order by the Buddha. It is because they are unwholesome, they are harmful. This is something that we must understand on the sort of first-hand experience. If not, then we will say, „I am Buddhist and I am trying to overcome the affective emotions and so on, but I will not effectively address the problem“.", "To give you a more pragmatic example: Everything, if you look around in the world, all the problems, all the difficulties, they have a cognitive basis coming from the mind of individuals. The problems are, there are wars, countries are angry with each other. This is all related to discrimination, hatred, jealousy, desire, all which is contrary to the Four Immeasurables. Also in our own everyday life, even within our families, of course, we have people we don't like, our enemies.", "Where do those enemies come from? They come mainly from our anger. And then there are also people that we say we love, our friend and family. We also have problems because we use the word “we love them”, but actually we are just attached. We are attached to them for what they can bring us. We don't really are friendly towards them. So often within couples, within family, a lot of problems come from that, because there is not true friendliness, not true maitri there.", "It is all just attachment, selfishness.", "In here the practice of the Four Immeasurables – just even if you don't have all the other four, all of them together, you just have one of them, you cultivate just kindness. That already changes everything, changes so much. For example, if you can bring – instead of attachment – in your family life true friendliness. It will improve that relationship, if you can bring that towards others.", "There are people in our everyday life that we honor, that we respect, we think they are so great. If you really look what makes them great is that they partially have some of these qualities of kindness, of compassion. That's what is inspiring because these qualities express the freedom from the afflictive state of mind. They are sources of well-being. So, in other words, Longchenpa is saying here that the four divine abidings, if they are practiced ordinarily, they bring well-being within Samsara at the highest level, the rebirth in the form and formless realms, but also in everyday life well-being.", "The four Brahmavihāras, one can sort of first look at one level of practice of these qualities where they are not actually Brahmavihāras. It's just simply practicing towards one or several people true friendliness, true compassion. That already is great benefit, even if it's towards just one single sentient being. There's a story of a mother and her daughter who were carried by a flood, and they both were trying to save each other through their love for each other, compassion for each other. But they both drowned and died – but died with this thought of kindness. Because of the power of that they were reborn in the realm of a godly realm, a happy realm. They had a happy rebirth just because that one thought of kindness toward one person. But that's not yet what we would call actually Brahmavihāra. A Brahmavihāra must encompass all sentient beings without exception.", "You can see first of all, first practice would be like being able to discern between what is true maitri from what is not real maitri, which we think is maitri, but it's actually selfishness and desire/attachment – that’s in everyday life. Then we try to develop that quality towards all beings without exception. And then we can sort of approach the Brahmavihāras.", "The emphasis is to cultivate this attitude towards all sentient beings. Somehow, we might wonder: Why should I do that? Why can't I just like everyone except that neighbor who is so horrible to me? To understand this point, you have to see it in this way: if you have the ability for loving kindness, but that ability of expressing that friendliness, kindness towards sentient beings is hindered by hatred. Now, let's say that for 99.99999% of all sentient beings, you have friendliness, except one. Now, where does that leave your mind? Your mind is never free of anger. You're still holding on to the grudge.", "You're still holding on to anger. When you hold on to grudge and anger, whom is it harming? You. You are harming your own mind, and your mind can never be free of anger. So, if your mind needs to be free of anger and that agitation, it must become friendly with all sentient beings without exception. If there is one exception, then your mind is not free of anger.", "Like a mother towards a child, no matter how badly that child behaves, no matter how much difficulty that child gives her, she never stops liking him or her, right? She never stops the affection. They're always friendly towards the child – and so anger never arises. Hatred never arises towards the child. In this way, if we are able to develop this attitude of friendliness towards all sentient beings, no matter what sentient beings do, they will never make us upset. We will never hold a grudge, be angry with them.", "And who is benefiting from that? Your own mind is benefiting from that. Your mind is therefore through that universal friendliness, completely free of hatred and the negative effects of hatred. And that is how the mind achieves peace. And then you can actually start to really practice Shamatha.", "So many people imagine these days that what we call meditation, Shamatha, is about holding on to concentration, being concentrated. But actually, it is about letting the mind's natural peace be manifest. It is not about forcefully concentrating. It is very hard if you have to concentrate. Then a meditation center becomes a concentration camp; very narrow minded. I can't see anything, I can't hear anything. I can't talk with anybody. You know that.", "So, then you can understand now the relationship between: How is love connected with concentration? Or with Shamatha? What is the relationship between both? The relationship is that, if the mind is naturally free of the agitation of anger, through the friendliness naturally it is easier. You do not have to make effort. Mind has the ability to naturally be calm. Why is it not being calm? It is because you with your own thoughts are disturbing it all the time. And your concentration also is like some kind of disturbance as well.", "But if they are connected with the path that leads to peace,", "They lead beyond the ocean of existence.", "Thus they are the four unbounded attitudes.", "Then it says here that the four unbounded attitudes are connected with the path that leads to peace. So here, peace is designating the freedom from samsara or freedom from all confusion.", "It says the path of peace. Samsara, conditioned existence, is characterized by dukkha. That’s a Sanskrit term that we often translate as suffering. When we use the term suffering, we have a tendency to interpret that term as just pain. But this encompasses actually every type of experience within samsara.", "Every moment of perception is always accompanied by feeling. And there are only three types of feeling: what appears as unwell or painful, what is pleasant, pleasurable, and what is neither, both. And we discern that very well. Generally, our attitude is to try to avoid the painful and be attached to the pleasant feeling. Whether it's a sight, a sound, a smell, a physical state, whatever it is, that's what we are attached to.", "In the teaching of the Buddha on dukkha, he is saying that where there is feeling, whether it is any one of these three, they are all three deceptive in nature. They are misleading, they are deceptive, they are unreliable. And there is no peace there in any of them. There is no peace, of course, in the pain, there is no peace in pleasure, there is no peace either in which is neither.", "So of course, the feeling of pain is naturally deceptive, very evidently a deception. Feeling of pleasure, which we are generally attached to, is in a hidden way, or not evident for us generally, also deceptive. Why? Because it is impermanent. It is unreliable. The pleasure right now being impermanent is a promise of displeasure. And then what is neither pleasant or unpleasant is also not peaceful because it is not free of the cause or of the condition from which pain and pleasure may arise.", "There's an image that is sometimes given. They say it's like eating a poisonous fruit. The moment you taste the poisonous fruit, you are not aware that it is poisonous. It has a flavor that may appear pleasant. But once you have consumed it, then you are no longer feeling the pleasure, but the pain has not yet come above. It is like the feeling that is neither pain nor pleasure. Basically, the poison is incubating in your body. And then when the symptoms become manifest, the pain becomes manifest. That is like the feeling of pain. This is a helpful image.", "If we look at every moment of awareness, we are in one different form of deception and a confused state of mind. Because mind's original reality is not actualized and mind's deceiving itself, confusing itself by dualistic grasping. This comes with this deception.", "The Four Immeasurables, basically, they are sort of remedies, or they counteract the afflictive states of mind, the coarse ones. For example, loving kindness hinders and clears away from our mind the attitudes of hatred; compassion of greed, attachment, desire/attachment, selfish desire/attachment. And then joy clears away jealousy, and equanimity clears away, of course, pride and in particular discrimination and ignorance, in particular ignorance.", "So, the five poisons are remedied by the Four Immeasurables.", "Of course, when these affective states of mind are sort of appeased, then more well-being within conditioned existence is possible. However, that doesn't solve the fundamental problem. We need to get rid of the very root of why affective emotions or affective states of mind arise in the first place. The affective states of mind arise in the first place due to fundamental ignorance and the distortion we spoke about earlier of grasping of I and other. And that needs to be cleared away. That can be cleared away through wisdom alone, through discernment of wisdom. So when these Four Immeasurables are associated with wisdom, then they can help us overcome conditioned existence, go beyond conditioned existence.", "These Four Immeasurables associated with wisdom are therefore termed immeasurables. The reason why the word “immeasurable” is used is not only because these attitudes encompass all sentient beings, who are immeasurable or infinite in number, but also because wisdom is without limit, is limitless, unbounded, free of all limitations. And then also because these qualities, through these infinite qualities, myriads of benefits come from it. That is why the title “immeasurable” is used.", "Then the next verse says:", "Verse 3", "They focus on the whole infinity of beings", "As well as on the ultimate condition of phenomena.", "Thus they have a twofold all-embracing form:", "They are both referential and nonreferential.", "Here the four unbounded attitudes have a reference, they are cultivated while the mind holds on to a reference. Generally, our confused mind always operates with a reference – a knowing mind that is grasping something else. So, there is a duality. This is observing our confusion. It can be like that, but it can also be without reference – meaning here, the mind is just simply observing reality as thus and also all the while manifesting or expressing the Four Immeasurables.", "Actually, what he's saying is that the real genuine Four Immeasurables is without reference. And then to start, you can try to engage it by holding on to reference. But when you have a reference, cultivating the Four Immeasurables with reference, encompasses all the other forms of also the Brahma-Viharas, all forms of practice of the Four Immeasurables that take a reference point. So that includes, such as we saw earlier in talking about just having one or two sentient beings or all sentient beings. This is actually clear in the second verse. We just read the second verse. So it says:", "Verse 4", "The four divine abidings are limited in scope.", "The beings they envisage are but few.", "In their focus and their form they are impure", "And, being partial, are the cause", "Of the celestial world of Brahmā.", "But the four unbounded attitudes are free of partiality:", "They are directed at the state of liberation.", "Let those who have compassion train in them.", "So here, what we saw earlier, the first title, the four Brahma-Viharas, or the four divine abidings, or sublime dwellings, depending on the translation – choose the one you like – these are developed by focusing on one and multiple sentient beings, just as in the story that we told about the mother and daughter who drowned and who were trying to save each other and cultivating compassion towards each other that led them to take reborn in one of the Brahma-Viharas. These are all limited in scope because they are not associated with the path of liberation. They are not associated with wisdom.", "And then this last verse says that those individuals who have compassion, the practice that is suited for them, is the Four Immeasurables, which in essence is four qualities that observe reality and therefore have no reference – so basically, for Bodhisattvas or those who have the inclination to become a Bodhisattva."]},
  {nr:3, absaetze:["We continue with “Finding Rest in the Nature of the Mind”, on the chapter dedicated to the practice of the Four Immeasurables. We saw we distinguished between the Four Immeasurables as the Four Brahmaviharas and the further distinction of practicing the Four Immeasurables with or without reference point. Now we go to more detail. The fifths verse is the Four Immeasurables with reference point of each of the four qualities, the reference of love, the reference of compassion, the reference of joy and the reference of equanimity.", "What's being said here basically is when you are cultivating this attitude of friendliness, who are you thinking of? And who do you have in mind when you are having this attitude of friendliness? And once you have the object in mind, what is it that you want for them? Presenting that chain. Clearly presented here it says:", "Verse 5", "Those who are not happy, those worn down by sorrow,", "Those who have both happiness and wealth,", "And those who love the close and hate the far—", "Such are the respective fields", "Of love and of compassion,", "Of sympathetic joy, and of impartiality.", "The forms of these four attitudes are thus the wish", "That happiness be gained, that sorrow be removed,", "That joy should not be lost,", "That one should be of wholesome and impartial mind.", "Those who are not happy are the object of – in other words – friendliness. And what is it that we want for them? It is that they have the happiness that they deserve. For example, as a parent for the child, that is still an infant who cannot speak, who cannot take care of himself, we want him to become strong and grow and be independent and be free. We want to bring him the happiness and comfort that he needs, that he is not cold and not sick and all that.", "In life, you can come across meeting people in many different circumstances. Sometimes, most of the time, you feel, people who have some difficulty, being friendly is trying to help them find the happiness that they want. Right? But in other cases, you have people who are affected by great difficulty and pain and suffering, sickness and problems. And compassion is trying to do what you can to help them overcome their difficulty and suffering. And joy is when you see people that you encounter that have everything, that are happy, healthy, young, and everything seems good for them. You want them that that always stays, then you are happy about it, you have joy.", "Our ordinary attitude is a bit contrary. Those who do not have happiness, “I don't care”, “ot my problem”. We feel like that. Why should I want him to be happy? Maybe even we might feel sort of like disdain towards them. Or we might feel those people who are suffering, we feel afraid of it. We don't want to hear about it. We don't want to know about it, even less want to do something about it. Maybe we're even happy. “He was a bad person”. “He deserves it”. And then when you see somebody who is happier than you, healthier than you, doing better than you, you're jealous. Why should he have it and not me?", "The practices of the Four Immeasurables is about first recognizing this genuine quality. Sometimes maybe this friendliness and kindness rarely arises. So first to see the benefit of that state of mind and then trying to refine our mind and familiarize ourselves more and more with that quality of kindness. There is an effort to cultivate it. Part of the practice is about entertaining thoughts, like thinking: „Oh, those people are not different than me. They are friends, they were family in another life, and they still are.\" All kinds of conceptual thoughts that may help us to have that attitude of kindness. The practice goes all the way from the conceptual aspect in everyday life to more, one could say, contemplative and non-discursive aspects. So from discursive, that includes concepts, all the way to a non-discursive, the state of peace that corresponds, that we spoke of earlier.", "One thing that can be helpful maybe is to try to see, for example, already in our everyday life, what's it like to experience kindness? What's it like to experience compassion? What's it like to experience joy? What's it like to experience equanimity? And which types of experience we may take to be kindness, but that are actually attachment; that we may mistake for equanimity, but which is not equanimity. We may think it's equanimity, but actually it's not. What we think might be compassion, but it's not. We may think it's joy, but it's not. So we discern first what is the closest to what we are trying to achieve.", "The Master Patrul Rinpoche gives these images: He says love is like a mother for her only child, images like a mother caring for her baby. An image of compassion is like a mother that has no arms and sees her daughter or child drowning in the river. There's nothing she can do about it. She's without arms. Joy is like a camel that lost her baby and then finally finds it and is so overjoyed seeing her, finding back her child. The image here is a mother camel that is very attached to her baby camel and then suddenly it is lost. Sos she's always so stressed and suddenly she finds her baby and then she's so happy. It's exactly what she wanted. Equanimity is like a calm, peaceful lake, very calm water.", "If you read the words of my perfect teacher (kun bzang bla ma’i zhal lung), he gives a teaching on the Four Immeasurables. Those images are found there. I think those were the correct images, but you should verify. Just saying out of memory.", "In any case, I think first we should discern between what may seem to be loving kindness, but it is actually not, it is desire attachment. It is not friendliness – as I explained earlier. Compassion, of course, is observing sentient beings who are in pain and suffering. We may seem sometimes overwhelmed by sorrow, despair, and seeing the loss of others. That may seem to be compassion, but that is actually more or less just overwhelmed sorrow, which is not exactly compassion. Compassion is the more difficult one, I feel, to really implement. It's literally subtle. Sometimes difficult to understand.", "The word karuna is a Sanskrit term, and I think there are a few etymologies to this, one emphasizes that it takes away our joy, meaning that seeing the suffering of other sentient beings cannot bring any joy, any satisfaction. It's unbearable, so to speak. So that's compassion. You just can't live with the fact that knowing that that person is suffering, without doing anything about it, when you are able to do something. You will necessarily do something. You will do anything, whatever it may cost you. Often why we don't do anything for others is out of greed and selfishness because it costs me. So, compassion is that sort of inclination that you will give whatever. You're there for them. But it doesn't mean that you're particularly attached to the suffering. There's also an aspect of courage and also that you are free of all that fear and agitation that is related to suffering. It's also the ability to face all those difficulties.", "We often focus too much on the sentimentality and the emotional aspect of, for example, love and compassion. In the West, it's very much on the aspect of the sentimentality that is put out here. So here is mainly the intention of a benevolence. And in its reality, it is characterized by peacefulness and by lack of selfishness.", "An image for compassion could be: imagine you are a physician, a doctor, and that you are facing a patient who is very ill and who is in great pain, and that you know that through your intervention, you will be able, although that intervention may be very delicate, very difficult, entails a lot of hardship maybe for you to help, but knowing that you will be able to help and that you can alleviate the pain and difficulty of that person, there is a sense of courage and even joy anticipating what you will be able to do to benefit. So it’s like an aspect of courage confronting the difficult situation.", "In the Mahayana scriptures, there's a description of the bodhisattva's compassion and compassionate action. The image that came to mind right now is that scriptures describe great heat in India. Right now, actually, I think it's 45 degrees in India. It's very hot. And the elephants, when they see water, they jump into it without hesitation to cool themselves. This image is given about the bodhisattva's action in benefiting sentient beings. It says, „Bodhisattvas go to the hell realms to benefit sentient beings like elephants jumping to the lake to cool themselves.” The hardship that they may face is less than trying to bear the perception of suffering of other sentient beings. Even if it is going to hell, for them it feels if it is beneficial to sentient beings, it is like an elephant jumping into the water to refresh himself. Whatever difficulty there is, they are ready to endure it, so to speak. It is a beautiful image, I think, to understand a little bit what one means by compassion here.", "Another etymology related to the term karuna is associating the term to the Sanskrit verbal root of action, karma. This is like compassionate action. It is actually effectively trying to serve, help, alleviate the pain and suffering of sentient beings. This is done naturally out of that attitude of kindness. So for example, if you see somebody who fell to the ground while you are walking down the street, you can get emotional about it. That is not compassion. If I were just helping that person get up, you do not have to think too much about it – that is more compassion. Nothing holds you back. Spontaneously, automatically.", "In our everyday life we have some confusion. For example, with friendliness it becomes very much about attachment, how that person makes me feel. Also with compassion, how that situation makes me feel uncomfortable, and how upsetting it is. This is all about me. It is all selfishly rooted. These four unbounded qualities, they are expressing mind's ability; qualities that are expressed when they are free of the imperative of me. There is a peacefulness, a quality of peace in each of them.", "If there is peace, then there is the ability to just do, give, help. If it is emotional, that hinders.", "You can see how that compassionate state is also leading to a benefit for yourself. It's not something that is only for other. Through that, being able to overcome that selfishness in a most powerful way through compassion, it is also bringing about peace for oneself, as well as making us always benevolent.", "The third one, joy, is when seeing others have happiness, wellbeing. This should not be mistaken with excitement. Like when your football team wins, then you have great joy, excitement. This is selfishness. “I, team one.” Then you start shouting and yelling and screaming and all that. Ordinarily, people call that joy. You can mistake it with this joy, but here, joy is contentment. You are satisfied to see other beings well, and it's also characterized by a mind that is peaceful. As I said earlier, none of these qualities have that sentimental and agitated aspects.", "With the attitude of kindness, our mind is free of hatred, disliking or unaccepting other sentient beings. Everyone is a friend. There's no discrimination of preferences. And similarly with compassion, there's no longer concern for the self. One is able to be benevolent and actually effectively help sentient beings. And then when sentient beings don't need help and they are doing well, there's no jealousy or despair related to that. One’s mind is content, satisfied. These qualities are also related to one another. It's not like they are essentially separate and unrelated. Each quality complements one another.", "This brings us to the fourth, equanimity. This is probably a little more subtle and difficult to discern at first. Here the object is those sentient beings who are discriminating and attaching. In the text it says, „those who love the close and hate the far”; that means ordinarily we are all discriminating, we are all partial. The very first fundamental discrimination is due to ignorance and this grasping of duality and the sense of self, that we discussed about earlier. Therefore, there is always a preference for the self. We are always partial in general. Others all come after oneself first. That is one first discrimination.", "Then of course we entertain many circles of relation and those that are close to us, my parents, children, spouse, that is the first closest circle, they are almost like the self. Maybe number two, but still almost like the self. Then you have the extended family and friends and then their friends. That is a circle of what you could call friends. And then at the opposite side you have your enemy and his family, his friends. They are all not directly your enemy, but they are friends of your enemy, so therefore they are on that enemy side. There are the foreigners, the enemies, whatever.", "And then in between you have those who are neither. But even among those who are neither, you have many discriminations. Like you may think of just a human being or an animal, for example we all don't like spiders, and we all love little kittens and baby rabbits. They are cute, they are lovely. We are always discriminating based on appearance, how beings appear to us. In general, we have so many discriminations. We discriminate between human and animal, male and female, old and young, wealthy and poor, powerful and weak, foreigner and native, intelligent and dumb. There are so many discriminations. By gender, social class and all this. All of that is contrary of equanimity, is opposite of equanimity. That is discrimination. And because of this discrimination, there is preference. If you are a man, maybe you are more inclined to consider other men your equal and look down at women or women the same towards men; or young, they think, „Oh, we are the same\", and they look down towards the old; the old look down towards the young. All these discriminations: “Oh, they are young, they don't have any experience.” The young: “Oh, their brain is rotten, they are old. They don't understand. Too rigid.” So many discriminations.", "One aspect of equanimity or impartiality is the aspect of not making a distinction. Equally considering all beings, myself is included, is equal. It's not just about me separate and all others equal. You have to put yourself also in the equal. There is no difference between me and Heather also. That's being impartial; really truly impartial. And with that, there's also an aspect of being equanimous, I think this is the idea of no preference. There's no preference.", "In general, for example, when people smile at us, it makes me happy. When they frown at me, it makes me upset. When something good happens to me, I'm happy. Something bad happens to me, I'm upset. Equanimous means no matter what happens, the mind is calm, peaceful, stable. There's no preference, no discrimination, no attachment to certain circumstances or how you are treated. And that state of mind is extremely peaceful, free, and blissful, you could say.", "Sometimes in life you come to a little bit of experience of what that equanimity is like. You can maybe a little bit experience what it's like. An example that comes to my mind: maybe you are working very hard towards achieving something, a project or a diploma or something. You're working hard for your exam. Now your exam and everything is finished, it’s done. Then there's nothing more to do. All the weight, the stress, all that's been taken off your shoulder. Mind is sort of free – but we don't know how to appreciate that. When you go home, nothing to think about, nothing you have to do; no more obligation, no more stress, nothing. Mind is free, it is equanimous – but we don't know how to appreciate that. Then what do we do? We turn on the radio or put on the TV, go scroll on the phone.", "This gives you a brief idea of what the Four Immeasurables actually are. Here afterwards there is a more concrete explanation of how to put it into practice. We start looking at that tomorrow.", "Question: I have three questions, but maybe I won't ask them all at once. I will start with the first one. You mentioned for all of the Four Immeasurables, the thing that they might be confused with and I think I didn't catch the one for equanimity. Can you explain it to me?", "Answer: Equanimity can be mistaken with being indifferent. One doesn't care, whatever. But that's not equanimity. Equanimity is also the space on the basis of which you can express true friendliness, true compassion, true joy towards all, without exception.", "Question: My question is that there is a difficulty to bring together what we've learned today with the state of the world, where, for instance, it was explained like the relationship between parents and children and then thinking of children who grow up in a dog's box, mothers who kill their newborn babies and how can she be equanimous towards this? How can she not take a stand there? That's the question.", "Answer: Being equanimous should not be confused with inaction or indifference, as I just mentioned. It's not about just staying back and saying, „Oh, I don't care what's happening in the world.” It's actually setting your mind in the correct frame to be able to do what is truly beneficial and that is beneficial to all. Because if you, for example, look at the horrors that are being done, of course, in every situation, you may distinguish between somebody who is perpetuating something really bad and the victim. And naturally, we have a tendency to take side with the victim and then develop anger and hatred towards the criminal. And then our mind is not free from karma at that time, not free from afflictive states at that time. And then whatever we do under that impulsion, the benefit of it will be limited also for others and as well as for ourselves. So equanimity is being able to engage in the world and with sentient beings in an action that is free of all afflictive states of mind and that will not harm anyone, will not harm ourselves either, and can be truly beneficial. Because if you look through history, all the crimes that were committed, they always have a justification. And they use some kind of idea or concept to say, „Oh, it is right to do that. He was a criminal.“ So all action is based upon the afflicted state of mind, of discrimination. They are not about doing what is right for all sentient beings. So, if you want other sentient beings to be free of afflictions, you must manifest the example of being free of afflictions.", "I forgot, I'm sorry, to comment on some words of the omniscient or the all-knowing Longchenpa. The definition he gave for equanimity, he says the object or reference is sentient beings who are caught in discrimination, attachment to near and far. And what is it that we aspire for them? We aspire for them that their mind becomes wholesome, that their mind becomes free of addictive states of mind, in other words.", "That means what we wish the criminal has no longer anger, that we wish that the victim has no longer resentment. And that their mind becomes wholesome, that they can actually experience this state of mind of equanimity. That is the basis from which you can go towards finding true freedom. Otherwise, we are always a victim of our own making, which are our afflicted states of mind that are nourished by our thoughts, our concepts, our biases, our cognitive errors, our cognitive biases, as they say.", "If we know what equanimity is, that's sort of the basis to try to find real true freedom for us, for ourselves and also for others.", "Remember, we talked about dukkha. Every sentient being is in dukkha. Through equanimity, you can slowly come to approaching what is free from dukkha.", "Question: When I see a victim and a criminal, this is in any instance that's one moment. It's this: „Oh, poor victim„ and getting angry with the criminal. It's like this. Why is it like ...?", "Answer: Why is it like that? Because of discrimination. Lack of impartiality. I think because we are attached to the appearance, we have no understanding of the afflicted state of mind. The criminal, he is actually a slave of the affliction. He is also manipulated by the affliction. The affliction is due to ignorance. So, the real problem is ignorance. And it's also my problem.", "**** concerning Shine:", "Question: The second of my three questions regards what you explained about forceful concentration, at the beginning of last session. Is this tendency to be forceful in one's concentration, is it somehow connected to reifying and wanting to control one's mental state? Examples: one is that I can do it when I'm practicing only Shine, but once I visualize or recite something, the mind is getting tense again. I was thinking, maybe I think it's too real. So how comes that it's so different in those two things? And the second is, if the mind gets clearer and more relaxed and joyful because I let go more, then I come into that. And then the practice is circling around and around. It's like, „Oh, it's good that I think that it's gone, then I start again.\" So, I feel like there is something there, but why do we concentrate forcefully?", "Answer: I think this comes from thinking from everyday life. When we say I focus on something, I concentrate on something. You want to get something done. Like working on a machine, you want it to work in a certain way, or you want to make something into a certain shape and try to get something done. And so, when we approach the mind in that way and we misunderstand a little bit the teachings and don't understand exactly what meditation or Shamatha is, Shamatha is described to people as a mind free of thoughts, free of all agitation.", "So then we think, I have to make my mind be free of agitation. So, I'm going to concentrate, force myself to not have any thoughts. If you approach meditation in that way, it somehow doesn't work because mind will not stop having thoughts. The more you try to stop it from having thoughts, the more you become frustrated with it, the more you are hacking with the thoughts that are arriving. I've said that they are not stopping.", "So, you don't ever experience any kind of peacefulness. That's the misunderstanding.", "So then how is it you must deal with thoughts in meditation? You have two aspects of meditation. One aspect of meditation is related to, you could say, just simply the mind being able to experience peace, and peace in a continuous and ultimately effortless way. In the case of concentration is effort.", "Another aspect, of course, in Bhavana or cultivation, is the cultivation of discernment or wisdom. But here we are talking mainly just about the Shamatha aspect. So, in the Shamatha aspect, here as a beginner, our mind always has a reference in general. Mind is always focused on either a sound or smell or a sight or a thought, something, always occupied with some object.", "So, mind doesn't know how to not deal with something. So, we give the mind something to think about or something to hold on to. But that thing we are holding on to, we are not trying to cultivate it. It's just because our mind is used to holding on to something. When we say, okay, focus on the lamp or on a stone or on the breath or on an image, whatever, all that is just because our mind is so used to holding on to something, we give it some food to hold on to.", "So the object we select is something that we try not to forget. Not forgetting that is remembrance. In English nowadays people call it mindfulness, but it is actually remembrance. That helps you stay on track. Otherwise, you have forgetfulness. Forgetfulness means that whatever object you selected, you forgot about it and you selected something else, another thought. You selected then another thought, then you selected another. That is distraction. We are always going from one thought to another thought to another thought to another thought to another thought to another thought all the time. Here what we just do in Shamatha is we just try to remember whatever object we have selected. Just not forget it. But we are not trying to do anything more than that with that object.", "What we are trying to do – while we are remembering that – is experience the mind just being calm. Maybe it will be calm for just a split second. But what you have to do is appreciate that. When it is calm for one split second, you experience the peacefulness, the calmness, the clarity, the certain wellbeing there. You can experience it. There is appreciation there. But then somehow some thoughts or ideas will arise.", "Some kind of idea will arise, and that is not a problem, because when we think: „Oh, I do not want that thought to arise“, that is engaging with the thought in opposing the thought. Then you are engaging with it because you are opposing it. That is what concentration is, forcefully trying to not have thoughts. You are engaging with the, „I do not want to have that thought.“ That means you engage with the thought. Distraction is there. You are already thinking about how you are meditating or whatever.", "Another thing that can happen is that you do not remember the object anymore. The thought was so much more interesting than what you are doing that then you think, „I am going to pursue that thought.“ Then you picked up the thought. And picking up that thought, then you fed a second thought and fed a third thought. And then you completely forgot about the object you are trying to remember. So, when you remember, as long as you do not forget what you remember, whatever thought arise, let it arise. When it arises, just say: „Okay, you are there. Live your own life. I am doing my thing, you do your thing.“ And if you let him be, he just goes away. Because when you pick it up or you try to get rid of it, that overpowers you because you are engaging with it and it is creating agitation.", "So here calmness is not about something uncalm that you are trying to make become calm. The calmness is innate to the mind, but it is our entertaining that is not keeping it calm. So it is just trying to let all the agitation just be and trying to experience the potential of calmness that we have.", "****", "Question: Thank you so much for the answers. The third question concerns wisdom. It was mentioned that without wisdom, those qualities lead to rebirth in godly realms, but not liberation. At the same time, sometimes I feel like this is like opening the box with the crow bar that's inside the box. There is this image of the box and you have to open it and if to open it, you need to use a tool that is inside the box. It's not possible, of course. That's kind of the image. And I feel like, okay, how can we or I who have not realized this kind of wisdom, like yeshe probably, I guess, how can I include that in my practice of the Four Immeasurables, so that I cultivate my aspiration for liberation and not for a godly rebirth, even though I don't have the conditions for that yet because I can't actually cover wisdom.", "Answer: This is explained in the text. You'll see it. How to cultivate wisdom. I think we shouldn't make wisdom something very inaccessible. The fundamental message of the Buddha is that we have Buddha nature. Right? That means that actually our reality has and wisdom has always been part of us. It's not something that we have to create or find anew. We just need to be able to discern it and discern what is the confusion.", "It's not something you have to create or some kind of very complex, elaborate thought or theory. It's not a concept, but it is the beginning related to the experience that arises when you give up all thoughts and concepts related to mind's original reality. It's just how things are, how our mind actually is. It's fundamentally its original reality. But we will see this more in detail. I hope we can get there tomorrow.", "Question: I have one more question. I think I can only talk about myself because I don't want to generalize this. But my feeling is that one of the greatest hindrances for me to get real compassion or real equanimity is my judgmental state of mind. And this is like a reflex. You see something and then you put it in a box and say, „It's like that, it's like that.\" And so my question is, where is the difference between judgment and drawing a decision out of it? How can I overcome this feeling?", "Answer: I think the main point is a little bit what we saw, we discussed yesterday. We have to see somehow the fictive nature of our thoughts. When you think, „Oh, this is like this,\" it's basically more or less arbitrary. That sort of description you made is somehow maybe useful for you to your obsessing with experiences you have or what you are looking for, but it's always just a representation. It's like a word. A word, it's useful. We can communicate, come to understanding, find things, be able to do things. But the word is just a convention. In and of itself, it has no reality.", "It's sort of arbitrary. We say cup. Cup and those sounds. To our mind, there's a concept, an image, and a category of many things that could be it, that you can call a cup that come to mind. It's useful. But that sound was not made by that object, has no relationship, natural relationship with that object. When you do like blue, blue, blue, blue, blue for water, maybe that has more relationship than the cup, the object.", "So, it's just a convention. And then it's a thought related to some perception that you have. But neither of those perceptions, neither of those thoughts, neither of those conventions actually exist like we think of them. They don't exist in and of themselves like that. Even like in the case of blue, blue, blue, blue, blue for water. You think, “oh, that's maybe more true.” Maybe to the human ear for people who are, I don't know, speaking certain languages, it sounds like blue, blue, blue. In other places it maybe sounds like glu, glu, glu. In other places it sounds like ... It's all based on conventions and based on your own perception.", "So, it's a construct. Water also, you think, “oh, there's something as water that's a fundamental element”. Water is made out of smaller particles. And do we ever see those particles? No. For us is this experience of water that we are designating. But that experience as an experience is a construct and just like a mirage, something that appears, but it exists only in that appearance. It doesn't exist as such independently.", "And our confusion is to attribute to that appearance its own existence as such.", "And so, everything we think, “oh, this is good, this is bad, this is right, this is wrong”, all of this is just somehow made up.", "You can think, “oh, my judgments, they are just sort of conventional. They are not true ultimately.” But on the conventional level, because of my previous experience, I know, okay, if I take this, harm will come to me. If I cultivate anger, that will really lead to more suffering for me. So that's sort of like, it is using your thoughts and representations in an intelligent way to try to improve your situation, but you shouldn't give them all sort of like an ultimate value that there is something there to them that is ultimately true. They are conventionally, temporarily true, and those representations help us be able to find and get what we want.", "Question: Like kind of tools.", "Answer: They are like tools, yeah. I don't know, in France there is this expression, I don't know if you have it in German, they say, „Don't throw the baby out with the bath water.” It's not because they're not ultimately true that then you shouldn't make any use of it. It's like people, they hear first time Buddhist teaching about there's no self. So, then they say, „Oh, as a Buddhist, can I say I?\" Or how do you want to talk? Maybe they think, „Oh, I'm a Buddhist. I'm not allowed to use the first person pronoun or any pronouns.” So, we are looking at it in the wrong context.", "Thank you everyone for your attention and we'll discuss more tomorrow and I would like to invite you to join me in the dedication of merit."]},
  {nr:4, absaetze:["We continue with the teaching on the Four Immeasurables. Up until now, we looked at what are the Four Immeasurables and different levels of the practice of the Four Immeasurables or the distinction between the term according to Longchenpa of the four Brahmavihāras versus the Four Immeasurables. Now we'll start looking at how to practice more particularly.", "Regarding how to practice", "The first stage of the practice is when practicing the Four Immeasurables while we are having a reference. That means that it is without necessarily any prajñā or wisdom discerning the emptiness or selflessness of sentient beings. It is just basically based on our ordinary assumptions of I and other. This first stage of the practice is conceptual.", "You use your thoughts and you try to change how you think about others, so that by means of changing how you think about others, your intention or how you relate to others is changed. Then you develop the intention to benefit them, to bring them happiness, remove their suffering, be content of their joy, establish them or inspire them to be free of afflictive states of mind, so that these are the natural intention or attitudes or ways to relate to others.", "In the presentation of how to practice this, there are of course many different types of instructions. The aim of all of them is, of course, to give rise to these qualities. For example, in the Theravada tradition, you practice these in the orders of the recitation. We say, „May all beings find happiness in the cause of happiness. May they be free from suffering in the cause of suffering. May they not be separated from the perfect happiness that is free from suffering. May they abide in great equanimity, free from attachment and aversion to those near and far.“ That's the recitation that we do, which is the basis for developing our foundation for developing this intention or positioning ourselves in relation to other sentient beings.", "In the Theravada tradition, I also mentioned they would start, for example, the practice by first focusing on maitri, loving kindness, trying to make sure that you really understand what maitri is and not mistake it with desire, for example. And then you focus on one person, and it has to be, for example, a person that is alive, that does not inspire desire or attachment, that inspires some degree of respect, for example, a teacher or a good friend or something like that. And from that familiarization, you try to slowly develop that attitude towards a greater number of beings.", "Here, Longchenpa explains the practice slightly differently, so we could consider this like a pith instruction, how to be able to cultivate efficiently and swiftly the Four Immeasurables. So, the point made in verse six here is:", "Verse 6", "In the meditation on them there is no fixed order.", "Beginners on the other hand", "Should start with training in impartiality.", "Once they realize the equality of beings who are close and far,", "They should proceed to meditate upon the other three.", "What this says here is that although when we speak of them, we speak first of love, then compassion, then joy and equanimity in that order – that there is no fixed order. You don't have to always cultivate first love, then move to compassion. You can practice them in any order. And they are, as I mentioned yesterday, complementary, and they come together. However, he says beginners on the other hand, if you are a beginner, and so this is his instruction on this practice: You must start with equanimity or impartiality.", "The practice, as we explained the other day, is not about just cultivating properly friendliness towards our friends, but towards all beings without exception. That includes everyone we usually discriminate, as well as our enemies, as well as ourselves. So, making no discrimination between I and other, in between all sentient beings. We must equally love others as we love ourselves, have compassion to others, as for ourselves.", "This is the sort of finality of the practice. One must come to that equanimity. So, if we start with just love, then as a beginner, it's difficult to come to that universality of those qualities. And so that's why on the onset for the beginner, what Longchen Rabjam Rinpoche here emphasizes, is that we start with equanimity. Then if that is there, then it's easy afterwards for developing love, compassion, and joy because all has been equalized already.", "So how do we cultivate equanimity? This is explained. What we see here in the following verse is we must train by means of discursive thoughts or concepts, ideas, by changing how we think about others. So there is a brief presentation here. So this sort of actual meaning of the word meditation in the West – not when it means the translation for Shamatha or something – is thinking carefully about something. In the West, when you say meditation, it means discursive practice, actually. So, this is this discursive practice you should do first.", "I'm just going to summarize a little bit here the practice. Let's read the verse in the manuscripts.", "Verse 7", "With all beings as its focus, the meditation’s form", "Consists of this consideration:", "“O mind, you are attached to father, mother, friends.", "Your enemies you hate, and in this way you are defective.", "Wandering in endless and beginningless saṃsāra,", "As father, mother, friend, these enemies of yours", "Once brought you benefit.", "Will you now return their kindness with malevolence?", "And these, your present friends, were once your harmful foes.", "The suffering they brought to you is with you even now.", "How does it then make sense to do them good in recompense?", "And all the others in between", "Have been both friend and enemy.", "They may have helped; they may have harmed:", "No point is there in hatred or attachment.”", "This text starts with becoming aware of our discriminations. Right now, we all have discrimination. We have friends and family that we love and cherish or attach to. We have people that we don't like, that we despise, denigrate and think are bad. Even just in general, in every circumstance, whenever we watch the news or whenever we look around, we are always discriminating and putting people in categories.", "It's not explained in this text here, but you can say, as I explained the other day, that we have a number of circle of relations. You have a circle of friends, circle of enemies, circle of neither, and there are like barriers in between.", "Equanimity is: You need to remove all the walls and make no more discrimination.", "The first obstacle you will encounter is your attachment to discriminating. We are so accustomed and used to always discriminating that we think that we must do that. Here Longchenpa says “Oh mind, you are attached to father, mother and friend. Your enemies you hate. In this way you are defective”, it says.", "This is difficult for us to accept. We don't feel like discriminating is a defect of ours. It's a problem of ours. We think that maybe we don't discriminate well enough: “I took him for a friend, but actually he was an enemy. I should have known better.”", "So, you must sort of look within, so it's your mind dealing with itself and looking at how it's behaving and seeing that holding grudges, being attached, hope and fear and making those discriminations, that itself is actually harming our mind. How is it harming our mind? It is the constant disturbance, first of all. Mind can never experience peace as long as you hold on to that. It can never be equanimous. In your bias, many of the wrong things we do, negativities we do, all come from this attitude. So, this attitude carries or incites all the other afflictions.", "So, you have to sort of observe that discrimination leads immediately to the affective states of mind. So, when we discriminate, “Oh, this is a friend …”, desire, attachment arises. “This is enemy …”, hostility, anger, hatred arises from that automatically. So, discrimination is always carrying the affective states of mind. And affective states of mind, they are not by Buddha's decision or some kind of convention, something that is negative. They are by their very nature negative. Now you can see that when there is desire, attachment there, the mind doesn't experience calm and peace and well-being. Desire is an experience of that there's a worry always with it. It is the expectation of getting something that you don't have or worry of losing something. So, there's always a level of unwellness with it. Hatred, of course, and hostility, it's even more evident. The very moment it is there, unwellness, and it causes more suffering for us. So, these are negative. It's something defective. It is our own error, defective. So, it's important for us to recognize: “I must overcome … – discrimination is not about how people are, it's about how I grasp them.”", "That's the first stage of practice. We must recognize that discrimination is a fault, that it's harmful, and then have the resolve to address discrimination, overcome it. And I think implicit in this is understanding that discrimination is not circumstantial, is not just education. It's always my decision and that I can do something about it.", "The second step in the practice is still also conceptual. Once that resolve is there, then it's tackling the discrimination itself by seeing how that discrimination has no foundation. It's totally arbitrary that there's no basis to it.", "There are numerous reflections here like for example, you can think of, we are discriminating thinking these are my enemies, these are my friends. But enemy and friend is not something that is objective, something substantially manifest as such. A friend can become an enemy. An enemy can become a friend. If friend were substantially friend, he could never become an enemy. If the enemy were substantially enemy, he could never become a friend. It's not like that. Some people, they fall in love when they're young and they adore each other so much. And later on, when they grow up, they can't even hear about the other person's name. They hate each other so much. And some in the beginning in their youth, they are like the worst rivals and then they later on became good friends.", "Generally, the Definition of what we think as a friend and what we think as an enemy is that enemy is somebody who brings me harm and a friend is someone who benefits me. If you really look at it – is this really valid? Often friends give us so much hardship. Because of family, we have to work, make money, take care of them. So many problems with all the family and friend. And sometimes enemies, because they challenge us, they make us develop qualities that we did not have. So indirectly they benefit us and indirectly friends harm us. It is really difficult to see where is friend and where is enemy.", "These are general considerations that you can look at to see that this discrimination is really baseless. And here, the omniscient Longchenpa invites us to another line of thought; it says here „Your enemy, wandering in endless and beginningless Samsara as father, mother, friend, these enemies of yours once brought you benefit. Will you now return their kindness with hatred?”", "So basically, what he is inviting us here to think is: maybe you are familiar with the teaching on Bodhicitta considering how we have been in Samsara for beginningless times. We have taken many rebirths und all sentient beings have been our parents. Therefore, we try to develop a closeness, with the feeling of closeness, through which we develop loving kindness and compassion. But here we are taking it from a very different angle.", "There was once a clairvoyant master. He saw a mother with her newborn baby und she was feeding her baby some fish. Then there was a dog there begging for some food. And the mother kicked the dog away. But in his clairvoyance, he could see who these people were in their past lives. The baby was the arch enemy of the family. This family had their worst enemy that they hated, and he died and he was reborn as their daughter's child. Now she was loving him and caring for him so much. And the fish she was feeding him was the dead body of the rebirth of one of her parents, her mother, I think; she was feeding to her baby, the flesh of her mother, to her enemy. And the dog that was there was the father, the rebirth of the father, of her own father that she kicked away. So, we don't see that, but in his clairvoyance, he could see that.", "What implicitly we need to come to terms here also in this part of the reflection is the idea of past and future lives. So many people have these days the view that what we call the mind is somehow epiphenomena made by the body and by physical matter. But once the body is gone, then when the flame of a candle is extinguished, there is no more light. In the same way, when the body is gone, then the mind disappears into oblivion. But that's the modern physicalist, you could call it physicalist, meaning from mind being a byproduct, epiphenomena of the body view. This is somewhat predominant, but this is not at all the Buddhist view, of course.", "According to Buddhism, matter cannot be the cause of the mind because they are essentially very different in characteristic. And this present moment of mind is due to the preceding instant of mind. And this present moment of mind as it disappears, is the sufficient condition for the emerging of the second following instant of mind. So, mind is a continuum of which you cannot find the beginning nor end. And from the moment we have been in Samsara, in confusion, from that moment onwards, we have taken innumerable times rebirth. And so right now, maybe we don't recognize each other. We look at each other as strangers or people we just newly met. However, we have been into contact many, many infinite number of times, sometimes as friends, sometimes as enemies. We have helped each other innumerable times. We have preyed upon and killed each other innumerable times throughout all the different life forms that we have taken.", "So here, basically to summarize, the point is that we discern or discriminate today group of people that we call our friends. But actually, they, in many lifetimes in the past, were our enemies. They killed us, harmed us, hurt us. And even now as our friends, they also create trouble for us. So, there is no reason to have attachment for them. How can you have attachment? Because they have harmed you.", "And those enemies that you look at, another group of people, you look at and think, “Oh, those are my enemies, I hate them.” But in many lifetimes, they have benefited me, helped me. They are like friends, so I cannot help them. So basically, the point is, do not hold those discriminations against those sentient beings. You cannot find them as friend or foe, fundamentally. And so do not make any more discrimination of those that are close and those that are far. Consider all beings with equanimity.", "Verse 8", "Therefore, at the outset,", "Place your loved ones in the midposition of neutrality", "And set aside attachment.", "And for your enemies, as though they too were neutral,", "Rid yourself of hatred.", "Have no “near and far.”", "Then eliminate your ignorance", "Of regarding beings neutrally as neither good nor bad.", "Train yourself in what will free you from saṃsāra:", "The intention to remove impartially", "The afflictions that torment all wandering beings.", "So, regarding your friends, set aside attachment, desire attachment, because you know desire attachment by nature is negative. For your enemies, set aside hatred for it because you know hatred to be by nature negative.", "Now, there is a possibility that you get attached to the neutrality, that equanimity can fall into indifference. So, you need to also eliminate that indifference. It says here: „Then eliminate your ignorance of regarding beings neutrally as neither good nor bad.” You need to eliminate that too.", "How do you do that? You must train yourself in what will free you from samsara. That is a mind that is free of all afflictive states of mind, a mind that is free of desire, hatred, also ignorance, and have the intention to help all sentient beings achieve that. You want all sentient beings – equanimity is aspiring, is wanting all sentient beings' minds to be free of ignorance and all the affective states of mind. You want that for your enemy, you want that for your friend, you want that for yourself without distinction, because those affective states of mind are erroneous by their nature and harmful. Equanimity is benevolent in nature. It is not to be confused with indifference, you can see right away. But it is not benevolent in the sense of by attachment, preferring, wanting some people, benefit some people at the expense of others.", "Verse 9", "In wanting to be happy and to flee their pains,", "All beings are the same.", "And yet in their confusion they contrive", "The causes of their suffering.", "Alas! May all afflictions of unhappy beings", "And all their evil tendencies subside.", "May they have an evenness of mind.", "May all embodied beings,", "Tormented by strong craving and aversion,", "Be freed from hatred and desire", "And have minds for which", "The near and far are equalized.", "Thinking thus, first meditate upon a single being,", "Then on two, then three.", "Beginning with the beings of one region,", "Proceed then to one continent and then all four.", "Then meditate on the entire universe—", "Increasing it a thousand times, then multiplied again", "A second thousand times, and then a third.", "This is the meditation that now is being explained:", "In here the discriminations and our favoring and particularly our partiality has no basis. We saw that earlier. And then although we may think that in their appearances, sentient beings appearing distinctly, we may think that there are fundamental differences amongst sentient beings, but that is not true. All sentient beings are similar. They all want the same thing. They all want to be free of pain and be happy.", "Whether it is, if you look around and from the smallest little creature that you can see, he is always moving away from pain and trying to find some wellbeing. You look around us, there's so many people walking, moving, planes flying in the sky. What is all this for? Trying to avoid pain, trying to find happiness. That is what every sentient being is constantly doing. So, there's no distinction. Yet, sentient beings don't know how to find their wellbeing.", "They are searching for that endlessly, but they are looking in the wrong way. They are, in the name of their own happiness, actually cultivating their own suffering. And that is because of what? Because of their discrimination, because of their partiality, because their minds are, how to say, constantly troubled by the three poisons of ignorance, hatred, attachment.", "So, the meditation or practice here implies recognizing this problem, that just as well we see it for other sentient beings, that they want happiness, but in their ignorance are constantly creating suffering for themselves. This is also my case as well. We all want happiness. We want to avoid suffering, but we always take refuge in the three poisons. Not the three jewels, but the three poisons. And then we are always creating problems for ourselves. So, we must aspire that “May my mind be free of all the afflictions, may also the mind of all sentient beings be free of three poisons.”", "So the first part of the practice, as we saw, is discursive. We hold on to the reference of sentient beings, something observed, myself and others. And then here we will try to increase this way of relating to sentient beings by encompassing all sentient beings without exception. But we do this sort of progressively. You think of yourself and one other sentient being, and then two, three, four, all beings like that, slowly, as it says here. One region, then one continent, then four continents.", "So, you can think of, first all the humans, humans in Vienna, and then in Austria, then in Europe, then in Eurasia, and then in Africa and Eurasia, and then Africa, Eurasia, America, South America, then Australia, New Zealand, and then all the islands in the Pacific and Atlantic. And then you think about all the animals-Animals that are in the slaughterhouses, animals that are in the zoos, animals that are in the wild, animals that are in the water, animals that are in the air, the big and small.", "Think of all of them. They are all troubled by afflicted states of mind. “I wish them all equanimity.” And then realms that you do not know, like that are explained in Buddhist scriptures, that you cannot observe, but godly realms and realms of the hells and so forth. You can extend like that. And sometimes just this solar system and then this galaxy and then this multiverse. The universe, the multiverse, the multi-multiverse.", "Verse 10", "The sign of your success will be that self and other,", "Friend and foe are equalized. (…)", "„The sign of your success will be that self and other, friend and foe are equalized.” One needs to reflect and think and change this way of seeing and think about the points we saw earlier, either in formal meditation or informally in everyday life, until really that you make no more discrimination. There is no difference between self and other, friend and foe. In Theravada scriptures, they give a good example. They say, for example, let's say that you are on a boat and there are some pirates that come on.", "No, maybe let's change the image to more modern: You are on the plane and there are some terrorists that hijack the plane. And then they select you, a family friend, your enemy, your spiritual teacher, your child. And then they decided to show the example, the terrorists, they want to kill one person among this group that they selected. So how should you feel about it? Should you want them to choose you and not the others? Should you want them to choose your enemy? Because ordinarily we would want them to choose our enemy, right?", "Another attitude which we tend to think often, in the context of Buddhist practice, but which is, I think, maybe an erroneous way to see is we think, “oh, I must self-sacrifice. I want all of them to not be killed. They choose me, they kill me first.” And then you are discriminating yourself still, harm for yourself. So, you have not achieved equanimity.", "So, equanimity is: there is no preference. It is as painful, whether it is me or my enemy that is chosen.", "Basically, the idea here is that through reflection and thinking, we can change how we think about others and then diminish slowly all these preferences and discriminations we hold on to usually.", "Next level: the practice of equanimity that has no reference point", "Now then there is a level up to this practice. Once this is there, then we have to improve it yet more. But don't use that as an excuse not to do the second level of practice. Think, I can't equalize everyone, so how can I do the same? This meaning: this is the more in depth and this can help you go further if you have also difficulty in the first part. This is here:", "Verse 10", "(…) In conclusion, think that all the objects", "Of this impartial attitude devoid of clinging—", "All are but the mind,", "And that the nature of the mind is similar to space.", "Then with a mind completely free of concepts,", "Rest within the ultimate condition, empty and unborn.", "As a sign of your success, the realization", "Of what is deep and peaceful will arise in you.", "The fruit will be a mind that’s free from “near and far.”", "The fundamental nature of all things", "Will be spontaneously accomplished.", "Now what is being presented here is the practice of equanimity that has no reference point. Earlier we have a reference point. In the reference point, we start first by thinking of our enemies, try to eliminate hatred towards them. Then we think about our friends, remove attachment towards them, and have the equanimous, impartial attitude towards them. And then we focus on all beings, so that every sentient being that ever comes to mind or we ever encounter, we do not make any discrimination.", "And then the second part of the practice is trying to cultivate this impartiality without any reference point. And so here the first object of the meditation is the reference point, sentient beings. We consider all sentient beings infinite in their number. What are they actually? They are just appearance, perception. You cannot find them existing substantially as they appear to me in my perception. This is what is meant by “they are but mind.”", "So, what is meant here is that all these appearances, the appearance of myself, the appearance of other and others in all their variety, all these different appearances that we are perceiving, are nothing but an appearance. So, the idea of this word appearance is that they do not exist as they appear. They are appearing, although it has no reality as such. The otherness, the I-ness, these things cannot be found.", "So, you can think of it like a reflection in a mirror. When you look in the mirror, you see your face and you think, “Oh, this is me.” Although in the mirror your face is clearly manifests, you are not there. You never have been. Never will you be there. And the fact that you think, “This is me,” is also a confusion. So, it's similar to what we call our psychophysical elements. Psychophysical elements, this body is like that reflection in the mirror. It's something that is compounded. It doesn't have its ownness, just as the reflection is something that is compounded by the conditions but does not exist as such. And the fact that I'm thinking this body is me, is like grasping that reflection is me. It's just an attribution. It's just an illusion.", "So as long as there's the grasping to the self, then there is this discrimination, there is ignorance, it's manifesting the discrimination. And then due to that, the other afflictions and karma and then becoming. When we see that this is nothing but just an appearance, perception, there is no substantiality to that, then we overcome the grasping to the self, and there is no longer afflictions, there are no longer karma, no longer therefore rebirth and perpetuation of the dukkha, deception.", "So, all of these are just appearances. They are something appearing to the mind, yet you don't find anything in the mind itself through which these things are appearing. If you try to search it that true, you cannot find its substantiality. And so therefore it is without any coming into existence. And then so here the meditation is sort of letting the mind rest without any reification, elaboration, grasping at anything. And then once you let the mind in this way rest without any grasping, the mind's just natural reality becomes manifest as it is. And this is naturally free of the afflictive states of mind. And you cannot find any I or other. None of the discriminations can be found.", "The mind's reality is inconceivable, ineffable. It's just mind's natural reality. When without discriminating, without grasping in duality, we let the mind rest there, then the yeshe or the primordial wisdom or original discerning will become manifest. So, because there's no longer grasping by letting the mind be there, the mind becomes aware of its reality in a non-dual way, without thoughts or concepts.", "So, there's sort of like two aspects to this practice:", "One you could say is on the conventional or ordinary level within our confusion, and within our confusion then our ordinary discriminations subside and there's no longer partiality, mind is equanimous, all the discriminations subside.", "And then on the ultimate aspect, our mind becomes familiarized with the reality, and the natural qualities of mind are able to become manifest. So that's on the ultimate level.", "On this basis, once in this way we are familiarized with equanimity, then we also move on to cultivating love, compassion and joy. And because we've developed some familiarization with equanimity, then immediately we'll be able to develop love universally towards all sentient beings, as well as compassion and joy.", "So here also for each there is the aspect of the relative, that means love with a reference point, and then also cultivating love without a reference point that is bringing it together with wisdom.", "Question: There is one line in the seven branch prayer, which I have always found very inspiring, and that is where it said: Please turn the wheel of dharma in accordance with the capacities of sentient beings. It's like images are springing up in my mind of all those I do not get along with are in the center with me and this could harmonize the whole planet. Even some politicians I can imagine in the center. But now, after today's teachings, I'm asking myself whether this also invokes a strong discrimination between Buddhists and non-Buddhists. And I wonder if this is just as harmful as discriminating between friend and enemy.", "Answer: The problem, I think, is not necessarily that you have thoughts like, “oh, those are Buddhists, non-Buddhists, those are friends, those are enemies,” all those sort of things are relatively relative, but that we really believe in it and that we are attached to that. And because of that, we make preferences. That's the problem. We have anger, we have desire, hatred. And you must understand that those states of mind are by nature negative.", "You're just harming yourself. When a politician does something so horrible and you get so upset, you're not really changing anything in the world. You're just making yourself upset. It doesn't mean that if you have the occasion to do something, then you shouldn't do, when you have. But when you're following the upsetness, you will not do the right thing.", "Question: Is there something like the power of good wishes?", "Answer: Yes, of course. There is. That's why we make the dedication of merit, but we don't do that on the basis of hatred or attachment. We do that on the basis of equanimity, which is not indifference, as we saw. It is aspiring for the true happiness of sentient beings. What is the true ultimate wellbeing of sentient beings? If their mind can be equanimous, free of the afflictions and have wisdom.", "Question: So maybe I have a few small points, so I just say them together and save some time. The first one that's maybe the longer one is, I was wondering about the role of challenging situations in this practice, because for me it's quite easy to think in a theoretical way of all sentient beings and wishing them happiness equally. But then someone comes and bothers me in some way and I'm reacting with some anger immediately, even though on an intellectual level, I'm still thinking, oh, I wish you happiness, but in the moment I'm like, oh. So how to deal with this?", "Answer: It's a question of practice. At the beginning, of course, theoretically you agree with it and you want that, but then you have your habits. The more you familiarize yourself with equanimity, so it's something you shouldn't think of it like immediately you can change. You think of it something you do progressively. So first of all, it's training on the conceptual level, thinking, changing how you think about others. They are not my enemies; they're also my friends. There's no difference between me and other. And so like that slowly. But it's not easy.", "Question: Deciding between near and far. Doesn't this mean, if you somehow label it, then it's just a label for your affection or your discrimination. So you can't see the near if you don't know the far. And this difference is that you decide, is it this or that? And this means you are affected to it somehow. I'm not sure if I can
